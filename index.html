<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>厦门泽林 · 生技原料买卖合同 (一页精装版)</title>
    <!-- 引入Google Font & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- 引入 JSZip 和 CryptoJS 用于打包和哈希 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        /* ========== 全局重置与字体 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Noto Sans TC', 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 0.1rem 0.1rem;
        }

        .contract-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            box-shadow: 0 20px 40px -12px rgba(0, 55, 100, 0.25), 0 0 0 1px rgba(46, 125, 50, 0.15);
            padding: 0.4rem 0.6rem 0.2rem; /* 进一步缩减内边距 */
            transition: all 0.3s;
        }

        /* ========== 页眉区域 ========== */
        .header {
            margin-bottom: 0.2rem;
            padding: 0.2rem 0.3rem;
            border-radius: 16px 16px 0 0;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-bottom: 3px solid #2E7D32;
            box-shadow: 0 8px 18px -10px #1B5E20;
        }

        .header-content {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 0;
        }

        .brand-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.2rem 0.3rem;
        }

        .logo-title-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .brand-logo {
            height: 80px; /* 增大Logo尺寸 */
            width: auto;
            max-width: 120px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(46,125,50,0.3));
            border-radius: 14px;
            background: white;
            padding: 0.2rem;
            border: 1px solid #2E7D32;
        }

        .company-name {
            font-weight: 900;
            font-size: 1.5rem;
            color: #1B5E20;
            line-height: 1.2;
            white-space: nowrap;
            text-shadow: 2px 2px 6px rgba(46,125,50,0.15);
            background: linear-gradient(145deg, #1B5E20, #2E7D32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .doc-meta-header {
            display: flex;
            gap: 0.2rem;
            flex-wrap: wrap;
            background: #e8f5e9;
            padding: 0.1rem 0.5rem;
            border-radius: 40px;
        }
        .doc-meta-header label {
            display: flex;
            align-items: center;
            gap: 0.1rem;
            font-size: 0.75rem;
            color: #1B5E20;
            font-weight: 500;
        }
        .doc-meta-header input {
            border: 1px solid #a5d6a7;
            border-radius: 40px;
            padding: 0.1rem 0.4rem;
            width: 90px;
            background: white;
            font-size: 0.75rem;
        }
        .doc-meta-header input:focus {
            border-color: #2E7D32;
            outline: none;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.2);
        }

        .title-header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(145deg, #1B5E20, #2E7D32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
            margin-bottom: 0;
        }

        /* 角色切换 */
        .role-switch {
            background: #ffffff;
            border-radius: 60px;
            display: inline-flex;
            padding: 0.05rem;
            margin: 0 0 0.4rem 0.05rem;
            gap: 0.05rem;
            border: 1px solid #c8e6c9;
        }
        .role-switch label {
            padding: 0.15rem 0.8rem;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            color: #1B5E20;
            transition: 0.2s;
        }
        .role-switch input[type="radio"] { display: none; }
        .role-switch input:checked + label {
            background: #2E7D32;
            color: white;
            box-shadow: 0 4px 10px #1B5E20;
        }

        /* 公司卡片 */
        .company-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
        }
        .company-card {
            flex: 1 1 240px;
            background: #fafdfa;
            border-radius: 14px;
            padding: 0.3rem 0.5rem; /* 缩小内边距 */
            border: 1px solid #c8e6c9;
            box-shadow: 0 8px 16px -12px rgba(0,60,0,0.2);
            page-break-inside: avoid;
        }
        .company-card h3 {
            color: #1B5E20;
            font-size: 1rem;
            border-left: 5px solid #FFB300;
            padding-left: 0.4rem;
            margin-bottom: 0.3rem;
            background: linear-gradient(to right, #ffffff, #e8f5e9);
            border-radius: 0 12px 12px 0;
            line-height: 1.3;
        }
        .company-card p {
            margin: 0.15rem 0;
            display: flex;
            align-items: baseline;
            font-size: 0.85rem;
        }
        .company-card p strong {
            width: 90px;
            color: #1B5E20;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .company-card input {
            border: 1px solid #a5d6a7;
            border-radius: 30px;
            padding: 0.15rem 0.5rem;
            width: 100%;
            background: white;
            font-size: 0.85rem;
        }
        .company-card input:focus {
            border-color: #2E7D32;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.1);
            outline: none;
        }
        .bank-info {
            background: #e8f5e9;
            border-radius: 10px;
            padding: 0.3rem 0.6rem;
            margin-top: 0.3rem;
            font-size: 0.85rem;
            border-left: 4px solid #FFB300;
        }

        /* 表格区域 */
        .items-section {
            margin: 0.2rem 0 0.2rem;
            overflow-x: auto;
        }
        .items-section h3 {
            color: #1B5E20;
            font-size: 1.1rem;
            margin-bottom: 0.1rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 16px -14px #1B5E20;
            min-width: 650px;
            page-break-inside: avoid;
        }
        th {
            background: #c8e6c9;
            color: #1B5E20;
            font-weight: 700;
            padding: 0.25rem 0.15rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        td {
            padding: 0.15rem 0.15rem;
            border-bottom: 1px solid #e0f2e0;
            vertical-align: middle;
        }
        td input, td select {
            width: 100%;
            border: 1px solid #c8e6c9;
            border-radius: 30px;
            padding: 0.1rem 0.25rem;
            font-size: 0.8rem;
            background: #f9fff9;
        }
        td input:focus, td select:focus {
            border-color: #2E7D32;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.1);
        }
        .delete-btn {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: #b71c1c;
            padding: 0 0.05rem;
        }
        .delete-btn:hover { color: #d32f2f; transform: scale(1.1); }

        .total-row {
            text-align: right;
            margin: 0.1rem 0 0.2rem;
            font-size: 1.3rem;
            font-weight: 800;
            color: #1B5E20;
            background: linear-gradient(to right, #f1f8e9, #ffffff);
            padding: 0.1rem 1rem;
            border-radius: 50px;
            display: inline-block;
            float: right;
            box-shadow: 0 4px 10px rgba(0,80,0,0.1);
            border: 1px solid #c8e6c9;
            page-break-inside: avoid;
        }

        .clause-box {
            clear: both;
            margin: 0.1rem 0 0; /* 底部外边距0 */
        }
        .clause-box textarea {
            width: 100%;
            border: 1px solid #c8e6c9;
            border-radius: 16px;
            padding: 0.2rem 0.5rem;
            font-size: 1rem;
            line-height: 1.25;
            background: #fefefe;
            resize: vertical;
            box-shadow: inset 0 2px 6px rgba(0,30,0,0.02);
        }

        /* 页脚签名区 (双印章 + 双签名上传) */
        .signature-footer {
            position: relative;
            margin: 0 0 0.1rem; /* 上边距0 */
            padding: 0.2rem 0.4rem 0.15rem;
            border-top: 2px dashed #a5d6a7;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            overflow: hidden;
            page-break-inside: avoid;
        }

        .logo-watermark-footer {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
        }
        .logo-watermark-footer img {
            height: 70px; /* 适当水印大小 */
            width: auto;
            object-fit: contain;
            margin-right: 0.3rem;
            margin-bottom: 0.1rem;
        }

        .signature-block {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .stamps-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            gap: 0.3rem;
        }

        .stamp-box {
            text-align: center;
            flex: 0 1 auto;
            position: relative;
        }
        .stamp-box img {
            width: 70px; /* 增大印章尺寸 */
            height: auto;
            border-radius: 50%;
            background: #fff;
            padding: 0.15rem;
            box-shadow: 0 6px 12px -6px rgba(0,0,0,0.2), 0 0 0 1px #FFB300 inset;
        }
        .stamp-placeholder {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #eeeeee;
            border: 2px dashed #2E7D32;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1B5E20;
            font-weight: 600;
            font-size: 0.6rem;
            text-align: center;
            padding: 0.1rem;
            margin: 0 auto;
            cursor: pointer;
            transition: background 0.2s;
        }
        .stamp-placeholder:hover {
            background: #d4e6d4;
        }
        .stamp-file-input {
            display: none;
        }
        .stamp-uploaded-img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #FFB300;
            box-shadow: 0 6px 12px -6px rgba(0,0,0,0.2);
            display: none;
            cursor: pointer;
        }

        /* 签名区域 (上传图片) */
        .signatures-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            justify-content: center;
        }
        .signature-area {
            flex: 1 1 220px;
            background: #fafdfa;
            border-radius: 14px;
            padding: 0.2rem 0.3rem;
            border: 1px solid #c8e6c9;
            box-shadow: 0 4px 10px -6px #1B5E20;
            min-width: 190px;
            page-break-inside: avoid;
        }
        .signature-area p {
            font-weight: 600;
            margin-bottom: 0.1rem;
            font-size: 0.85rem;
            color: #1B5E20;
        }
        .signature-area .signature-upload-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.15rem;
        }
        .signature-area .signature-preview {
            width: 100%;
            max-width: 150px;
            min-height: 55px;
            border: 1px dashed #a5d6a7;
            border-radius: 12px;
            background: #f9fff9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .signature-area .signature-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .signature-area .signature-placeholder {
            color: #1B5E20;
            font-size: 0.7rem;
            text-align: center;
            padding: 0.3rem;
        }
        .signature-area .signature-upload-btn {
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            color: #1B5E20;
            padding: 0.1rem 0.6rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .signature-area .signature-upload-btn:hover {
            background: #c8e6c9;
        }
        .signature-controls {
            margin-top: 0.1rem;
            display: flex;
            gap: 0.2rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .signature-controls button {
            background: #e8f5e9;
            border: none;
            color: #1B5E20;
            padding: 0.1rem 0.5rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #a5d6a7;
            font-size: 0.7rem;
        }
        .signature-controls button:hover { background: #c8e6c9; }
        .signature-controls input[type="date"] {
            border: 1px solid #a5d6a7;
            border-radius: 40px;
            padding: 0.1rem 0.3rem;
            background: white;
            font-size: 0.7rem;
            flex: 1;
            min-width: 90px;
            width: auto;
        }

        /* 证据包相关样式 */
        .email-section {
            margin: 0 0 0.05rem; /* 上边距0 */
            padding: 0.1rem 0.4rem;
            background: #f0f8f0;
            border-radius: 16px;
            border: 1px solid #c8e6c9;
        }
        .email-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem;
            margin-bottom: 0.05rem;
            align-items: center;
        }
        .email-row label {
            font-weight: 600;
            color: #1B5E20;
            min-width: 50px;
            font-size: 0.7rem;
        }
        .email-row input {
            flex: 1;
            min-width: 140px;
            border: 1px solid #a5d6a7;
            border-radius: 30px;
            padding: 0.1rem 0.4rem;
            background: white;
            font-size: 0.7rem;
        }
        .hash-display {
            background: #e8f5e9;
            border-radius: 12px;
            padding: 0.1rem 0.4rem;
            font-size: 0.65rem;
            word-break: break-all;
            border: 1px solid #a5d6a7;
            margin-top: 0.05rem;
        }
        .evidence-buttons {
            display: flex;
            gap: 0.2rem;
            flex-wrap: wrap;
            margin-top: 0.05rem;
        }

        /* 其他合同链接 */
        .other-contracts-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 3px;
            margin: 2px 0 1px;
        }
        .other-contracts-links a {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            background: white;
            color: #1B5E20;
            text-decoration: none;
            padding: 2px 6px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.7rem;
            border: 2px solid #2E7D32;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(46,125,50,0.15);
        }
        .other-contracts-links a:hover {
            background: #2E7D32;
            color: white;
            border-color: #FFB300;
        }
        .other-contracts-links i {
            font-size: 0.7rem;
            color: #FFB300;
        }

        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 0.3rem;
            justify-content: center;
            margin: 0.1rem 0 0;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            background: #2E7D32;
            color: white;
            font-size: 0.8rem;
            padding: 0.25rem 0.8rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 16px -8px #1B5E20;
            transition: 0.2s;
        }
        .btn-light {
            background: #f5f5f5;
            color: #1B5E20;
            box-shadow: 0 4px 10px #c8e6c9;
        }
        .btn:hover { background: #1B5E20; transform: translateY(-2px); }
        .btn-evidence {
            background: #FFB300;
            color: #1B5E20;
        }
        .btn-evidence:hover {
            background: #ffa000;
        }

        /* ========== 打印样式强化 ========== */
        @media print {
            body {
                background: white;
                padding: 0.05in;
            }
            .contract-container {
                box-shadow: none;
                border: 1px solid #aaa;
                padding: 0.05in;
                border-radius: 0;
                background: white;
                max-width: 100%;
            }
            /* 隐藏非打印元素 */
            .no-print,
            .btn,
            #addRowBtn,
            .delete-btn,
            .action-buttons,
            .role-switch,
            .other-contracts-links,
            .signature-upload-btn,
            .signature-controls button,
            .email-section,
            .evidence-buttons {
                display: none !important;
            }
            td:last-child,
            th:last-child {
                display: none;
            }
            /* 输入框、选择框只保留文字边框 */
            input,
            select,
            textarea {
                border: none !important;
                background: transparent !important;
                border-bottom: 1px solid #333 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            th {
                background: #eaeaea !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .company-card,
            .bank-info {
                border: 1px solid #aaa;
                background: #f9f9f9 !important;
            }
            .brand-logo {
                filter: grayscale(0.2);
                opacity: 1;
            }
            .company-name {
                -webkit-text-fill-color: #1B5E20;
                color: #1B5E20;
                background: none;
            }
            .clause-box textarea {
                height: auto !important;
                max-height: none !important;
                min-height: 0 !important;
                overflow: visible !important;
                resize: none !important;
                border: 1px solid #333 !important;
                background: transparent;
                white-space: pre-wrap;
                box-shadow: none;
                padding: 0.05rem;
                font-size: 0.8rem !important;
                line-height: 1.1 !important;
            }
            .signature-footer,
            .stamp-box,
            .signature-area {
                page-break-inside: avoid;
            }
            .stamp-box img,
            .stamp-placeholder,
            .stamp-uploaded-img {
                max-width: 60px;
            }
            .stamp-placeholder {
                border: 1px solid #000;
                background: #f9f9f9;
            }
            .stamp-uploaded-img {
                border: 1px solid #000;
            }
            .signature-area .signature-preview {
                border: 1px solid #000;
            }
            .signature-area input[type="date"] {
                border: none;
                border-bottom: 1px solid #333;
                background: transparent;
            }
            table {
                border-collapse: collapse;
                width: 100%;
            }
            th, td {
                border: 1px solid #000;
            }
        }

        /* 移动端优化 */
        @media (max-width: 700px) {
            .brand-logo { height: 60px; }
            .company-name { font-size: 1.2rem; white-space: normal; }
            .title-header h1 { font-size: 1.2rem; }
            .doc-meta-header input { width: 70px; }
            .role-switch label { padding: 0.1rem 0.6rem; font-size: 0.7rem; }
            .total-row { font-size: 1.1rem; }
            .stamp-box img, .stamp-placeholder, .stamp-uploaded-img { width: 60px; height: 60px; }
            .signature-area { flex: 1 1 100%; }
            .signature-area .signature-preview { max-width: 140px; }
            .signature-controls input[type="date"] { min-width: 70px; }
        }
    </style>
</head>
<body>
    <div class="contract-container">
        <!-- 页眉 -->
        <div class="header">
            <div class="header-content">
                <div class="brand-row">
                    <div class="logo-title-group">
                        <img class="brand-logo" src="images/xmzelin-logo.png" alt="厦门泽林" onerror="this.onerror=null; this.src='https://via.placeholder.com/120x80?text=Zelin+Bio';">
                        <span class="company-name">厦门泽林生物科技有限公司</span>
                    </div>
                    <div class="doc-meta-header no-print">
                        <label>合同编号 <input type="text" id="contractNo" value="ZL-SC-2025-001"></label>
                        <label>签订日期 <input type="date" id="contractDate" value="2025-03-03"></label>
                        <label>签订地点 <input type="text" id="contractPlace" value="厦门市"></label>
                    </div>
                </div>
                <div class="title-header">
                    <h1 id="contractTitle">生技原料买卖合同</h1>
                </div>
            </div>
        </div>

        <!-- 角色切换 -->

            function createRow(seq, name = '', spec = '', qty = 1, unit = 'kg', price = 0) {

            function refreshRowsAndTotal() {
                const rows = itemsBody.querySelectorAll('tr');
                let grandTotal = 0;
                rows.forEach((row, idx) => {
                    row.cells[0].innerText = idx + 1;
                    const qty = parseFloat(row.querySelector('.item-qty')?.value) || 0;
                    const price = parseFloat(row.querySelector('.item-price')?.value) || 0;
                    const rowTotal = qty * price;
                    row.querySelector('.item-total').innerText = rowTotal.toFixed(2);
                    grandTotal += rowTotal;
                });
                grandTotalSpan.innerText = '¥ ' + grandTotal.toFixed(2);
            }

            function attachRowEvents(row) {
                row.querySelector('.item-qty')?.addEventListener('input', refreshRowsAndTotal);
                row.querySelector('.item-price')?.addEventListener('input', refreshRowsAndTotal);

                    if (itemsBody.children.length <= 1) { alert('至少保留一行'); return; }
                    row.remove();
                    refreshRowsAndTotal();
                });
                row.querySelector('.unit-select')?.addEventListener('change', refreshRowsAndTotal);

            function collectFormData() {
                const contractNo = document.getElementById('contractNo').value;
                const contractDate = document.getElementById('contractDate').value;
                const contractPlace = document.getElementById('contractPlace').value;
                const role = roleSeller.checked ? '泽林为卖方' : '泽林为买方';
                const clauses = document.getElementById('contractClauses').value;

                const sellerInputs = sellerContent.querySelectorAll('input');
                const seller = {};
                sellerInputs.forEach(input => {
                    const label = input.previousElementSibling?.innerText || '';
                    if (label.includes('公司名称')) seller.name = input.value;
                    else if (label.includes('地址')) seller.address = input.value;
                    else if (label.includes('联系人')) seller.contact = input.value;
                    else if (label.includes('电话')) seller.phone = input.value;
                    else if (label.includes('统一社会信用代码')) seller.taxId = input.value;
                    else if (label.includes('开户行')) seller.bank = input.value;
                    else if (label.includes('账号')) seller.account = input.value;

                const buyerInputs = buyerContent.querySelectorAll('input');

                buyerInputs.forEach(input => {
                    const label = input.previousElementSibling?.innerText || '';

                    else if (label.includes('联系人')) buyer.contact = input.value;

                        price: parseFloat(row.querySelector('.item-price')?.value) || 0,
                        total: parseFloat(row.querySelector('.item-total')?.innerText) || 0
                    });
                });

                return {
                    contractNo, contractDate, contractPlace, role, seller, buyer, items, totalAmount, clauses,
                    exportedAt: new Date().toISOString()

            function exportJson() {
                const data = collectFormData();
                const contractNo = data.contractNo.replace(/[^a-zA-Z0-9\-_]/g, '_') || 'contract';
                const filename = `${contractNo}.json`;
                const jsonStr = JSON.stringify(data, null, 2);
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            function dataURLtoBlob(dataurl) {
                const arr = dataurl.split(',');
                const mime = arr[0].match(/:(.*?);/)[1];
                const bstr = atob(arr[1]);
                let n = bstr.length;
                const u8arr = new Uint8Array(n);
                while (n--) {
                    u8arr[n] = bstr.charCodeAt(n);
                }
                return new Blob([u8arr], { type: mime });
            }

            generateBtn.addEventListener('click', async function() {
                try {
                    const contractData = collectFormData();

                    const sig1Preview = document.querySelector('#signaturePreview1 img');
                    const sig2Preview = document.querySelector('#signaturePreview2 img');
                    const stampImg = document.getElementById('stampUploadedImg');

                    let sig1Blob = null, sig2Blob = null, stampBlob = null;
                    if (sig1Preview) sig1Blob = dataURLtoBlob(sig1Preview.src);
                    if (sig2Preview) sig2Blob = dataURLtoBlob(sig2Preview.src);
                    if (stampImg && stampImg.style.display !== 'none') stampBlob = dataURLtoBlob(stampImg.src);

                    const zip = new JSZip();
                    zip.file('contract.json', JSON.stringify(contractData, null, 2));
                    if (sig1Blob) zip.file('signature_A.png', sig1Blob);
                    if (sig2Blob) zip.file('signature_B.png', sig2Blob);
                    if (stampBlob) zip.file('stamp_opponent.png', stampBlob);
                    zip.file('signature_timestamp.txt', new Date().toISOString());

                    const zipBlob = await zip.generateAsync({ type: 'blob' });

                    const buffer = await zipBlob.arrayBuffer();
                    const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
                    const hashArray = Array.from(new Uint8Array(hashBuffer));
                    const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                    currentHash = hashHex;
                    hashDisplay.innerText = '证据包哈希值 (SHA-256): ' + hashHex;

                    const url = URL.createObjectURL(zipBlob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `contract_evidence_${contractData.contractNo}.zip`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } catch (error) {
                    alert('生成证据包失败：' + error.message);
                }
            });

            sendBtn.addEventListener('click', function() {
                const emailA = document.getElementById('emailPartyA').value.trim();
                const emailB = document.getElementById('emailPartyB').value.trim();
                if (!emailA || !emailB) {
                    alert('请输入双方邮箱地址');
                    return;
                }
                if (!currentHash) {
                    alert('请先生成证据包');
                    return;
                }
                const subject = '合同证据包 - ' + document.getElementById('contractNo').value;
                const body = `尊敬的双方，\n\n请查收附件中的合同证据包。\n证据包哈希值 (SHA-256): ${currentHash}\n\n您可以使用该哈希值验证文件的完整性。\n\n本邮件由系统自动生成，请勿回复。`;
                const mailtoLink = `mailto:${emailA},${emailB}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                window.location.href = mailtoLink;
            });
        })();
    </script>
</body>
</html>
