<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>厦门泽林 · 生技原料买卖合同 (绿金精装版)</title>
    <!-- 引入Google Font & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ========== 全局重置与字体 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Noto Sans TC', 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 1rem 0.8rem;  /* 缩小外边距 */
        }

        /* 主合同卡片 */
        .contract-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            box-shadow: 0 20px 40px -12px rgba(0, 55, 100, 0.25), 0 0 0 1px rgba(46, 125, 50, 0.15);
            padding: 1.5rem 1.8rem 1.2rem;  /* 缩减内边距 */
            transition: all 0.3s;
            position: relative;
        }

        /* ========== 页眉区域 ========== */
        .header {
            position: relative;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;  /* 缩小间距 */
            padding: 0.8rem 1rem;
            border-radius: 20px 20px 0 0;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-bottom: 3px solid #2E7D32;
            box-shadow: 0 8px 18px -10px #1B5E20;
            z-index: 1;
        }

        .header-content {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 0.3rem;
        }

        .brand-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem 1rem;
            width: 100%;
        }

        .logo-title-group {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        /* 页眉Logo高度120px */
        .brand-logo {
            height: 100px;  /* 稍缩小以适应紧凑布局，但仍醒目 */
            width: auto;
            max-width: 160px;
            object-fit: contain;
            opacity: 1;
            filter: drop-shadow(0 4px 8px rgba(46,125,50,0.3));
            border-radius: 16px;
            background: white;
            padding: 0.3rem;
            border: 1px solid #2E7D32;
            transition: transform 0.2s;
        }
        .brand-logo:hover { transform: scale(1.02); }

        .company-name {
            font-weight: 900;
            font-size: 1.8rem;  /* 稍微缩小以适应紧凑布局 */
            color: #1B5E20;
            line-height: 1.2;
            letter-spacing: 1px;
            white-space: nowrap;
            text-shadow: 2px 2px 6px rgba(46,125,50,0.15);
            background: linear-gradient(145deg, #1B5E20, #2E7D32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .doc-meta-header {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            background: #e8f5e9;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            box-shadow: 0 2px 8px rgba(0,35,0,0.05);
        }
        .doc-meta-header label {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.9rem;
            color: #1B5E20;
            font-weight: 500;
        }
        .doc-meta-header input {
            border: 1px solid #a5d6a7;
            border-radius: 40px;
            padding: 0.3rem 1rem;
            width: 130px;
            background: white;
            font-size: 0.9rem;
            transition: 0.15s;
        }
        .doc-meta-header input:focus {
            border-color: #2E7D32;
            outline: none;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.2);
        }

        .title-header h1 {
            font-size: 1.8rem;  /* 缩小标题 */
            font-weight: 800;
            background: linear-gradient(145deg, #1B5E20, #2E7D32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            margin-bottom: 0;
            padding-left: 0.2rem;
        }

        /* 角色切换 */
        .role-switch {
            background: #ffffff;
            border-radius: 60px;
            display: inline-flex;
            padding: 0.3rem;
            margin: 0 0 1.5rem 0.5rem;  /* 缩小外边距 */
            gap: 0.3rem;
            border: 1px solid #c8e6c9;
            box-shadow: 0 4px 10px rgba(0,40,0,0.1);
        }
        .role-switch label {
            padding: 0.5rem 1.8rem;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            color: #1B5E20;
            transition: 0.2s;
        }
        .role-switch input[type="radio"] { display: none; }
        .role-switch input:checked + label {
            background: #2E7D32;
            color: white;
            box-shadow: 0 4px 10px #1B5E20;
        }

        /* 公司卡片 */
        .company-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;  /* 缩小卡片间距 */
            margin-bottom: 1.5rem;
        }
        .company-card {
            flex: 1 1 300px;
            background: #fafdfa;
            border-radius: 20px;
            padding: 1.2rem 1.2rem;  /* 缩小内边距 */
            border: 1px solid #c8e6c9;
            box-shadow: 0 12px 24px -12px rgba(0,60,0,0.2);
        }
        .company-card h3 {
            color: #1B5E20;
            font-size: 1.2rem;
            border-left: 6px solid #FFB300;
            padding-left: 0.8rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #ffffff, #e8f5e9);
            border-radius: 0 16px 16px 0;
            line-height: 1.8;
        }
        .company-card p {
            margin: 0.6rem 0;  /* 缩小段落间距 */
            display: flex;
            align-items: baseline;
            font-size: 0.95rem;  /* 放大字体 */
        }
        .company-card p strong {
            width: 120px;
            color: #1B5E20;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .company-card input {
            border: 1px solid #a5d6a7;
            border-radius: 30px;
            padding: 0.4rem 1rem;
            width: 100%;
            background: white;
            font-size: 0.95rem;  /* 放大输入框字体 */
            transition: 0.15s;
        }
        .company-card input:focus {
            border-color: #2E7D32;
            box-shadow: 0 0 0 4px rgba(46,125,50,0.1);
            outline: none;
        }
        .bank-info {
            background: #e8f5e9;
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
            margin-top: 1rem;
            font-size: 0.95rem;
            border-left: 4px solid #FFB300;
        }

        /* 表格区域 */
        .items-section {
            margin: 1.5rem 0 1.2rem;
            overflow-x: auto;  /* 移动端表格可横向滚动 */
        }
        .items-section h3 {
            color: #1B5E20;
            font-size: 1.5rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 12px 24px -14px #1B5E20;
            min-width: 700px;  /* 保证表头不换行，窄屏时滚动 */
        }
        th {
            background: #c8e6c9;
            color: #1B5E20;
            font-weight: 700;
            padding: 0.7rem 0.3rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        td {
            padding: 0.5rem 0.3rem;
            border-bottom: 1px solid #e0f2e0;
            vertical-align: middle;
        }
        td input, td select {
            width: 100%;
            border: 1px solid #c8e6c9;
            border-radius: 30px;
            padding: 0.4rem 0.6rem;
            font-size: 0.95rem;  /* 放大表格内字体 */
            background: #f9fff9;
            transition: 0.15s;
        }
        td input:focus, td select:focus {
            border-color: #2E7D32;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.1);
        }
        .delete-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: #b71c1c;
            padding: 0 0.2rem;
            transition: 0.1s;
        }
        .delete-btn:hover { color: #d32f2f; transform: scale(1.15); }

        .total-row {
            text-align: right;
            margin: 1rem 0 1.5rem;
            font-size: 1.8rem;
            font-weight: 800;
            color: #1B5E20;
            background: linear-gradient(to right, #f1f8e9, #ffffff);
            padding: 0.4rem 1.8rem;
            border-radius: 60px;
            display: inline-block;
            float: right;
            box-shadow: 0 6px 14px rgba(0,80,0,0.1);
            border: 1px solid #c8e6c9;
        }

        .clause-box {
            clear: both;
            margin: 1.5rem 0 1.5rem;
        }
        .clause-box textarea {
            width: 100%;
            border: 1px solid #c8e6c9;
            border-radius: 20px;
            padding: 1rem 1.5rem;
            font-size: 1rem;  /* 放大条款字体 */
            line-height: 1.5;  /* 缩小行距 */
            background: #fefefe;
            resize: vertical;
            box-shadow: inset 0 2px 6px rgba(0,30,0,0.02);
        }

        /* 页脚签名区 (双印章并排) */
        .signature-footer {
            position: relative;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-end;
            margin: 1.5rem 0 1rem;
            padding: 1.2rem 1rem 1rem;
            border-top: 2px dashed #a5d6a7;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            overflow: hidden;
        }

        /* 页脚水印高度120px（稍缩小以适应紧凑） */
        .logo-watermark-footer {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
        }
        .logo-watermark-footer img {
            height: 120px;
            width: auto;
            object-fit: contain;
            margin-right: 0.5rem;
            margin-bottom: 0.3rem;
        }

        .signature-block {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }

        /* 双印章并排行 */
        .stamps-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            gap: 1rem;
        }

        .stamp-box {
            text-align: center;
            flex: 0 1 auto;
        }
        .stamp-box img {
            width: 100px;  /* 缩小印章尺寸 */
            height: auto;
            border-radius: 50%;
            background: #fff;
            padding: 0.2rem;
            box-shadow: 0 8px 18px -6px rgba(0,0,0,0.2), 0 0 0 1px #FFB300 inset;
            object-fit: contain;
        }
        .stamp-placeholder {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #eeeeee;
            border: 2px dashed #2E7D32;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1B5E20;
            font-weight: 600;
            font-size: 0.8rem;
            text-align: center;
            padding: 0.3rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin: 0 auto;
        }

        .signature-area {
            background: #fafdfa;
            border-radius: 20px;
            padding: 0.8rem 1.5rem;
            border: 1px solid #c8e6c9;
            box-shadow: 0 4px 12px -6px #1B5E20;
            width: 100%;
            max-width: 450px;
            align-self: center;
        }
        .signature-area canvas {
            border: 1px solid #a5d6a7;
            border-radius: 16px;
            background: #fff;
            touch-action: none;
            width: 100%;
            height: auto;
            max-width: 280px;
        }
        .signature-controls {
            margin-top: 0.5rem;
            display: flex;
            gap: 0.6rem;
            align-items: center;
            flex-wrap: wrap;
            font-size: 0.95rem;
        }
        .signature-controls button {
            background: #e8f5e9;
            border: none;
            color: #1B5E20;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #a5d6a7;
        }
        .signature-controls button:hover { background: #c8e6c9; }
        .signature-controls input[type="date"] {
            border: 1px solid #a5d6a7;
            border-radius: 40px;
            padding: 0.2rem 0.8rem;
            background: white;
        }

        /* 其他合同链接按钮 */
        .other-contracts-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 15px 0 10px;
        }
        .other-contracts-links a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: white;
            color: #1B5E20;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.95rem;
            border: 2px solid #2E7D32;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(46,125,50,0.15);
        }
        .other-contracts-links a:hover {
            background: #2E7D32;
            color: white;
            border-color: #FFB300;
            transform: translateY(-3px);
        }
        .other-contracts-links i {
            font-size: 1rem;
            color: #FFB300;
        }
        .other-contracts-links a:hover i {
            color: white;
        }

        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            margin: 1.2rem 0 0.2rem;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            background: #2E7D32;
            color: white;
            font-size: 1rem;
            padding: 0.7rem 2.2rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 12px 20px -8px #1B5E20;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-light {
            background: #f5f5f5;
            color: #1B5E20;
            box-shadow: 0 6px 14px #c8e6c9;
        }
        .btn:hover { background: #1B5E20; transform: translateY(-3px); }
        .btn-light:hover { background: #e8f5e9; transform: translateY(-3px); }

        /* 打印样式 */
        @media print {
            body { background: white; padding: 0.2in; }
            .contract-container { box-shadow: none; border: 1px solid #aaa; padding: 0.2in; border-radius: 0; background: white; }
            .no-print, .btn, #addRowBtn, .delete-btn, .action-buttons, .role-switch, .signature-controls button,
            .other-contracts-links { display: none !important; }
            td:last-child, th:last-child { display: none; }
            input, select, textarea { border: none !important; background: transparent !important; border-bottom: 1px solid #333 !important; }
            th { background: #eaeaea !important; }
            .brand-logo { filter: grayscale(1); opacity: 0.8; }
            .company-name { -webkit-text-fill-color: #1B5E20; color: #1B5E20; background: none; }
            .stamp-box img, .stamp-placeholder { max-width: 80px; }
            .stamp-placeholder { border: 1px solid #000; background: #f9f9f9; }
        }

        /* 移动端优化 */
        @media (max-width: 700px) {
            body { padding: 0.5rem; }
            .contract-container { padding: 1rem 1rem 0.8rem; }
            .brand-logo { height: 80px; }
            .company-name { font-size: 1.5rem; white-space: normal; }
            .title-header h1 { font-size: 1.5rem; }
            .doc-meta-header label { font-size: 0.8rem; }
            .doc-meta-header input { width: 100px; padding: 0.2rem 0.6rem; }
            .role-switch label { padding: 0.4rem 1.2rem; font-size: 0.9rem; }
            .company-card p { font-size: 0.9rem; }
            .company-card p strong { width: 100px; }
            .total-row { font-size: 1.5rem; padding: 0.3rem 1.2rem; }
            .clause-box textarea { font-size: 0.95rem; padding: 0.8rem 1rem; }
            .stamp-box img, .stamp-placeholder { width: 80px; height: 80px; }
            .stamp-placeholder { font-size: 0.7rem; }
            .signature-area { padding: 0.6rem 1rem; }
            .signature-area canvas { max-width: 240px; }
            .other-contracts-links a { padding: 6px 14px; font-size: 0.85rem; }
            .btn { padding: 0.6rem 1.8rem; font-size: 0.95rem; }
        }
        /* 确保表格在小屏可滚动 */
        .items-section {
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>
    <div class="contract-container">
        <!-- 页眉：放大Logo + 粗体公司名 -->
        <div class="header">
            <div class="header-content">
                <div class="brand-row">
                    <div class="logo-title-group">
                        <img class="brand-logo" src="images/xmzelin-logo.png" alt="厦门泽林" onerror="this.onerror=null; this.src='https://via.placeholder.com/200x100?text=Zelin+Bio';">
                        <span class="company-name">厦门泽林生物科技有限公司</span>
                    </div>
                    <div class="doc-meta-header no-print">
                        <label>合同编号 <input type="text" id="contractNo" value="ZL-SC-2025-001"></label>
                        <label>签订日期 <input type="date" id="contractDate" value="2025-03-03"></label>
                        <label>签订地点 <input type="text" id="contractPlace" value="厦门市"></label>
                    </div>
                </div>
                <div class="title-header">
                    <h1 id="contractTitle">生技原料买卖合同</h1>
                </div>
            </div>
        </div>

        <!-- 角色切换 -->
        <div class="role-switch no-print" id="roleToggle">
            <input type="radio" name="zelinRole" id="roleSeller" value="seller" checked>
            <label for="roleSeller">🌿 泽林为卖方</label>
            <input type="radio" name="zelinRole" id="roleBuyer" value="buyer">
            <label for="roleBuyer">🧪 泽林为买方</label>
        </div>

        <!-- 买卖双方卡片 -->
        <div class="company-row">
            <div class="company-card" id="sellerCard">
                <h3 id="sellerTitle">卖方（供方）</h3>
                <div id="sellerContent"></div>
            </div>
            <div class="company-card" id="buyerCard">
                <h3 id="buyerTitle">买方（需方）</h3>
                <div id="buyerContent"></div>
            </div>
        </div>

        <!-- 原料表格 -->
        <div class="items-section">
            <h3>📋 原料明细</h3>
            <table id="itemsTable">
                <thead>
                    <tr><th>#</th><th>原料名称</th><th>规格/CAS</th><th>数量</th><th>单位</th><th>单价(¥)</th><th>总价(¥)</th><th class="no-print">操作</th></tr>
                </thead>
                <tbody id="itemsBody"></tbody>
            </table>
            <button class="btn-light no-print" id="addRowBtn" style="margin-top:0.8rem;">➕ 增加一行</button>
        </div>

        <!-- 总计金额 -->
        <div class="total-row" id="grandTotalSpan">¥ 0.00</div>

        <!-- 合同条款 (已完善且无引用标记) -->
        <div class="clause-box">
            <textarea id="contractClauses" rows="7">
一、产品与质量标准
1. 产品名称、规格、数量、单价及总价详见上表。
2. 质量要求：按供方企业标准（Q/XL 001-2025）或双方确认的样品/技术资料执行，产品应符合国家相关法规及行业标准。
3. 包装要求：采用适合长途运输的防潮、防污染包装，包装物不回收。

二、交货与运输
1. 交货时间：买方支付预付款后 15 个工作日内发货，或按双方另行书面确认的交期执行。
2. 交货地点：厦门港 / 供方仓库（以卖方通知为准）。
3. 运输方式及费用：供方负责代办运输，运费由供方承担；若买方指定物流，费用由买方承担。

三、验收与异议
1. 验收期限：买方收到货物后 5 个工作日内完成数量与外观验收；内在质量问题应在 15 日内书面提出，否则视为合格。
2. 质量异议：如发现产品不符合约定，买方应立即通知供方，双方协商处理；供方应在 7 日内予以更换或退货。

四、结算方式
1. 合同签订后 3 日内预付总金额的 30%，货到验收合格并收到全额增值税专用发票后 15 日内付清余款。
2. 所有款项以银行转账支付至本合同载明的供方账户。

五、违约责任
1. 供方逾期交货，每逾一日按未交付货物价值的 0.5% 支付违约金；逾期超过 15 日，买方有权解除合同。
2. 买方逾期付款，每逾一日按应付未付款项的 0.5% 支付违约金；逾期超过 15 日，供方有权停止发货并解除合同。
3. 任何一方擅自解除合同，应承担合同总金额 20% 的违约金。

六、免责条款
因不可抗力（如自然灾害、战争、疫情、政府行为等）导致不能履行合同的，受影响方应及时通知对方并提供证明，可免除相应违约责任。

七、争议解决
因本合同引起的任何争议，双方应友好协商；协商不成时，提交厦门仲裁委员会按照申请仲裁时该会现行有效的仲裁规则进行仲裁。

八、其他
1. 本合同自双方签字盖章之日起生效，一式两份，双方各执一份，具有同等法律效力。
2. 任何未尽事宜，可签订补充协议，补充协议与本合同具有同等效力。

    <script>
        (function() {
            // ---------- 厦门泽林固定信息 (已移除存款编号) ----------
            const ZELIN_INFO = {
                name: '厦门泽林生物科技有限公司',
                address: '中国(福建)自由贸易试验区厦门片区嵩屿中路809号航运大厦1102室之260',
                contactPerson: '李易昌',
                phone: '0592-6881234',
                taxId: '91350200MAERUOWJXD',
                bankName: '中国工商银行股份有限公司厦门海沧支行',
                bankAccount: '4100026009200404571',
                accountName: '厦门泽林生物科技有限公司'
            };

            const roleSeller = document.getElementById('roleSeller');
            const roleBuyer = document.getElementById('roleBuyer');
            const sellerTitle = document.getElementById('sellerTitle');
            const buyerTitle = document.getElementById('buyerTitle');
            const sellerContent = document.getElementById('sellerContent');
            const buyerContent = document.getElementById('buyerContent');
            const contractTitle = document.getElementById('contractTitle');

            const itemsBody = document.getElementById('itemsBody');
            const addRowBtn = document.getElementById('addRowBtn');
            const grandTotalSpan = document.getElementById('grandTotalSpan');

            const unitOptions = ['kg', '吨', 'L', 'g', '袋', '桶'];

            function renderCompanyCards() {
                if (roleSeller.checked) {
                    sellerTitle.innerText = '卖方（供方）· 厦门泽林';
                    sellerContent.innerHTML = buildZelinSellerHTML();
                    buyerTitle.innerText = '买方（需方）';
                    buyerContent.innerHTML = buildBuyerEditableHTML();
                    contractTitle.innerText = '生技原料销售合同';
                } else {
                    sellerTitle.innerText = '卖方（供方）';
                    sellerContent.innerHTML = buildSellerEditableHTML();
                    buyerTitle.innerText = '买方（需方）· 厦门泽林';
                    buyerContent.innerHTML = buildZelinBuyerHTML();
                    contractTitle.innerText = '生技原料采购合同';
                }
            }

            function buildZelinSellerHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="${ZELIN_INFO.name}" placeholder="公司全称"></p>
                    <p><strong>地址</strong> <input type="text" value="${ZELIN_INFO.address}" placeholder="地址"></p>
                    <p><strong>联系人</strong> <input type="text" value="${ZELIN_INFO.contactPerson}" placeholder="联系人"></p>
                    <p><strong>电话</strong> <input type="text" value="${ZELIN_INFO.phone}" placeholder="电话"></p>
                    <p><strong>统一社会信用代码</strong> <input type="text" value="${ZELIN_INFO.taxId}" placeholder="税号"></p>
                    <div class="bank-info">
                        <p><strong>开户行</strong> ${ZELIN_INFO.bankName}</p>
                        <p><strong>账号</strong> ${ZELIN_INFO.bankAccount}</p>
                        <p><strong>账户名</strong> ${ZELIN_INFO.accountName}</p>
                    </div>
                `;
            }

            function buildZelinBuyerHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="${ZELIN_INFO.name}" placeholder="公司全称"></p>
                    <p><strong>地址</strong> <input type="text" value="${ZELIN_INFO.address}" placeholder="地址"></p>
                    <p><strong>联系人</strong> <input type="text" value="${ZELIN_INFO.contactPerson}" placeholder="联系人"></p>
                    <p><strong>电话</strong> <input type="text" value="${ZELIN_INFO.phone}" placeholder="电话"></p>
                    <p><strong>统一社会信用代码</strong> <input type="text" value="${ZELIN_INFO.taxId}" placeholder="税号"></p>
                `;
            }

            function buildSellerEditableHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="浙江华发生物" placeholder="卖方公司全称"></p>
                    <p><strong>地址</strong> <input type="text" value="杭州市萧山科技城" placeholder="地址"></p>
                    <p><strong>联系人</strong> <input type="text" value="张明" placeholder="联系人"></p>
                    <p><strong>电话</strong> <input type="text" value="0571-86527890" placeholder="电话"></p>
                    <p><strong>统一社会信用代码</strong> <input type="text" value="91330100MA27XXXXX" placeholder="税号"></p>
                    <p><strong>开户行</strong> <input type="text" value="工行杭州萧山支行" placeholder="开户行"></p>
                    <p><strong>账号</strong> <input type="text" value="1202026209900401234" placeholder="银行账号"></p>
                `;
            }

            function buildBuyerEditableHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="江苏正大生物" placeholder="买方公司全称"></p>
                    <p><strong>地址</strong> <input type="text" value="南京市浦口区" placeholder="地址"></p>
                    <p><strong>联系人</strong> <input type="text" value="王芳" placeholder="联系人"></p>
                    <p><strong>电话</strong> <input type="text" value="025-58123456" placeholder="电话"></p>
                    <p><strong>统一社会信用代码</strong> <input type="text" value="91320100MA1XXXXXX" placeholder="税号"></p>
                    <p><strong>开户行</strong> <input type="text" value="农行南京分行" placeholder="开户行"></p>
                    <p><strong>账号</strong> <input type="text" value="6228480402564890012" placeholder="银行账号"></p>
                `;
            }

            function createRow(seq, name = '', spec = '', qty = 1, unit = 'kg', price = 0) {
                const unitSelect = `<select class="unit-select">${unitOptions.map(u => `<option value="${u}" ${u === unit ? 'selected' : ''}>${u}</option>`).join('')}</select>`;
                return `
                    <tr>
                        <td style="text-align:center;">${seq}</td>
                        <td><input type="text" class="item-name" value="${name}" placeholder="原料名"></td>
                        <td><input type="text" class="item-spec" value="${spec}" placeholder="CAS/规格"></td>
                        <td><input type="number" class="item-qty" value="${qty}" min="0.001" step="0.001"></td>
                        <td>${unitSelect}</td>
                        <td><input type="number" class="item-price" value="${price}" min="0" step="0.01"></td>
                        <td><span class="item-total">0.00</span></td>
                        <td class="no-print"><button class="delete-btn">✖</button></td>
                    </tr>
                `;
            }

            function refreshRowsAndTotal() {
                const rows = itemsBody.querySelectorAll('tr');
                let grandTotal = 0;
                rows.forEach((row, idx) => {
                    row.cells[0].innerText = idx + 1;
                    const qty = parseFloat(row.querySelector('.item-qty')?.value) || 0;
                    const price = parseFloat(row.querySelector('.item-price')?.value) || 0;
                    const rowTotal = qty * price;
                    row.querySelector('.item-total').innerText = rowTotal.toFixed(2);
                    grandTotal += rowTotal;
                });
                grandTotalSpan.innerText = '¥ ' + grandTotal.toFixed(2);
            }

            function attachRowEvents(row) {
                row.querySelector('.item-qty')?.addEventListener('input', refreshRowsAndTotal);
                row.querySelector('.item-price')?.addEventListener('input', refreshRowsAndTotal);
                row.querySelector('.delete-btn')?.addEventListener('click', function() {
                    if (itemsBody.children.length <= 1) { alert('至少保留一行'); return; }
                    row.remove();
                    refreshRowsAndTotal();
                });
                row.querySelector('.unit-select')?.addEventListener('change', refreshRowsAndTotal);
            }

            function addNewRow() {
                const newSeq = (itemsBody.children.length || 0) + 1;
                const temp = document.createElement('tbody');
                temp.innerHTML = createRow(newSeq, '', '', 1, 'kg', 0);
                const newRow = temp.firstElementChild;
                itemsBody.appendChild(newRow);
                attachRowEvents(newRow);
                refreshRowsAndTotal();
            }

            function initTable() {
                itemsBody.innerHTML = '';
                let temp = document.createElement('tbody');
                temp.innerHTML = createRow(1, 'L-赖氨酸', 'CAS:56-87-1', 500, 'kg', 12.5);
                itemsBody.appendChild(temp.firstElementChild);
                temp.innerHTML = createRow(2, '维生素C', 'USP级', 200, 'kg', 38.0);
                itemsBody.appendChild(temp.firstElementChild);
                Array.from(itemsBody.children).forEach(row => attachRowEvents(row));
                refreshRowsAndTotal();
            }

            function collectFormData() {
                const contractNo = document.getElementById('contractNo').value;
                const contractDate = document.getElementById('contractDate').value;
                const contractPlace = document.getElementById('contractPlace').value;
                const role = roleSeller.checked ? '泽林为卖方' : '泽林为买方';
                const clauses = document.getElementById('contractClauses').value;

                const sellerInputs = sellerContent.querySelectorAll('input');
                const seller = {};
                sellerInputs.forEach(input => {
                    const label = input.previousElementSibling?.innerText || '';
                    if (label.includes('公司名称')) seller.name = input.value;
                    else if (label.includes('地址')) seller.address = input.value;
                    else if (label.includes('联系人')) seller.contact = input.value;
                    else if (label.includes('电话')) seller.phone = input.value;
                    else if (label.includes('统一社会信用代码')) seller.taxId = input.value;
                    else if (label.includes('开户行')) seller.bank = input.value;
                    else if (label.includes('账号')) seller.account = input.value;
                });

                const buyerInputs = buyerContent.querySelectorAll('input');
                const buyer = {};
                buyerInputs.forEach(input => {
                    const label = input.previousElementSibling?.innerText || '';
                    if (label.includes('公司名称')) buyer.name = input.value;
                    else if (label.includes('地址')) buyer.address = input.value;
                    else if (label.includes('联系人')) buyer.contact = input.value;
                    else if (label.includes('电话')) buyer.phone = input.value;
                    else if (label.includes('统一社会信用代码')) buyer.taxId = input.value;
                    else if (label.includes('开户行')) buyer.bank = input.value;
                    else if (label.includes('账号')) buyer.account = input.value;
                });

                const items = [];
                const rows = itemsBody.querySelectorAll('tr');
                rows.forEach(row => {
                    items.push({
                        name: row.querySelector('.item-name')?.value || '',
                        spec: row.querySelector('.item-spec')?.value || '',
                        qty: parseFloat(row.querySelector('.item-qty')?.value) || 0,
                        unit: row.querySelector('.unit-select')?.value || 'kg',
                        price: parseFloat(row.querySelector('.item-price')?.value) || 0,
                        total: parseFloat(row.querySelector('.item-total')?.innerText) || 0
                    });
                });

                const totalAmount = parseFloat(grandTotalSpan.innerText.replace('¥ ', '')) || 0;

                return {
                    contractNo, contractDate, contractPlace, role, seller, buyer, items, totalAmount, clauses,
                    exportedAt: new Date().toISOString()
                };
            }

            function exportJson() {
                const data = collectFormData();
                const contractNo = data.contractNo.replace(/[^a-zA-Z0-9\-_]/g, '_') || 'contract';
                const filename = `${contractNo}.json`;
                const jsonStr = JSON.stringify(data, null, 2);
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            roleSeller.addEventListener('change', renderCompanyCards);
            roleBuyer.addEventListener('change', renderCompanyCards);
            addRowBtn.addEventListener('click', addNewRow);
            document.getElementById('printPDFBtn').addEventListener('click', () => window.print());
            document.getElementById('exportJsonBtn').addEventListener('click', exportJson);

            renderCompanyCards();
            initTable();

            const canvas = document.getElementById('signatureCanvas');
            if (canvas) {
                let drawing = false;
                const ctx = canvas.getContext('2d');
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#000';

                function getCoords(e) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    let clientX, clientY;
                    if (e.touches) {
                        clientX = e.touches[0].clientX;
                        clientY = e.touches[0].clientY;
                        e.preventDefault();
                    } else {
                        clientX = e.clientX;
                        clientY = e.clientY;
                    }
                    return {
                        x: (clientX - rect.left) * scaleX,
                        y: (clientY - rect.top) * scaleY
                    };
                }

                function startDrawing(e) {
                    drawing = true;
                    ctx.beginPath();
                    const coords = getCoords(e);
                    ctx.moveTo(coords.x, coords.y);
                }

                function draw(e) {
                    if (!drawing) return;
                    e.preventDefault();
                    const coords = getCoords(e);
                    ctx.lineTo(coords.x, coords.y);
                    ctx.stroke();
                }

                function stopDrawing() {
                    drawing = false;
                    ctx.closePath();
                }

                canvas.addEventListener('mousedown', startDrawing);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', stopDrawing);
                canvas.addEventListener('mouseleave', stopDrawing);

                canvas.addEventListener('touchstart', startDrawing, { passive: false });
                canvas.addEventListener('touchmove', draw, { passive: false });
                canvas.addEventListener('touchend', stopDrawing);
                canvas.addEventListener('touchcancel', stopDrawing);

                document.getElementById('clearSignatureBtn').addEventListener('click', function() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                });
            }
        })();
    </script>
