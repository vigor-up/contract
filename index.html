<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>厦门泽林 · 生技原料买卖合同 (双Logo精装版)</title>
    <style>
        /* ========== 全局重置与字体 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', 'Noto Sans', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #d4e6f5 0%, #eef5fa 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        /* 主合同卡片 */
        .contract-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            border-radius: 42px;
            box-shadow: 0 30px 55px -15px rgba(0, 60, 100, 0.4), inset 0 1px 3px rgba(255,255,255,0.8);
            padding: 2.2rem 2.5rem 2rem;
            border: 1px solid rgba(0, 120, 200, 0.25);
            transition: all 0.25s;
        }

        /* ========== 页眉区域 ========== */
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding-bottom: 1.2rem;
            border-bottom: 3px solid #2f89c0;
            background: linear-gradient(to right, #f8fcff, #ffffff);
            border-radius: 30px 30px 0 0;
            padding: 1.2rem 1.5rem;
        }

        .logo-header img {
            max-height: 80px;  /* 放大页眉logo */
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,70,120,0.15));
            transition: transform 0.2s;
        }
        .logo-header img:hover { transform: scale(1.02); }

        .title-header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(145deg, #0b4b77, #2273a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1.2px;
            margin-bottom: 0.2rem;
            text-shadow: 2px 2px 4px rgba(0,50,80,0.1);
        }

        .doc-meta-header {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            background: #ecf5fc;
            padding: 0.6rem 1.4rem;
            border-radius: 50px;
        }
        .doc-meta-header label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.95rem;
            color: #135b87;
            font-weight: 500;
        }
        .doc-meta-header input {
            border: 1px solid #bfdaf0;
            border-radius: 40px;
            padding: 0.4rem 1.2rem;
            width: 150px;
            background: white;
            font-size: 0.95rem;
            transition: 0.15s;
        }
        .doc-meta-header input:focus {
            border-color: #2f89c0;
            outline: none;
            box-shadow: 0 0 0 3px rgba(47,137,192,0.2);
        }

        /* ========== 角色切换 ========== */
        .role-switch {
            background: #ffffffd9;
            border-radius: 60px;
            display: inline-flex;
            padding: 0.4rem;
            margin: 0 0 2rem 1rem;
            gap: 0.4rem;
            border: 1px solid #b0d0eb;
            box-shadow: 0 6px 12px rgba(0,40,70,0.1);
        }
        .role-switch label {
            padding: 0.5rem 2.2rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: #1e4a72;
            transition: 0.15s;
        }
        .role-switch input[type="radio"] { display: none; }
        .role-switch input:checked + label {
            background: #0b4970;
            color: white;
            box-shadow: 0 4px 10px #003c6e66;
        }

        /* ========== 公司信息卡片 ========== */
        .company-row {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            margin-bottom: 2.2rem;
        }
        .company-card {
            flex: 1 1 340px;
            background: #f5fafd;
            border-radius: 28px;
            padding: 1.8rem 1.8rem;
            border: 1px solid #cde4f5;
            box-shadow: 0 12px 24px -12px rgba(0,70,120,0.2);
        }
        .company-card h3 {
            color: #103f60;
            font-size: 1.3rem;
            border-left: 8px solid #2f89c0;
            padding-left: 1rem;
            margin-bottom: 1.4rem;
            background: linear-gradient(to right, #ffffff, #f0f8ff);
            border-radius: 0 20px 20px 0;
            line-height: 2;
        }
        .company-card p {
            margin: 0.7rem 0;
            display: flex;
            align-items: baseline;
        }
        .company-card p strong {
            width: 100px;
            color: #1f537a;
            font-weight: 600;
        }
        .company-card input {
            border: 1px solid #c0d8ee;
            border-radius: 30px;
            padding: 0.5rem 1.2rem;
            width: 100%;
            background: white;
            font-size: 0.95rem;
            transition: 0.15s;
        }
        .company-card input:focus {
            border-color: #2f89c0;
            box-shadow: 0 0 0 3px rgba(47,137,192,0.15);
            outline: none;
        }
        .bank-info {
            background: #e7f0f9;
            border-radius: 20px;
            padding: 1rem 1.3rem;
            margin-top: 1.2rem;
            font-size: 0.9rem;
            border-left: 4px solid #1d6fa5;
        }

        /* ========== 原料明细表格 ========== */
        .items-section {
            margin: 2rem 0 1.8rem;
        }
        .items-section h3 {
            color: #154f78;
            font-size: 1.5rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 10px 25px -8px #002d4640;
        }
        th {
            background: #c7e2f5;
            color: #0c3b57;
            font-weight: 600;
            padding: 0.9rem 0.4rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        td {
            padding: 0.7rem 0.4rem;
            border-bottom: 1px solid #d9eaf7;
            vertical-align: middle;
        }
        td input, td select {
            width: 100%;
            border: 1px solid #b8d6f0;
            border-radius: 30px;
            padding: 0.5rem 0.8rem;
            font-size: 0.9rem;
            background: #f9fcff;
            transition: 0.15s;
        }
        td input:focus, td select:focus {
            border-color: #2f89c0;
            outline: none;
            background: white;
        }
        .delete-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #a13d3d;
            padding: 0 0.4rem;
            transition: 0.1s;
        }
        .delete-btn:hover { color: #c00; transform: scale(1.2); }

        .total-row {
            text-align: right;
            margin: 1.2rem 0 1.5rem;
            font-size: 2rem;
            font-weight: 700;
            color: #07426b;
            background: linear-gradient(to right, #e6f2fa, #ffffff);
            padding: 0.8rem 2rem;
            border-radius: 60px;
            display: inline-block;
            float: right;
            box-shadow: 0 4px 10px rgba(0,50,80,0.1);
        }

        /* ========== 条款区域 ========== */
        .clause-box {
            clear: both;
            margin: 2rem 0 2rem;
        }
        .clause-box textarea {
            width: 100%;
            border: 1px solid #bcd3e9;
            border-radius: 28px;
            padding: 1.3rem 1.8rem;
            font-size: 0.95rem;
            line-height: 1.7;
            background: #fcfdff;
            resize: vertical;
            box-shadow: inset 0 2px 6px rgba(0,30,50,0.05);
        }

        /* ========== 签章区 + 页脚logo ========== */
        .signature-footer {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-end;
            margin: 2rem 0 1.5rem;
            padding-top: 1rem;
            border-top: 2px dashed #a0c4e2;
        }
        .signature-block {
            display: flex;
            gap: 2.5rem;
            flex-wrap: wrap;
        }
        .stamp-box {
            text-align: center;
            width: 150px;
        }
        .stamp-box img {
            max-width: 130px;
            max-height: 130px;
            border-radius: 12px;
            background: #fff;
            padding: 0.3rem;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }
        .signature-lines p {
            margin: 0.5rem 0;
            font-size: 1rem;
            color: #1e3e5c;
        }
        .footer-logo {
            text-align: right;
        }
        .footer-logo img {
            max-height: 70px;   /* 页脚logo放大 */
            width: auto;
            opacity: 0.9;
            filter: drop-shadow(0 4px 6px rgba(0,70,100,0.2));
        }
        .footer-logo p {
            font-size: 0.8rem;
            color: #597b9b;
            margin-top: 0.2rem;
        }

        /* ========== 操作按钮 ========== */
        .action-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 2.5rem;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            background: #1d5f8c;
            color: white;
            font-size: 1.05rem;
            padding: 0.9rem 2.8rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 12px 22px -6px #004678b3;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-light {
            background: #eef5fb;
            color: #154f78;
            box-shadow: 0 6px 14px #00305440;
        }
        .btn:hover { background: #0e4468; transform: translateY(-3px); }
        .btn-light:hover { background: #d5e6f5; transform: translateY(-2px); }

        /* ========== 打印样式 ========== */
        @media print {
            body { background: white; padding: 0.15in; }
            .contract-container { box-shadow: none; border: 1px solid #aaa; padding: 0.2in; border-radius: 0; }
            .no-print, .btn, #addRowBtn, .delete-btn, .action-buttons, .role-switch { display: none !important; }
            td:last-child, th:last-child { display: none; }
            input, select, textarea {
                border: none !important; background: transparent !important; border-bottom: 1px solid #333 !important;
                -webkit-print-color-adjust: exact; print-color-adjust: exact;
            }
            th { background: #eaeaea !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .company-card, .bank-info { border: 1px solid #aaa; background: #f9f9f9 !important; }
            .logo-header img, .footer-logo img { max-height: 60px; opacity: 0.8; }
            .signature-footer { border-top: 2px solid #333; }
        }

        /* 移动端优化 */
        @media (max-width: 700px) {
            .header { flex-direction: column; align-items: start; gap: 1rem; }
            .doc-meta-header { width: 100%; }
            .doc-meta-header label { width: 100%; }
            .total-row { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="contract-container">
        <!-- ========== 页眉区域（嵌入大Logo） ========== -->
        <div class="header">
            <div class="logo-header">
                <img src="images/xmzelin-logo.png" alt="厦门泽林生物科技" onerror="this.onerror=null; this.src='https://via.placeholder.com/200x80?text=Zelin+Bio';">
            </div>
            <div class="title-header">
                <h1 id="contractTitle">生技原料买卖合同</h1>
            </div>
            <div class="doc-meta-header no-print">
                <label>合同编号 <input type="text" id="contractNo" value="ZL-SC-2025-001"></label>
                <label>签订日期 <input type="date" id="contractDate" value="2025-03-03"></label>
                <label>签订地点 <input type="text" id="contractPlace" value="厦门市"></label>
            </div>
        </div>

        <!-- 角色切换 -->
        <div class="role-switch no-print" id="roleToggle">
            <input type="radio" name="zelinRole" id="roleSeller" value="seller" checked>
            <label for="roleSeller">🌿 泽林为卖方</label>
            <input type="radio" name="zelinRole" id="roleBuyer" value="buyer">
            <label for="roleBuyer">🧪 泽林为买方</label>
        </div>

        <!-- 买卖双方信息卡片 -->
        <div class="company-row">
            <div class="company-card" id="sellerCard">
                <h3 id="sellerTitle">卖方（供方）</h3>
                <div id="sellerContent"></div>
            </div>
            <div class="company-card" id="buyerCard">
                <h3 id="buyerTitle">买方（需方）</h3>
                <div id="buyerContent"></div>
            </div>
        </div>

        <!-- 产品明细表格 -->
        <div class="items-section">
            <h3>📋 原料明细</h3>
            <table id="itemsTable">
                <thead>
                    <tr><th>#</th><th>原料名称</th><th>规格/CAS</th><th>数量</th><th>单位</th><th>单价(¥)</th><th>总价(¥)</th><th class="no-print">操作</th></tr>
                </thead>
                <tbody id="itemsBody"></tbody>
            </table>
            <button class="btn-light no-print" id="addRowBtn" style="margin-top:1rem;">➕ 增加一行</button>
        </div>

        <!-- 总计金额 -->
        <div class="total-row" id="grandTotalSpan">¥ 0.00</div>

        <!-- 合同条款（可编辑） -->
        <div class="clause-box">
            <textarea id="contractClauses" rows="6">一、质量标准：按供方企业标准或双方确认的样品/技术资料执行。
二、交货地点及方式：厦门港 / 供方仓库，运费由供方承担。
三、结算方式及期限：合同签订后预付30%，货到验收合格付清余款。
四、违约责任：按《中华人民共和国民法典》执行。
五、争议解决：协商不成提交厦门仲裁委员会仲裁。
六、本合同一式两份，双方各执一份，盖章生效。</textarea>
        </div>

        <!-- ========== 页脚区域：签名 + 印章 + 页脚Logo ========== -->
        <div class="signature-footer">
            <div class="signature-block">
                <div class="stamp-box">
                    <img src="images/stamp.png" alt="公司印章" onerror="this.onerror=null; this.src='https://via.placeholder.com/120x120?text=Seal';">
                    <p>厦门泽林生物科技<br>合同专用章</p>
                </div>
                <div class="signature-lines">
                    <p>授权代表签字：_________________</p>
                    <p>日期：_________________</p>
                </div>
            </div>
            <div class="footer-logo">
                <img src="images/xmzelin-logo.png" alt="厦门泽林" onerror="this.onerror=null; this.src='https://via.placeholder.com/180x70?text=Zelin';">
                <p>质量为本 · 科技领先</p>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-buttons no-print">
            <button class="btn" id="printPDFBtn">🖨️ 打印 / 生成PDF</button>
            <button class="btn btn-light" id="exportJsonBtn">📥 导出 JSON 备份</button>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 厦门泽林固定信息 ----------
            const ZELIN_INFO = {
                name: '厦门泽林生物科技有限公司',
                address: '中国(福建)自由贸易试验区厦门片区嵩屿中路809号航运大厦1102室之260',
                contactPerson: '李易昌',
                phone: '0592-6881234',
                taxId: '91350200MAERUOWJXD',
                bankName: '中国工商银行股份有限公司厦门海沧支行',
                bankAccount: '4100026009200404571',
                accountName: '厦门泽林生物科技有限公司',
                accountNo: 'J9033009110101'
            };

            const roleSeller = document.getElementById('roleSeller');
            const roleBuyer = document.getElementById('roleBuyer');
            const sellerTitle = document.getElementById('sellerTitle');
            const buyerTitle = document.getElementById('buyerTitle');
            const sellerContent = document.getElementById('sellerContent');
            const buyerContent = document.getElementById('buyerContent');
            const contractTitle = document.getElementById('contractTitle');

            const itemsBody = document.getElementById('itemsBody');
            const addRowBtn = document.getElementById('addRowBtn');
            const grandTotalSpan = document.getElementById('grandTotalSpan');

            const unitOptions = ['kg', '吨', 'L', 'g', '袋', '桶'];

            function renderCompanyCards() {
                if (roleSeller.checked) {
                    sellerTitle.innerText = '卖方（供方）· 厦门泽林';
                    sellerContent.innerHTML = buildZelinSellerHTML();
                    buyerTitle.innerText = '买方（需方）';
                    buyerContent.innerHTML = buildBuyerEditableHTML();
                    contractTitle.innerText = '生技原料销售合同';
                } else {
                    sellerTitle.innerText = '卖方（供方）';
                    sellerContent.innerHTML = buildSellerEditableHTML();
                    buyerTitle.innerText = '买方（需方）· 厦门泽林';
                    buyerContent.innerHTML = buildZelinBuyerHTML();
                    contractTitle.innerText = '生技原料采购合同';
                }
            }

            function buildZelinSellerHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="${ZELIN_INFO.name}" placeholder="公司全称"></p>
                    <p><strong>地址</strong> <input type="text" value="${ZELIN_INFO.address}" placeholder="地址"></p>
                    <p><strong>联系人</strong> <input type="text" value="${ZELIN_INFO.contactPerson}" placeholder="联系人"></p>
                    <p><strong>电话</strong> <input type="text" value="${ZELIN_INFO.phone}" placeholder="电话"></p>
                    <p><strong>统一代码</strong> <input type="text" value="${ZELIN_INFO.taxId}" placeholder="税号"></p>
                    <div class="bank-info">
                        <p><strong>开户行</strong> ${ZELIN_INFO.bankName}</p>
                        <p><strong>账号</strong> ${ZELIN_INFO.bankAccount}</p>
                        <p><strong>账户名</strong> ${ZELIN_INFO.accountName}</p>
                        <p><strong>存款编号</strong> ${ZELIN_INFO.accountNo}</p>
                    </div>
                `;
            }

            function buildZelinBuyerHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="${ZELIN_INFO.name}" placeholder="公司全称"></p>
                    <p><strong>地址</strong> <input type="text" value="${ZELIN_INFO.address}" placeholder="地址"></p>
                    <p><strong>联系人</strong> <input type="text" value="${ZELIN_INFO.contactPerson}" placeholder="联系人"></p>
                    <p><strong>电话</strong> <input type="text" value="${ZELIN_INFO.phone}" placeholder="电话"></p>
                    <p><strong>统一代码</strong> <input type="text" value="${ZELIN_INFO.taxId}" placeholder="税号"></p>
                `;
            }

            function buildSellerEditableHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="浙江华发生物" placeholder="卖方公司全称"></p>
                    <p><strong>地址</strong> <input type="text" value="杭州市萧山科技城" placeholder="地址"></p>
                    <p><strong>联系人</strong> <input type="text" value="张明" placeholder="联系人"></p>
                    <p><strong>电话</strong> <input type="text" value="0571-86527890" placeholder="电话"></p>
                    <p><strong>统一代码</strong> <input type="text" value="91330100MA27XXXXX" placeholder="税号"></p>
                    <p><strong>开户行</strong> <input type="text" value="工行杭州萧山支行" placeholder="开户行"></p>
                    <p><strong>账号</strong> <input type="text" value="1202026209900401234" placeholder="银行账号"></p>
                `;
            }

            function buildBuyerEditableHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="江苏正大生物" placeholder="买方公司全称"></p>
                    <p><strong>地址</strong> <input type="text" value="南京市浦口区" placeholder="地址"></p>
                    <p><strong>联系人</strong> <input type="text" value="王芳" placeholder="联系人"></p>
                    <p><strong>电话</strong> <input type="text" value="025-58123456" placeholder="电话"></p>
                    <p><strong>统一代码</strong> <input type="text" value="91320100MA1XXXXXX" placeholder="税号"></p>
                    <p><strong>开户行</strong> <input type="text" value="农行南京分行" placeholder="开户行"></p>
                    <p><strong>账号</strong> <input type="text" value="6228480402564890012" placeholder="银行账号"></p>
                `;
            }

            function createRow(seq, name = '', spec = '', qty = 1, unit = 'kg', price = 0) {
                const unitSelect = `<select class="unit-select">${unitOptions.map(u => `<option value="${u}" ${u === unit ? 'selected' : ''}>${u}</option>`).join('')}</select>`;
                return `
                    <tr>
                        <td style="text-align:center;">${seq}</td>
                        <td><input type="text" class="item-name" value="${name}" placeholder="原料名"></td>
                        <td><input type="text" class="item-spec" value="${spec}" placeholder="CAS/规格"></td>
                        <td><input type="number" class="item-qty" value="${qty}" min="0.001" step="0.001"></td>
                        <td>${unitSelect}</td>
                        <td><input type="number" class="item-price" value="${price}" min="0" step="0.01"></td>
                        <td><span class="item-total">0.00</span></td>
                        <td class="no-print"><button class="delete-btn">✖</button></td>
                    </tr>
                `;
            }

            function refreshRowsAndTotal() {
                const rows = itemsBody.querySelectorAll('tr');
                let grandTotal = 0;
                rows.forEach((row, idx) => {
                    row.cells[0].innerText = idx + 1;
                    const qty = parseFloat(row.querySelector('.item-qty')?.value) || 0;
                    const price = parseFloat(row.querySelector('.item-price')?.value) || 0;
                    const rowTotal = qty * price;
                    row.querySelector('.item-total').innerText = rowTotal.toFixed(2);
                    grandTotal += rowTotal;
                });
                grandTotalSpan.innerText = '¥ ' + grandTotal.toFixed(2);
            }

            function attachRowEvents(row) {
                row.querySelector('.item-qty')?.addEventListener('input', refreshRowsAndTotal);
                row.querySelector('.item-price')?.addEventListener('input', refreshRowsAndTotal);
                row.querySelector('.delete-btn')?.addEventListener('click', function() {
                    if (itemsBody.children.length <= 1) { alert('至少保留一行'); return; }
                    row.remove();
                    refreshRowsAndTotal();
                });
                row.querySelector('.unit-select')?.addEventListener('change', refreshRowsAndTotal);
            }

            function addNewRow() {
                const newSeq = (itemsBody.children.length || 0) + 1;
                const temp = document.createElement('tbody');
                temp.innerHTML = createRow(newSeq, '', '', 1, 'kg', 0);
                const newRow = temp.firstElementChild;
                itemsBody.appendChild(newRow);
                attachRowEvents(newRow);
                refreshRowsAndTotal();
            }

            function initTable() {
                itemsBody.innerHTML = '';
                let temp = document.createElement('tbody');
                temp.innerHTML = createRow(1, 'L-赖氨酸', 'CAS:56-87-1', 500, 'kg', 12.5);
                itemsBody.appendChild(temp.firstElementChild);
                temp.innerHTML = createRow(2, '维生素C', 'USP级', 200, 'kg', 38.0);
                itemsBody.appendChild(temp.firstElementChild);
                Array.from(itemsBody.children).forEach(row => attachRowEvents(row));
                refreshRowsAndTotal();
            }

            // 导出 JSON 功能
            function collectFormData() {
                const contractNo = document.getElementById('contractNo').value;
                const contractDate = document.getElementById('contractDate').value;
                const contractPlace = document.getElementById('contractPlace').value;
                const role = roleSeller.checked ? '泽林为卖方' : '泽林为买方';
                const clauses = document.getElementById('contractClauses').value;

                const sellerInputs = sellerContent.querySelectorAll('input');
                const seller = {};
                sellerInputs.forEach(input => {
                    const label = input.previousElementSibling?.innerText || '';
                    if (label.includes('公司名称')) seller.name = input.value;
                    else if (label.includes('地址')) seller.address = input.value;
                    else if (label.includes('联系人')) seller.contact = input.value;
                    else if (label.includes('电话')) seller.phone = input.value;
                    else if (label.includes('统一代码')) seller.taxId = input.value;
                    else if (label.includes('开户行')) seller.bank = input.value;
                    else if (label.includes('账号')) seller.account = input.value;
                });

                const buyerInputs = buyerContent.querySelectorAll('input');
                const buyer = {};
                buyerInputs.forEach(input => {
                    const label = input.previousElementSibling?.innerText || '';
                    if (label.includes('公司名称')) buyer.name = input.value;
                    else if (label.includes('地址')) buyer.address = input.value;
                    else if (label.includes('联系人')) buyer.contact = input.value;
                    else if (label.includes('电话')) buyer.phone = input.value;
                    else if (label.includes('统一代码')) buyer.taxId = input.value;
                    else if (label.includes('开户行')) buyer.bank = input.value;
                    else if (label.includes('账号')) buyer.account = input.value;
                });

                const items = [];
                const rows = itemsBody.querySelectorAll('tr');
                rows.forEach(row => {
                    items.push({
                        name: row.querySelector('.item-name')?.value || '',
                        spec: row.querySelector('.item-spec')?.value || '',
                        qty: parseFloat(row.querySelector('.item-qty')?.value) || 0,
                        unit: row.querySelector('.unit-select')?.value || 'kg',
                        price: parseFloat(row.querySelector('.item-price')?.value) || 0,
                        total: parseFloat(row.querySelector('.item-total')?.innerText) || 0
                    });
                });

                const totalAmount = parseFloat(grandTotalSpan.innerText.replace('¥ ', '')) || 0;

                return {
                    contractNo, contractDate, contractPlace, role, seller, buyer, items, totalAmount, clauses,
                    exportedAt: new Date().toISOString()
                };
            }

            function exportJson() {
                const data = collectFormData();
                const contractNo = data.contractNo.replace(/[^a-zA-Z0-9\-_]/g, '_') || 'contract';
                const filename = `${contractNo}.json`;
                const jsonStr = JSON.stringify(data, null, 2);
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            // 事件绑定
            roleSeller.addEventListener('change', renderCompanyCards);
            roleBuyer.addEventListener('change', renderCompanyCards);
            addRowBtn.addEventListener('click', addNewRow);
            document.getElementById('printPDFBtn').addEventListener('click', () => window.print());
            document.getElementById('exportJsonBtn').addEventListener('click', exportJson);

            renderCompanyCards();
            initTable();
        })();
    </script>
</body>
</html>
