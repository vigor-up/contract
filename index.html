<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>厦门泽林 · 生技原料买卖合同</title>
    <style>
        /* ----- 全局样式 ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
        }

        body {
            background: #e2eef9;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .contract-container {
            max-width: 1280px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(1, 65, 105, 0.3);
            padding: 2.2rem 2.5rem 2.5rem;
            border: 1px solid rgba(0, 95, 145, 0.15);
            transition: all 0.2s;
        }

        /* 打印样式 */
        @media print {
            body {
                background: white;
                padding: 0.2in;
            }
            .contract-container {
                box-shadow: none;
                border: 1px solid #ccc;
                padding: 0.2in;
                border-radius: 0;
            }
            .no-print, .btn, #addRowBtn, .delete-btn, .action-buttons, .type-radio-group {
                display: none !important;
            }
            td:last-child, th:last-child {
                display: none;  /* 隐藏操作列 */
            }
            input, select, textarea {
                border: none !important;
                background: transparent !important;
                border-bottom: 1px solid #333 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                appearance: none;
                padding: 0.1rem 0;
            }
            select {
                -webkit-appearance: none;
                appearance: none;
            }
            .company-card {
                border: 1px solid #aaa;
                background: #f9f9f9 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .stamp-box img {
                opacity: 0.8;
                max-width: 100px;
            }
            th {
                background: #eaeaea !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }

        /* 标题区 */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.8rem;
            border-bottom: 3px solid #1976b0;
            padding-bottom: 1.2rem;
        }
        .logo img {
            max-height: 60px;
            width: auto;
        }
        .title h1 {
            font-size: 2.3rem;
            font-weight: 600;
            background: linear-gradient(145deg, #094d73, #1f6ca0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1.5px;
        }
        .doc-meta {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .doc-meta label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.95rem;
            color: #135b87;
        }
        .doc-meta input {
            border: 1px solid #bfdaf0;
            border-radius: 20px;
            padding: 0.3rem 1rem;
            width: 140px;
            background: white;
        }

        /* 角色切换 */
        .role-switch {
            background: #ecf5fc;
            border-radius: 40px;
            display: inline-flex;
            padding: 0.3rem;
            margin: 0 0 1.8rem;
            gap: 0.3rem;
        }
        .role-switch label {
            padding: 0.4rem 2rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: #1e4a72;
            transition: 0.1s;
        }
        .role-switch input[type="radio"] {
            display: none;
        }
        .role-switch input[type="radio"]:checked + label {
            background: #0b4970;
            color: white;
            box-shadow: 0 4px 10px rgba(0,60,110,0.2);
        }

        /* 公司信息卡 */
        .company-row {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .company-card {
            flex: 1 1 320px;
            background: #f5fafd;
            border-radius: 24px;
            padding: 1.8rem 1.5rem;
            border: 1px solid #cde4f5;
            box-shadow: 0 6px 16px rgba(0,50,80,0.05);
        }
        .company-card h3 {
            color: #103f60;
            font-size: 1.3rem;
            border-left: 6px solid #2f89c0;
            padding-left: 1rem;
            margin-bottom: 1.2rem;
        }
        .company-card p {
            margin: 0.6rem 0;
            font-size: 0.95rem;
            display: flex;
            align-items: baseline;
        }
        .company-card p strong {
            width: 100px;
            color: #1f537a;
        }
        .company-card input, .company-card textarea {
            border: 1px solid #c0d8ee;
            border-radius: 20px;
            padding: 0.4rem 1rem;
            width: 100%;
            background: white;
            font-size: 0.95rem;
        }
        .bank-info {
            background: #e7f0f9;
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        /* 表格 */
        .items-section {
            margin: 2rem 0 1.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 6px 16px rgba(0,45,70,0.08);
        }
        th {
            background: #c7e2f5;
            color: #0c3b57;
            font-weight: 600;
            padding: 0.8rem 0.3rem;
            font-size: 0.9rem;
        }
        td {
            padding: 0.6rem 0.3rem;
            border-bottom: 1px solid #d9eaf7;
            vertical-align: middle;
        }
        td input, td select {
            width: 100%;
            border: 1px solid #b8d6f0;
            border-radius: 20px;
            padding: 0.4rem 0.6rem;
            font-size: 0.9rem;
        }
        .delete-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #a13d3d;
            padding: 0 0.3rem;
        }
        .total-row {
            text-align: right;
            margin: 1.2rem 0 1rem;
            font-size: 1.6rem;
            font-weight: 700;
            color: #07426b;
        }
        /* 条款区 */
        .clause-box {
            margin: 2rem 0;
        }
        .clause-box textarea {
            width: 100%;
            border: 1px solid #bcd3e9;
            border-radius: 24px;
            padding: 1.2rem;
            font-size: 0.95rem;
            line-height: 1.6;
            background: #fcfdff;
            resize: vertical;
        }

        /* 签名/印章 */
        .signature-area {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin: 2rem 0 1rem;
        }
        .stamp-box {
            text-align: center;
            width: 150px;
        }
        .stamp-box img {
            max-width: 120px;
            max-height: 120px;
            border-radius: 8px;
        }

        .action-buttons {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            margin-top: 2rem;
        }
        .btn {
            border: none;
            background: #1d5f8c;
            color: white;
            font-size: 1rem;
            padding: 0.8rem 2.8rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,70,120,0.2);
            transition: 0.15s;
        }
        .btn-light {
            background: #eef5fb;
            color: #154f78;
        }
        .btn:hover {
            background: #0e4468;
            transform: translateY(-2px);
        }
        .btn-light:hover {
            background: #d5e6f5;
        }

        /* 响应式 */
        @media (max-width: 800px) {
            .contract-container { padding: 1.5rem; }
            .header { flex-direction: column; align-items: start; gap: 1rem; }
            .doc-meta { width: 100%; }
            .doc-meta label { width: 100%; }
            .doc-meta input { flex: 1; }
            .company-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="contract-container">
        <!-- 头部：logo + 标题 + 合同编号/日期 -->
        <div class="header">
            <div class="logo">
                <!-- 请将公司logo放在 images/xmzelin-logo.png -->
                <img src="images/xmzelin-logo.png" alt="厦门泽林生物科技" onerror="this.onerror=null; this.src='https://via.placeholder.com/180x60?text=Zelin+Bio';">
                <div style="font-size:0.7rem; color:#aaa;">(logo: images/xmzelin-logo.png)</div>
            </div>
            <div class="title">
                <h1 id="contractTitle">生技原料买卖合同</h1>
            </div>
            <div class="doc-meta">
                <label>合同编号 <input type="text" id="contractNo" value="ZL-SC-2025-001"></label>
                <label>签订日期 <input type="date" id="contractDate" value="2025-03-03"></label>
                <label>签订地点 <input type="text" id="contractPlace" value="厦门市"></label>
            </div>
        </div>

        <!-- 角色切换：泽林作为卖方还是买方？ -->
        <div class="role-switch no-print" id="roleToggle">
            <input type="radio" name="zelinRole" id="roleSeller" value="seller" checked>
            <label for="roleSeller">🌿 泽林为卖方</label>
            <input type="radio" name="zelinRole" id="roleBuyer" value="buyer">
            <label for="roleBuyer">🧪 泽林为买方</label>
        </div>

        <!-- 买卖双方信息卡片 -->
        <div class="company-row">
            <!-- 卖方卡片 (动态根据角色显示泽林或对方) -->
            <div class="company-card" id="sellerCard">
                <h3 id="sellerTitle">卖方（供方）</h3>
                <div id="sellerContent">
                    <!-- 由JS动态填充泽林信息或对方输入框 -->
                </div>
            </div>
            <!-- 买方卡片 -->
            <div class="company-card" id="buyerCard">
                <h3 id="buyerTitle">买方（需方）</h3>
                <div id="buyerContent">
                    <!-- 动态填充 -->
                </div>
            </div>
        </div>

        <!-- 产品明细表格 -->
        <div class="items-section">
            <h3 style="color: #154f78; margin-bottom:0.8rem;">📋 原料明细</h3>
            <table id="itemsTable">
                <thead>
                    <tr><th>#</th><th>原料名称</th><th>规格/CAS</th><th>数量</th><th>单位</th><th>单价(¥)</th><th>总价(¥)</th><th class="no-print">操作</th></tr>
                </thead>
                <tbody id="itemsBody">
                    <!-- JS动态生成行 -->
                </tbody>
            </table>
            <button class="btn-light no-print" id="addRowBtn" style="margin-top:0.8rem;">➕ 增加一行</button>
        </div>

        <!-- 总计金额 -->
        <div class="total-row" id="grandTotalSpan">¥ 0.00</div>

        <!-- 合同条款（可编辑） -->
        <div class="clause-box">
            <textarea id="contractClauses" rows="6">一、质量标准：按供方企业标准或双方确认的样品/技术资料执行。
二、交货地点及方式：厦门港 / 供方仓库，运费由供方承担。
三、结算方式及期限：合同签订后预付30%，货到验收合格付清余款。
四、违约责任：按《中华人民共和国民法典》执行。
五、争议解决：协商不成提交厦门仲裁委员会仲裁。
六、本合同一式两份，双方各执一份，盖章生效。</textarea>
        </div>

        <!-- 总金额大写（模拟）及签章区 -->
        <div style="display: flex; justify-content: space-between; flex-wrap: wrap; align-items: flex-end;">
            <div>
                <p style="font-weight:500;">金额大写：<span id="amountInWords">人民币 零元整</span></p>
            </div>
            <div class="signature-area">
                <div class="stamp-box">
                    <!-- 公司印章 images/stamp.png -->
                    <img src="images/stamp.png" alt="公司印章" onerror="this.onerror=null; this.src='https://via.placeholder.com/120x120?text=Seal';">
                    <p>厦门泽林生物科技<br>合同专用章</p>
                </div>
                <div style="width:200px;">
                    <p>授权代表签字：_________________</p>
                    <p>日期：_________________</p>
                </div>
            </div>
        </div>

        <!-- 按钮区 -->
        <div class="action-buttons no-print">
            <button class="btn" id="printPDFBtn">🖨️ 打印 / 生成PDF</button>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 厦门泽林固定信息 ----------
            const ZELIN_INFO = {
                name: '厦门泽林生物科技有限公司',
                address: '中国(福建)自由贸易试验区厦门片区嵩屿中路809号航运大厦1102室之260',
                contactPerson: '李易昌',
                phone: '0592-6881234',
                taxId: '91350200MAERUOWJXD',
                bankName: '中国工商银行股份有限公司厦门海沧支行',
                bankAccount: '4100026009200404571',
                accountName: '厦门泽林生物科技有限公司',
                accountNo: 'J9033009110101'  // 基本存款账户编号
            };

            // 角色切换
            const roleSeller = document.getElementById('roleSeller');
            const roleBuyer = document.getElementById('roleBuyer');
            const sellerCard = document.getElementById('sellerCard');
            const buyerCard = document.getElementById('buyerCard');
            const sellerContent = document.getElementById('sellerContent');
            const buyerContent = document.getElementById('buyerContent');
            const sellerTitle = document.getElementById('sellerTitle');
            const buyerTitle = document.getElementById('buyerTitle');
            const contractTitle = document.getElementById('contractTitle');

            // 表格相关
            const itemsBody = document.getElementById('itemsBody');
            const addRowBtn = document.getElementById('addRowBtn');
            const grandTotalSpan = document.getElementById('grandTotalSpan');

            // 单位选项
            const unitOptions = ['kg', '吨', 'L', 'g', '袋', '桶'];

            // 初始化渲染公司信息
            function renderCompanyCards() {
                if (roleSeller.checked) {
                    // 泽林是卖方
                    sellerTitle.innerText = '卖方（供方）· 厦门泽林';
                    sellerContent.innerHTML = buildZelinSellerHTML();
                    buyerTitle.innerText = '买方（需方）';
                    buyerContent.innerHTML = buildBuyerEditableHTML();
                    contractTitle.innerText = '生技原料销售合同';
                } else {
                    // 泽林是买方
                    sellerTitle.innerText = '卖方（供方）';
                    sellerContent.innerHTML = buildSellerEditableHTML();
                    buyerTitle.innerText = '买方（需方）· 厦门泽林';
                    buyerContent.innerHTML = buildZelinBuyerHTML();
                    contractTitle.innerText = '生技原料采购合同';
                }
            }

            // 泽林作为卖方时的卖方卡片（不可编辑核心信息，但可微调？为了打印方便，保留输入框但预填，用户可以修改）
            function buildZelinSellerHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="${ZELIN_INFO.name}" placeholder="公司全称"></p>
                    <p><strong>地址</strong> <input type="text" value="${ZELIN_INFO.address}" placeholder="地址"></p>
                    <p><strong>联系人</strong> <input type="text" value="${ZELIN_INFO.contactPerson}" placeholder="联系人"></p>
                    <p><strong>电话</strong> <input type="text" value="${ZELIN_INFO.phone}" placeholder="电话"></p>
                    <p><strong>统一代码</strong> <input type="text" value="${ZELIN_INFO.taxId}" placeholder="税号"></p>
                    <div class="bank-info">
                        <p><strong>开户行</strong> ${ZELIN_INFO.bankName}</p>
                        <p><strong>账号</strong> ${ZELIN_INFO.bankAccount}</p>
                        <p><strong>账户名</strong> ${ZELIN_INFO.accountName}</p>
                        <p><strong>存款编号</strong> ${ZELIN_INFO.accountNo}</p>
                    </div>
                `;
            }

            // 泽林作为买方时的买方卡片
            function buildZelinBuyerHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="${ZELIN_INFO.name}" placeholder="公司全称"></p>
                    <p><strong>地址</strong> <input type="text" value="${ZELIN_INFO.address}" placeholder="地址"></p>
                    <p><strong>联系人</strong> <input type="text" value="${ZELIN_INFO.contactPerson}" placeholder="联系人"></p>
                    <p><strong>电话</strong> <input type="text" value="${ZELIN_INFO.phone}" placeholder="电话"></p>
                    <p><strong>统一代码</strong> <input type="text" value="${ZELIN_INFO.taxId}" placeholder="税号"></p>
                    <!-- 买方一般不需要银行账户，但可以留备注 -->
                `;
            }

            // 对方作为卖方（泽林是买方时）—— 可编辑
            function buildSellerEditableHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="浙江华发生物" placeholder="卖方公司全称"></p>
                    <p><strong>地址</strong> <input type="text" value="杭州市萧山科技城" placeholder="地址"></p>
                    <p><strong>联系人</strong> <input type="text" value="张明" placeholder="联系人"></p>
                    <p><strong>电话</strong> <input type="text" value="0571-86527890" placeholder="电话"></p>
                    <p><strong>统一代码</strong> <input type="text" value="91330100MA27XXXXX" placeholder="税号"></p>
                    <p><strong>开户行</strong> <input type="text" value="工行杭州萧山支行" placeholder="开户行"></p>
                    <p><strong>账号</strong> <input type="text" value="1202026209900401234" placeholder="银行账号"></p>
                `;
            }

            // 对方作为买方（泽林是卖方时）—— 可编辑
            function buildBuyerEditableHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="江苏正大生物" placeholder="买方公司全称"></p>
                    <p><strong>地址</strong> <input type="text" value="南京市浦口区" placeholder="地址"></p>
                    <p><strong>联系人</strong> <input type="text" value="王芳" placeholder="联系人"></p>
                    <p><strong>电话</strong> <input type="text" value="025-58123456" placeholder="电话"></p>
                    <p><strong>统一代码</strong> <input type="text" value="91320100MA1XXXXXX" placeholder="税号"></p>
                    <p><strong>开户行</strong> <input type="text" value="农行南京分行" placeholder="开户行"></p>
                    <p><strong>账号</strong> <input type="text" value="6228480402564890012" placeholder="银行账号"></p>
                `;
            }

            // ---------- 表格动态行逻辑 ----------
            function createRow(seq, name = '', spec = '', qty = 1, unit = 'kg', price = 0) {
                const unitSelect = `<select class="unit-select">${unitOptions.map(u => `<option value="${u}" ${u === unit ? 'selected' : ''}>${u}</option>`).join('')}</select>`;
                return `
                    <tr>
                        <td style="text-align:center;">${seq}</td>
                        <td><input type="text" class="item-name" value="${name}" placeholder="原料名"></td>
                        <td><input type="text" class="item-spec" value="${spec}" placeholder="CAS/规格"></td>
                        <td><input type="number" class="item-qty" value="${qty}" min="0.001" step="0.001"></td>
                        <td>${unitSelect}</td>
                        <td><input type="number" class="item-price" value="${price}" min="0" step="0.01"></td>
                        <td><span class="item-total">0.00</span></td>
                        <td class="no-print"><button class="delete-btn">✖</button></td>
                    </tr>
                `;
            }

            function refreshRowsAndTotal() {
                const rows = itemsBody.querySelectorAll('tr');
                let grandTotal = 0;
                rows.forEach((row, idx) => {
                    row.cells[0].innerText = idx + 1; // 更新序号
                    const qtyInput = row.querySelector('.item-qty');
                    const priceInput = row.querySelector('.item-price');
                    const totalSpan = row.querySelector('.item-total');
                    const qty = parseFloat(qtyInput?.value) || 0;
                    const price = parseFloat(priceInput?.value) || 0;
                    const rowTotal = qty * price;
                    if (totalSpan) totalSpan.innerText = rowTotal.toFixed(2);
                    grandTotal += rowTotal;
                });
                grandTotalSpan.innerText = '¥ ' + grandTotal.toFixed(2);
                // 简单金额大写转换（仅演示，不精确）
                const chineseNum = numberToChinese(grandTotal);
                document.getElementById('amountInWords').innerText = '人民币 ' + chineseNum;
            }

            // 极简数字转中文（仅用于展示）
            function numberToChinese(num) {
                if (num === 0) return '零元整';
                const digits = ['零','壹','贰','叁','肆','伍','陆','柒','捌','玖'];
                const units = ['','拾','佰','仟'];
                const bigUnits = ['','万','亿'];
                // 简化版，仅作示意
                return num.toFixed(2) + '元'; // 实际项目中可引入完整转换，此处保持简单
            }

            function attachRowEvents(row) {
                const qtyInput = row.querySelector('.item-qty');
                const priceInput = row.querySelector('.item-price');
                const deleteBtn = row.querySelector('.delete-btn');
                if (qtyInput) qtyInput.addEventListener('input', refreshRowsAndTotal);
                if (priceInput) priceInput.addEventListener('input', refreshRowsAndTotal);
                if (deleteBtn) {
                    deleteBtn.addEventListener('click', function() {
                        if (itemsBody.children.length <= 1) {
                            alert('至少保留一行产品明细');
                            return;
                        }
                        row.remove();
                        refreshRowsAndTotal();
                    });
                }
                const unitSelect = row.querySelector('.unit-select');
                if (unitSelect) unitSelect.addEventListener('change', refreshRowsAndTotal);
            }

            function addNewRow() {
                const newSeq = (itemsBody.children.length || 0) + 1;
                const temp = document.createElement('tbody');
                temp.innerHTML = createRow(newSeq, '', '', 1, 'kg', 0);
                const newRow = temp.firstElementChild;
                itemsBody.appendChild(newRow);
                attachRowEvents(newRow);
                refreshRowsAndTotal();
            }

            // 初始化表格两行示例
            function initTable() {
                itemsBody.innerHTML = '';
                let temp = document.createElement('tbody');
                temp.innerHTML = createRow(1, 'L-赖氨酸', 'CAS:56-87-1', 500, 'kg', 12.5);
                itemsBody.appendChild(temp.firstElementChild);
                temp.innerHTML = createRow(2, '维生素C', 'USP级', 200, 'kg', 38.0);
                itemsBody.appendChild(temp.firstElementChild);
                Array.from(itemsBody.children).forEach(row => attachRowEvents(row));
                refreshRowsAndTotal();
            }

            // 事件绑定
            roleSeller.addEventListener('change', renderCompanyCards);
            roleBuyer.addEventListener('change', renderCompanyCards);
            addRowBtn.addEventListener('click', addNewRow);
            document.getElementById('printPDFBtn').addEventListener('click', () => {
                window.print();
            });

            // 启动
            renderCompanyCards();
            initTable();
        })();
    </script>
</body>
</html>
