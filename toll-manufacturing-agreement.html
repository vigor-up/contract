<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>泽林生物科技 · 委托代工制造合同 (双签名精装版)</title>
    <!-- 引入Google Font & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ========== 全局重置与字体 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Noto Sans TC', 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 0.5rem 0.5rem;
        }

        .contract-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            box-shadow: 0 20px 40px -12px rgba(0, 55, 100, 0.25), 0 0 0 1px rgba(46, 125, 50, 0.15);
            padding: 1rem 1.2rem 0.8rem;
            transition: all 0.3s;
        }

        /* ========== 页眉区域 ========== */
        .header {
            margin-bottom: 1rem;
            padding: 0.6rem 0.8rem;
            border-radius: 16px 16px 0 0;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-bottom: 3px solid #2E7D32;
            box-shadow: 0 8px 18px -10px #1B5E20;
        }

        .header-content {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 0.2rem;
        }

        .brand-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem 0.8rem;
        }

        .logo-title-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .brand-logo {
            height: 90px;
            width: auto;
            max-width: 140px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(46,125,50,0.3));
            border-radius: 14px;
            background: white;
            padding: 0.2rem;
            border: 1px solid #2E7D32;
        }

        .company-name {
            font-weight: 900;
            font-size: 1.6rem;
            color: #1B5E20;
            line-height: 1.2;
            white-space: nowrap;
            text-shadow: 2px 2px 6px rgba(46,125,50,0.15);
            background: linear-gradient(145deg, #1B5E20, #2E7D32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .doc-meta-header {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            background: #e8f5e9;
            padding: 0.3rem 1rem;
            border-radius: 40px;
        }
        .doc-meta-header label {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            font-size: 0.85rem;
            color: #1B5E20;
            font-weight: 500;
        }
        .doc-meta-header input {
            border: 1px solid #a5d6a7;
            border-radius: 40px;
            padding: 0.2rem 0.8rem;
            width: 120px;
            background: white;
            font-size: 0.85rem;
        }
        .doc-meta-header input:focus {
            border-color: #2E7D32;
            outline: none;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.2);
        }

        .title-header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(145deg, #1B5E20, #2E7D32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
            margin-bottom: 0;
        }

        /* 角色切换 */
        .role-switch {
            background: #ffffff;
            border-radius: 60px;
            display: inline-flex;
            padding: 0.2rem;
            margin: 0 0 1.2rem 0.2rem;
            gap: 0.2rem;
            border: 1px solid #c8e6c9;
        }
        .role-switch label {
            padding: 0.4rem 1.5rem;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            color: #1B5E20;
            transition: 0.2s;
        }
        .role-switch input[type="radio"] { display: none; }
        .role-switch input:checked + label {
            background: #2E7D32;
            color: white;
            box-shadow: 0 4px 10px #1B5E20;
        }

        /* 公司卡片 */
        .company-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }
        .company-card {
            flex: 1 1 280px;
            background: #fafdfa;
            border-radius: 18px;
            padding: 1rem 1rem;
            border: 1px solid #c8e6c9;
            box-shadow: 0 8px 16px -12px rgba(0,60,0,0.2);
        }
        .company-card h3 {
            color: #1B5E20;
            font-size: 1.1rem;
            border-left: 5px solid #FFB300;
            padding-left: 0.6rem;
            margin-bottom: 0.8rem;
            background: linear-gradient(to right, #ffffff, #e8f5e9);
            border-radius: 0 12px 12px 0;
            line-height: 1.6;
        }
        .company-card p {
            margin: 0.4rem 0;
            display: flex;
            align-items: baseline;
            font-size: 0.9rem;
        }
        .company-card p strong {
            width: 100px;
            color: #1B5E20;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .company-card input {
            border: 1px solid #a5d6a7;
            border-radius: 30px;
            padding: 0.3rem 0.8rem;
            width: 100%;
            background: white;
            font-size: 0.9rem;
        }
        .company-card input:focus {
            border-color: #2E7D32;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.1);
            outline: none;
        }
        .bank-info {
            background: #e8f5e9;
            border-radius: 14px;
            padding: 0.6rem 1rem;
            margin-top: 0.8rem;
            font-size: 0.9rem;
            border-left: 4px solid #FFB300;
        }

        /* 表格区域 */
        .items-section {
            margin: 1.2rem 0 1rem;
            overflow-x: auto;
        }
        .items-section h3 {
            color: #1B5E20;
            font-size: 1.4rem;
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 16px -14px #1B5E20;
            min-width: 750px;
        }
        th {
            background: #c8e6c9;
            color: #1B5E20;
            font-weight: 700;
            padding: 0.6rem 0.2rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        td {
            padding: 0.4rem 0.2rem;
            border-bottom: 1px solid #e0f2e0;
            vertical-align: middle;
        }
        td input, td select {
            width: 100%;
            border: 1px solid #c8e6c9;
            border-radius: 30px;
            padding: 0.3rem 0.5rem;
            font-size: 0.9rem;
            background: #f9fff9;
        }
        td input:focus, td select:focus {
            border-color: #2E7D32;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.1);
        }
        .delete-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #b71c1c;
            padding: 0 0.2rem;
        }
        .delete-btn:hover { color: #d32f2f; transform: scale(1.1); }

        .total-row {
            text-align: right;
            margin: 0.8rem 0 1.2rem;
            font-size: 1.6rem;
            font-weight: 800;
            color: #1B5E20;
            background: linear-gradient(to right, #f1f8e9, #ffffff);
            padding: 0.3rem 1.5rem;
            border-radius: 50px;
            display: inline-block;
            float: right;
            box-shadow: 0 4px 10px rgba(0,80,0,0.1);
            border: 1px solid #c8e6c9;
        }

        .clause-box {
            clear: both;
            margin: 1rem 0 1rem;
        }
        .clause-box textarea {
            width: 100%;
            border: 1px solid #c8e6c9;
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
            font-size: 1rem;
            line-height: 1.45;
            background: #fefefe;
            resize: vertical;
            box-shadow: inset 0 2px 6px rgba(0,30,0,0.02);
        }

        /* 页脚签名区 (双印章 + 双签名并排) */
        .signature-footer {
            position: relative;
            margin: 1rem 0 0.5rem;
            padding: 1rem 1rem 0.8rem;
            border-top: 2px dashed #a5d6a7;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            overflow: hidden;
            page-break-inside: avoid;
        }

        .logo-watermark-footer {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
        }
        .logo-watermark-footer img {
            height: 110px;
            width: auto;
            object-fit: contain;
            margin-right: 0.5rem;
            margin-bottom: 0.3rem;
        }

        .signature-block {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .stamps-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            gap: 1rem;
        }

        .stamp-box {
            text-align: center;
            flex: 0 1 auto;
            position: relative;
        }
        .stamp-box img {
            width: 90px;
            height: auto;
            border-radius: 50%;
            background: #fff;
            padding: 0.2rem;
            box-shadow: 0 6px 12px -6px rgba(0,0,0,0.2), 0 0 0 1px #FFB300 inset;
        }
        .stamp-placeholder {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #eeeeee;
            border: 2px dashed #2E7D32;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1B5E20;
            font-weight: 600;
            font-size: 0.75rem;
            text-align: center;
            padding: 0.2rem;
            margin: 0 auto;
            cursor: pointer;
            transition: background 0.2s;
        }
        .stamp-placeholder:hover {
            background: #d4e6d4;
        }
        /* 隐藏文件输入 */
        .stamp-file-input {
            display: none;
        }
        /* 上传后显示的印章图片 */
        .stamp-uploaded-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #FFB300;
            box-shadow: 0 6px 12px -6px rgba(0,0,0,0.2);
            display: none;
            cursor: pointer;
        }

        /* 双签名行 */
        .signatures-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }
        .signature-area {
            flex: 1 1 260px;
            background: #fafdfa;
            border-radius: 18px;
            padding: 0.6rem 1rem;
            border: 1px solid #c8e6c9;
            box-shadow: 0 4px 10px -6px #1B5E20;
            min-width: 220px;
        }
        .signature-area p {
            font-weight: 600;
            margin-bottom: 0.3rem;
            font-size: 0.95rem;
            color: #1B5E20;
        }
        .signature-area canvas {
            border: 1px solid #a5d6a7;
            border-radius: 14px;
            background: #fff;
            touch-action: none;
            width: 100%;
            height: auto;
            max-width: 240px;
            display: block;
            margin: 0 auto;
        }
        .signature-controls {
            margin-top: 0.4rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .signature-controls button {
            background: #e8f5e9;
            border: none;
            color: #1B5E20;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #a5d6a7;
            font-size: 0.85rem;
        }
        .signature-controls button:hover { background: #c8e6c9; }
        .signature-controls input[type="date"] {
            border: 1px solid #a5d6a7;
            border-radius: 40px;
            padding: 0.2rem 0.6rem;
            background: white;
            font-size: 0.85rem;
            flex: 1;
            min-width: 120px;
        }

        /* 其他合同链接 */
        .other-contracts-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 12px 0 8px;
        }
        .other-contracts-links a {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: white;
            color: #1B5E20;
            text-decoration: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            border: 2px solid #2E7D32;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(46,125,50,0.15);
        }
        .other-contracts-links a:hover {
            background: #2E7D32;
            color: white;
            border-color: #FFB300;
        }
        .other-contracts-links i {
            font-size: 0.9rem;
            color: #FFB300;
        }

        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1rem 0 0;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            background: #2E7D32;
            color: white;
            font-size: 1rem;
            padding: 0.6rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 16px -8px #1B5E20;
            transition: 0.2s;
        }
        .btn-light {
            background: #f5f5f5;
            color: #1B5E20;
            box-shadow: 0 4px 10px #c8e6c9;
        }
        .btn:hover { background: #1B5E20; transform: translateY(-2px); }

        /* 打印样式 */
        @media print {
            body { background: white; padding: 0.15in; }
            .contract-container { box-shadow: none; border: 1px solid #aaa; padding: 0.15in; border-radius: 0; background: white; }
            .no-print, .btn, #addRowBtn, .delete-btn, .action-buttons, .role-switch, .other-contracts-links,
            .signature-controls button { display: none !important; }
            td:last-child, th:last-child { display: none; }
            input, select, textarea { border: none !important; background: transparent !important; border-bottom: 1px solid #333 !important; }
            th { background: #eaeaea !important; }
            .company-name { -webkit-text-fill-color: #1B5E20; color: #1B5E20; background: none; }
            .stamp-box img, .stamp-placeholder, .stamp-uploaded-img { max-width: 80px; }
            .stamp-placeholder { border: 1px solid #000; background: #f9f9f9; }
            .stamp-uploaded-img { border: 1px solid #000; }
            .signature-area canvas { border: 1px solid #000; }
            .signature-area input[type="date"] { border: none; border-bottom: 1px solid #333; background: transparent; }
            .clause-box textarea { height: auto; overflow: visible; border: 1px solid #333 !important; }
        }

        /* 移动端优化 */
        @media (max-width: 700px) {
            .brand-logo { height: 70px; }
            .company-name { font-size: 1.3rem; white-space: normal; }
            .title-header h1 { font-size: 1.3rem; }
            .doc-meta-header input { width: 90px; }
            .role-switch label { padding: 0.3rem 1rem; font-size: 0.85rem; }
            .total-row { font-size: 1.4rem; }
            .stamp-box img, .stamp-placeholder, .stamp-uploaded-img { width: 70px; height: 70px; }
            .signature-area { flex: 1 1 100%; }
            .signature-area canvas { max-width: 200px; }
        }
    </style>
</head>
<body>
    <div class="contract-container">
        <!-- 页眉 -->
        <div class="header">
            <div class="header-content">
                <div class="brand-row">
                    <div class="logo-title-group">
                        <img class="brand-logo" src="images/xmzelin-logo.png" alt="厦门泽林" onerror="this.onerror=null; this.src='https://via.placeholder.com/140x90?text=Zelin+Bio';">
                        <span class="company-name">厦门泽林生物科技有限公司</span>
                    </div>
                    <div class="doc-meta-header no-print">
                        <label>合同编号 <input type="text" id="contractNo" value="ZL-OEM-2025-001"></label>
                        <label>签订日期 <input type="date" id="contractDate" value="2025-03-03"></label>
                        <label>签订地点 <input type="text" id="contractPlace" value="厦门市"></label>
                    </div>
                </div>
                <div class="title-header">
                    <h1 id="contractTitle">委托代工制造合同</h1>
                </div>
            </div>
        </div>

        <!-- 角色切换：泽林为委托方 / 代工方 -->
        <div class="role-switch no-print" id="roleToggle">
            <input type="radio" name="zelinRole" id="roleClient" value="client" checked>
            <label for="roleClient">🏭 泽林为委托方</label>
            <input type="radio" name="zelinRole" id="roleManufacturer" value="manufacturer">
            <label for="roleManufacturer">⚙️ 泽林为代工方</label>
        </div>

        <!-- 双方信息卡片 -->
        <div class="company-row">
            <div class="company-card" id="clientCard">
                <h3 id="clientTitle">委托方（甲方）</h3>
                <div id="clientContent"></div>
            </div>
            <div class="company-card" id="manufacturerCard">
                <h3 id="manufacturerTitle">代工方（乙方）</h3>
                <div id="manufacturerContent"></div>
            </div>
        </div>

        <!-- 代工产品明细表格 -->
        <div class="items-section">
            <h3>📋 代工产品明细</h3>
            <table id="itemsTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>产品名称</th>
                        <th>规格/型号</th>
                        <th>代工数量</th>
                        <th>单位</th>
                        <th>单价(¥)</th>
                        <th>总价(¥)</th>
                        <th class="no-print">操作</th>
                    </tr>
                </thead>
                <tbody id="itemsBody"></tbody>
            </table>
            <button class="btn-light no-print" id="addRowBtn" style="margin-top:0.5rem;">➕ 增加一行</button>
        </div>

        <!-- 总代工金额 -->
        <div class="total-row" id="grandTotalSpan">¥ 0.00</div>

        <!-- 合同条款 (rows=25 确保无滚动条) 参考OEM范本及民法典承揽合同条款[citation:1][citation:8] -->
        <div class="clause-box">
            <textarea id="contractClauses" rows="25">
一、代工内容及要求
1. 甲方委托乙方加工本合同项下产品，具体规格、型号、数量、单价及总价详见上表。乙方应按照甲方提供的技术标准、工艺文件及双方确认的样品进行生产[citation:8]。
2. 乙方作为承揽人，应以自己的设备、技术和劳力独立完成工作，未经甲方书面同意不得将主要加工任务转委托给第三方[citation:1]。

二、原材料供应
1. 双方确认采用以下第（ ）种方式：①甲方提供主要原材料，乙方负责辅料及生产；②乙方包工包料，自行采购符合约定的全部材料，并将供应商名录及材质证明提交甲方备案。
2. 若因原材料质量问题导致产品不符合约定，由材料提供方承担相应责任。

三、质量与验收
1. 质量标准：以双方共同封存的样品及书面技术参数为准，包括但不限于外观、纯度、微生物指标等[citation:6]。
2. 验收期限：甲方收到货物后 5 个工作日内完成数量与外观验收；内在质量问题应在 15 日内书面提出，否则视为验收合格[citation:2]。对产品有质量保证期的，适用质量保证期[citation:6]。
3. 质量异议：如发现产品不符合约定，甲方应立即书面通知乙方，乙方应在 7 日内予以更换或退货；逾期未处理的，甲方有权自行处理并由乙方承担费用[citation:2]。

四、价格与结算
1. 代工单价详见上表，该价格含材料费、加工费、包装费及运抵甲方指定仓库的运费。
2. 付款方式：合同签订后 3 日内支付总金额的 30% 作为预付款；货到验收合格并收到全额增值税专用发票后 15 日内付清余款[citation:8]。

五、交付与运输
1. 交货时间：自收到预付款之日起 15 个工作日内发货，或按双方另行书面确认的交期执行。
2. 交货地点：甲方指定仓库（厦门市）。运输方式由乙方代办，运费由乙方承担；货物毁损、灭失的风险自交付承运人时转移。

六、知识产权与保密
1. 甲方提供的技术图纸、配方、设计文件、商标等知识产权归甲方所有，乙方不得擅自使用、复制或泄露给任何第三方[citation:3]。
2. 乙方在加工过程中产生的与产品相关的改进技术成果归甲方所有。
3. 双方对本合同内容及合作中知悉的商业秘密承担永久保密义务，保密信息包括但不限于客户信息、技术资料、采购渠道等[citation:3]。本条款在本合同终止后持续有效[citation:3]。

七、违约责任
1. 乙方逾期交货，每逾一日按未交付货物价值的 0.5% 支付违约金；逾期超过 15 日，甲方有权解除合同。
2. 产品质量不符合约定，乙方应承担修理、重作、减少价款或赔偿损失等责任[citation:1]。
3. 甲方逾期付款，每逾一日按应付未付款项的 0.5% 支付违约金；逾期超过 15 日，乙方有权停止发货并解除合同。
4. 任何一方擅自解除合同，应承担合同总金额 20% 的违约金。

八、免责条款
因不可抗力（如自然灾害、战争、疫情、政府行为等）导致不能履行合同的，受影响方应及时通知对方并提供证明，可免除相应违约责任[citation:8]。

九、争议解决
因本合同引起的任何争议，双方应友好协商；协商不成时，提交厦门仲裁委员会按照申请仲裁时该会现行有效的仲裁规则进行仲裁。仲裁裁决是终局的，对双方均有约束力[citation:8][citation:10]。

十、其他
1. 本合同自双方签字盖章之日起生效，一式两份，双方各执一份，具有同等法律效力。
2. 任何未尽事宜，可签订补充协议，补充协议与本合同具有同等效力[citation:8]。
3. 双方确认的送达地址为法律文书送达地址，按该地址邮寄即视为送达[citation:8]。

                contactPerson: '李易昌',
                phone: '0592-6881234',
                taxId: '91350200MAERUOWJXD',
                bankName: '中国工商银行股份有限公司厦门海沧支行',

            function renderCompanyCards() {

                } else {

                    clientContent.innerHTML = buildClientEditableHTML();
                    manufacturerTitle.innerText = '代工方（乙方）· 厦门泽林';
                    manufacturerContent.innerHTML = buildZelinManufacturerHTML();
                    contractTitle.innerText = '委托代工制造合同 (代工)';
                }
            }

            function buildZelinClientHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="${ZELIN_INFO.name}"></p>

                    <p><strong>电话</strong> <input type="text" value="${ZELIN_INFO.phone}"></p>
                    <p><strong>统一社会信用代码</strong> <input type="text" value="${ZELIN_INFO.taxId}"></p>
                    <div class="bank-info">
                        <p><strong>开户行</strong> ${ZELIN_INFO.bankName}</p>
                        <p><strong>账号</strong> ${ZELIN_INFO.bankAccount}</p>
                        <p><strong>账户名</strong> ${ZELIN_INFO.accountName}</p>

            }

            function buildZelinManufacturerHTML() {

                    <p><strong>地址</strong> <input type="text" value="${ZELIN_INFO.address}"></p>
                    <p><strong>联系人</strong> <input type="text" value="${ZELIN_INFO.contactPerson}"></p>
                    <p><strong>电话</strong> <input type="text" value="${ZELIN_INFO.phone}"></p>
                    <p><strong>统一社会信用代码</strong> <input type="text" value="${ZELIN_INFO.taxId}"></p>
                    <div class="bank-info">
                        <p><strong>开户行</strong> ${ZELIN_INFO.bankName}</p>
                        <p><strong>账号</strong> ${ZELIN_INFO.bankAccount}</p>
                        <p><strong>账户名</strong> ${ZELIN_INFO.accountName}</p>

            function buildClientEditableHTML() {

                    <p><strong>公司名称</strong> <input type="text" value="广东生物科技"></p>

                    <p><strong>联系人</strong> <input type="text" value="王总"></p>
                    <p><strong>电话</strong> <input type="text" value="020-12345678"></p>
                    <p><strong>统一社会信用代码</strong> <input type="text" value="91440101MA5TEST123"></p>
                    <p><strong>开户行</strong> <input type="text" value="建行广州分行"></p>

            function buildManufacturerEditableHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="福建制造厂"></p>
                    <p><strong>地址</strong> <input type="text" value="福州市马尾区"></p>
                    <p><strong>联系人</strong> <input type="text" value="陈经理"></p>
                    <p><strong>电话</strong> <input type="text" value="0591-87654321"></p>
                    <p><strong>统一社会信用代码</strong> <input type="text" value="91350105MA1TEST456"></p>
                    <p><strong>开户行</strong> <input type="text" value="兴业银行福州分行"></p>
                    <p><strong>账号</strong> <input type="text" value="117010100100123456"></p>

            function createRow(seq, product = '', spec = '', qty = 0, unit = 'kg', price = 0) {
                const unitSelect = `<select class="unit-select">${unitOptions.map(u => `<option value="${u}" ${u === unit ? 'selected' : ''}>${u}</option>`).join('')}</select>`;
                return `
                    <tr>
                        <td style="text-align:center;">${seq}</td>
                        <td><input type="text" class="item-product" value="${product}" placeholder="产品名称"></td>
                        <td><input type="text" class="item-spec" value="${spec}" placeholder="规格/型号"></td>
                        <td><input type="number" class="item-qty" value="${qty}" min="0" step="0.001"></td>
                        <td>${unitSelect}</td>
                        <td><input type="number" class="item-price" value="${price}" min="0" step="0.01"></td>
                        <td><span class="item-total">0.00</span></td>
                        <td class="no-print"><button class="delete-btn">✖</button></td>
                    </tr>
                `;
            }

            function refreshRowsAndTotal() {
                const rows = itemsBody.querySelectorAll('tr');
                let grandTotal = 0;
                rows.forEach((row, idx) => {
                    row.cells[0].innerText = idx + 1;
                    const qty = parseFloat(row.querySelector('.item-qty')?.value) || 0;
                    const price = parseFloat(row.querySelector('.item-price')?.value) || 0;
                    const rowTotal = qty * price;
                    row.querySelector('.item-total').innerText = rowTotal.toFixed(2);
                    grandTotal += rowTotal;
                });
                grandTotalSpan.innerText = '¥ ' + grandTotal.toFixed(2);
            }

            function attachRowEvents(row) {
                row.querySelector('.item-qty')?.addEventListener('input', refreshRowsAndTotal);
                row.querySelector('.item-price')?.addEventListener('input', refreshRowsAndTotal);
                row.querySelector('.delete-btn')?.addEventListener('click', function() {
                    if (itemsBody.children.length <= 1) { alert('至少保留一行'); return; }
                    row.remove();
                    refreshRowsAndTotal();
                });
                row.querySelector('.unit-select')?.addEventListener('change', refreshRowsAndTotal);
            }

            function addNewRow() {
                const newSeq = (itemsBody.children.length || 0) + 1;
                const temp = document.createElement('tbody');
                temp.innerHTML = createRow(newSeq, '', '', 0, 'kg', 0);
                const newRow = temp.firstElementChild;
                itemsBody.appendChild(newRow);
                attachRowEvents(newRow);
                refreshRowsAndTotal();
            }

            function initTable() {
                itemsBody.innerHTML = '';
                let temp = document.createElement('tbody');
                temp.innerHTML = createRow(1, '益生菌粉', '100亿CFU/g', 500, 'kg', 120);
                itemsBody.appendChild(temp.firstElementChild);
                temp.innerHTML = createRow(2, '酶制剂', '食品级', 200, 'kg', 250);
                itemsBody.appendChild(temp.firstElementChild);
                Array.from(itemsBody.children).forEach(row => attachRowEvents(row));
                refreshRowsAndTotal();
            }

            function collectFormData() {
                const contractNo = document.getElementById('contractNo').value;
                const contractDate = document.getElementById('contractDate').value;
                const contractPlace = document.getElementById('contractPlace').value;
                const role = roleClient.checked ? '泽林为委托方' : '泽林为代工方';
                const clauses = document.getElementById('contractClauses').value;

                const clientInputs = clientContent.querySelectorAll('input');
                const client = {};
                clientInputs.forEach(input => {
                    const label = input.previousElementSibling?.innerText || '';
                    if (label.includes('公司名称')) client.name = input.value;
                    else if (label.includes('地址')) client.address = input.value;
                    else if (label.includes('联系人')) client.contact = input.value;
                    else if (label.includes('电话')) client.phone = input.value;
                    else if (label.includes('统一社会信用代码')) client.taxId = input.value;
                    else if (label.includes('开户行')) client.bank = input.value;
                    else if (label.includes('账号')) client.account = input.value;
                });

                const mfInputs = manufacturerContent.querySelectorAll('input');
                const manufacturer = {};
                mfInputs.forEach(input => {
                    const label = input.previousElementSibling?.innerText || '';
                    if (label.includes('公司名称')) manufacturer.name = input.value;
                    else if (label.includes('地址')) manufacturer.address = input.value;
                    else if (label.includes('联系人')) manufacturer.contact = input.value;
                    else if (label.includes('电话')) manufacturer.phone = input.value;
                    else if (label.includes('统一社会信用代码')) manufacturer.taxId = input.value;
                    else if (label.includes('开户行')) manufacturer.bank = input.value;
                    else if (label.includes('账号')) manufacturer.account = input.value;
                });

                const items = [];
                const rows = itemsBody.querySelectorAll('tr');
                rows.forEach(row => {
                    items.push({
                        product: row.querySelector('.item-product')?.value || '',
                        spec: row.querySelector('.item-spec')?.value || '',
                        qty: parseFloat(row.querySelector('.item-qty')?.value) || 0,
                        unit: row.querySelector('.unit-select')?.value || 'kg',
                        price: parseFloat(row.querySelector('.item-price')?.value) || 0,
                        total: parseFloat(row.querySelector('.item-total')?.innerText) || 0
                    });
                });

                const totalAmount = parseFloat(grandTotalSpan.innerText.replace('¥ ', '')) || 0;

                return {
                    contractNo, contractDate, contractPlace, role, client, manufacturer, items, totalAmount, clauses,
                    exportedAt: new Date().toISOString()
                };
            }

            function exportJson() {
                const data = collectFormData();
                const contractNo = data.contractNo.replace(/[^a-zA-Z0-9\-_]/g, '_') || 'contract';
                const filename = `${contractNo}.json`;
                const jsonStr = JSON.stringify(data, null, 2);
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            roleClient.addEventListener('change', renderCompanyCards);
            roleManufacturer.addEventListener('change', renderCompanyCards);
            addRowBtn.addEventListener('click', addNewRow);
            document.getElementById('printPDFBtn').addEventListener('click', () => window.print());
            document.getElementById('exportJsonBtn').addEventListener('click', exportJson);

            renderCompanyCards();
            initTable();

            // 签名画布初始化函数
            function initSignatureCanvas(canvasId, clearBtnSelector) {
                const canvas = document.getElementById(canvasId);
                if (!canvas) return;
                let drawing = false;
                const ctx = canvas.getContext('2d');
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#000';

                function getCoords(e) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    let clientX, clientY;
                    if (e.touches) {
                        clientX = e.touches[0].clientX;
                        clientY = e.touches[0].clientY;
                        e.preventDefault();
                    } else {
                        clientX = e.clientX;
                        clientY = e.clientY;
                    }
                    return {
                        x: (clientX - rect.left) * scaleX,
                        y: (clientY - rect.top) * scaleY
                    };
                }

                function startDrawing(e) {
                    drawing = true;
                    ctx.beginPath();
                    const coords = getCoords(e);
                    ctx.moveTo(coords.x, coords.y);
                }

                function draw(e) {
                    if (!drawing) return;
                    e.preventDefault();
                    const coords = getCoords(e);
                    ctx.lineTo(coords.x, coords.y);
                    ctx.stroke();
                }

                function stopDrawing() {
                    drawing = false;
                    ctx.closePath();
                }

                canvas.addEventListener('mousedown', startDrawing);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', stopDrawing);
                canvas.addEventListener('mouseleave', stopDrawing);

                canvas.addEventListener('touchstart', startDrawing, { passive: false });
                canvas.addEventListener('touchmove', draw, { passive: false });
                canvas.addEventListener('touchend', stopDrawing);
                canvas.addEventListener('touchcancel', stopDrawing);

                const clearBtn = typeof clearBtnSelector === 'string' ? document.querySelector(clearBtnSelector) : clearBtnSelector;
                if (clearBtn) {
                    clearBtn.addEventListener('click', function() {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    });
                }
            }

            initSignatureCanvas('signatureCanvas1', '#signature-area1 .clear-signature');
            initSignatureCanvas('signatureCanvas2', '#signature-area2 .clear-signature');

            // ---------- 对方合同章上传功能 ----------
            const stampUpload = document.getElementById('stampUpload');
            const stampPlaceholder = document.getElementById('stampPlaceholder');
            const stampUploadedImg = document.getElementById('stampUploadedImg');

            stampPlaceholder.addEventListener('click', function() {
                stampUpload.click();
            });

            stampUpload.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        stampUploadedImg.src = ev.target.result;
                        stampUploadedImg.style.display = 'block';
                        stampPlaceholder.style.display = 'none';
                    };
                    reader.readAsDataURL(file);
                }
            });

            stampUploadedImg.addEventListener('click', function() {
                stampUpload.click();
            });
        })();
    </script>
