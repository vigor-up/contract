<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>泽林生技 · 委托代理区域经销合同 (绿金精装版)</title>
    <!-- 引入Google Font & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ========== 全局重置与字体 (沿用绿金精装版) ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Noto Sans TC', 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .contract-container {
            max-width: 1350px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            box-shadow: 0 20px 40px -12px rgba(0, 55, 100, 0.25), 0 0 0 1px rgba(46, 125, 50, 0.15);
            padding: 2.2rem 2.5rem 2rem;
            transition: all 0.3s;
            position: relative;
        }

        /* ========== 页眉区域 ========== */
        .header {
            position: relative;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.8rem;
            padding: 1rem 1.5rem;
            border-radius: 24px 24px 0 0;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-bottom: 3px solid #2E7D32;
            box-shadow: 0 8px 18px -10px #1B5E20;
            z-index: 1;
        }

        .header-content {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 0.5rem;
        }

        .brand-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem 1.5rem;
            width: 100%;
        }

        .logo-title-group {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
        }

        .brand-logo {
            height: 90px;
            width: auto;
            max-width: 160px;
            object-fit: contain;
            opacity: 1;
            filter: drop-shadow(0 4px 8px rgba(46,125,50,0.3));
            border-radius: 20px;
            background: white;
            padding: 0.4rem;
            border: 1px solid #2E7D32;
            transition: transform 0.2s;
        }
        .brand-logo:hover { transform: scale(1.02); }

        .company-name {
            font-weight: 900;
            font-size: 2rem;
            color: #1B5E20;
            line-height: 1.2;
            letter-spacing: 1px;
            white-space: nowrap;
            text-shadow: 2px 2px 6px rgba(46,125,50,0.15);
            background: linear-gradient(145deg, #1B5E20, #2E7D32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .doc-meta-header {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            background: #e8f5e9;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            box-shadow: 0 2px 8px rgba(0,35,0,0.05);
        }
        .doc-meta-header label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.9rem;
            color: #1B5E20;
            font-weight: 500;
        }
        .doc-meta-header input {
            border: 1px solid #a5d6a7;
            border-radius: 40px;
            padding: 0.4rem 1.2rem;
            width: 150px;
            background: white;
            font-size: 0.9rem;
            transition: 0.15s;
        }
        .doc-meta-header input:focus {
            border-color: #2E7D32;
            outline: none;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.2);
        }

        .title-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #1B5E20, #2E7D32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            margin-bottom: 0;
            padding-left: 0.2rem;
        }

        /* 角色切换 (委托方/代理方) */
        .role-switch {
            background: #ffffff;
            border-radius: 60px;
            display: inline-flex;
            padding: 0.4rem;
            margin: 0 0 2rem 1rem;
            gap: 0.4rem;
            border: 1px solid #c8e6c9;
            box-shadow: 0 4px 10px rgba(0,40,0,0.1);
        }
        .role-switch label {
            padding: 0.6rem 2.2rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: #1B5E20;
            transition: 0.2s;
        }
        .role-switch input[type="radio"] { display: none; }
        .role-switch input:checked + label {
            background: #2E7D32;
            color: white;
            box-shadow: 0 4px 10px #1B5E20;
        }

        /* 公司卡片 (委托方 / 代理方) */
        .company-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
            margin-bottom: 2.2rem;
        }
        .company-card {
            flex: 1 1 340px;
            background: #fafdfa;
            border-radius: 24px;
            padding: 1.8rem 1.8rem;
            border: 1px solid #c8e6c9;
            box-shadow: 0 12px 24px -12px rgba(0,60,0,0.2);
        }
        .company-card h3 {
            color: #1B5E20;
            font-size: 1.3rem;
            border-left: 8px solid #FFB300;
            padding-left: 1rem;
            margin-bottom: 1.2rem;
            background: linear-gradient(to right, #ffffff, #e8f5e9);
            border-radius: 0 16px 16px 0;
            line-height: 2;
        }
        .company-card p {
            margin: 0.8rem 0;
            display: flex;
            align-items: baseline;
        }
        .company-card p strong {
            width: 130px;
            color: #1B5E20;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .company-card input {
            border: 1px solid #a5d6a7;
            border-radius: 30px;
            padding: 0.5rem 1.2rem;
            width: 100%;
            background: white;
            font-size: 0.9rem;
            transition: 0.15s;
        }
        .company-card input:focus {
            border-color: #2E7D32;
            box-shadow: 0 0 0 4px rgba(46,125,50,0.1);
            outline: none;
        }
        .bank-info {
            background: #e8f5e9;
            border-radius: 20px;
            padding: 1rem 1.5rem;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            border-left: 4px solid #FFB300;
        }

        /* 表格区域 — 专为经销合同设计 (产品/区域/目标/佣金) */
        .items-section {
            margin: 2rem 0 1.8rem;
        }
        .items-section h3 {
            color: #1B5E20;
            font-size: 1.6rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 12px 24px -14px #1B5E20;
        }
        th {
            background: #c8e6c9;
            color: #1B5E20;
            font-weight: 700;
            padding: 0.9rem 0.4rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td {
            padding: 0.7rem 0.4rem;
            border-bottom: 1px solid #e0f2e0;
            vertical-align: middle;
        }
        td input {
            width: 100%;
            border: 1px solid #c8e6c9;
            border-radius: 30px;
            padding: 0.5rem 0.8rem;
            font-size: 0.85rem;
            background: #f9fff9;
            transition: 0.15s;
        }
        td input:focus {
            border-color: #2E7D32;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.1);
        }
        .delete-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: #b71c1c;
            padding: 0 0.3rem;
            transition: 0.1s;
        }
        .delete-btn:hover { color: #d32f2f; transform: scale(1.15); }

        .total-row {
            text-align: right;
            margin: 1.2rem 0 2rem;
            font-size: 2rem;
            font-weight: 800;
            color: #1B5E20;
            background: linear-gradient(to right, #f1f8e9, #ffffff);
            padding: 0.6rem 2rem;
            border-radius: 60px;
            display: inline-block;
            float: right;
            box-shadow: 0 6px 14px rgba(0,80,0,0.1);
            border: 1px solid #c8e6c9;
        }

        .clause-box {
            clear: both;
            margin: 2rem 0 2rem;
        }
        .clause-box textarea {
            width: 100%;
            border: 1px solid #c8e6c9;
            border-radius: 24px;
            padding: 1.2rem 1.8rem;
            font-size: 0.95rem;
            line-height: 1.7;
            background: #fefefe;
            resize: vertical;
            box-shadow: inset 0 2px 6px rgba(0,30,0,0.02);
        }

        /* 页脚签名区 */
        .signature-footer {
            position: relative;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-end;
            margin: 2rem 0 1.5rem;
            padding: 1.8rem 1.5rem 1.2rem;
            border-top: 2px dashed #a5d6a7;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            overflow: hidden;
        }

        .logo-watermark-footer {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
        }
        .logo-watermark-footer img {
            height: 100px;
            width: auto;
            object-fit: contain;
            margin-right: 1rem;
            margin-bottom: 0.5rem;
        }

        .signature-block {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .stamp-box {
            text-align: center;
        }
        .stamp-box img {
            width: 120px;
            height: auto;
            border-radius: 50%;
            background: #fff;
            padding: 0.3rem;
            box-shadow: 0 8px 18px -6px rgba(0,0,0,0.2), 0 0 0 1px #FFB300 inset;
            object-fit: contain;
        }

        .signature-area {
            background: #fafdfa;
            border-radius: 24px;
            padding: 1rem 1.8rem;
            border: 1px solid #c8e6c9;
            box-shadow: 0 4px 12px -6px #1B5E20;
        }
        .signature-area canvas {
            border: 1px solid #a5d6a7;
            border-radius: 16px;
            background: #fff;
            touch-action: none;
            width: 100%;
            height: auto;
            max-width: 300px;
        }
        .signature-controls {
            margin-top: 0.7rem;
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .signature-controls button {
            background: #e8f5e9;
            border: none;
            color: #1B5E20;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #a5d6a7;
        }
        .signature-controls button:hover { background: #c8e6c9; }
        .signature-controls input[type="date"] {
            border: 1px solid #a5d6a7;
            border-radius: 40px;
            padding: 0.3rem 1rem;
            background: white;
        }

        /* ===== 其他合同連結按鈕 ===== */
        .other-contracts-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin: 20px 0 20px;
        }
        .other-contracts-links a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            color: #1B5E20;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.05rem;
            border: 2px solid #2E7D32;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(46,125,50,0.15);
        }
        .other-contracts-links a:hover {
            background: #2E7D32;
            color: white;
            border-color: #FFB300;
            transform: translateY(-3px);
        }
        .other-contracts-links i {
            font-size: 1.2rem;
            color: #FFB300;
        }
        .other-contracts-links a:hover i {
            color: white;
        }

        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 1.8rem;
            justify-content: center;
            margin: 1.5rem 0 0.5rem;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            background: #2E7D32;
            color: white;
            font-size: 1.1rem;
            padding: 0.9rem 3rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 12px 20px -8px #1B5E20;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-light {
            background: #f5f5f5;
            color: #1B5E20;
            box-shadow: 0 6px 14px #c8e6c9;
        }
        .btn:hover { background: #1B5E20; transform: translateY(-3px); }
        .btn-light:hover { background: #e8f5e9; transform: translateY(-3px); }

        /* 打印样式 */
        @media print {
            body { background: white; padding: 0.2in; }
            .contract-container { box-shadow: none; border: 1px solid #aaa; padding: 0.2in; border-radius: 0; background: white; }
            .no-print, .btn, #addRowBtn, .delete-btn, .action-buttons, .role-switch, .signature-controls button,
            .other-contracts-links { display: none !important; }
            td:last-child, th:last-child { display: none; }
            input, select, textarea { border: none !important; background: transparent !important; border-bottom: 1px solid #333 !important; }
            th { background: #eaeaea !important; }
            .brand-logo { filter: grayscale(1); opacity: 0.8; }
            .company-name { -webkit-text-fill-color: #1B5E20; color: #1B5E20; background: none; }
            .stamp-box img { max-width: 90px; }
        }

        @media (max-width: 700px) {
            .brand-logo { height: 70px; }
            .company-name { font-size: 1.6rem; white-space: normal; }
            .total-row { font-size: 1.6rem; }
            .other-contracts-links a { padding: 10px 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="contract-container">
        <!-- 页眉 -->
        <div class="header">
            <div class="header-content">
                <div class="brand-row">
                    <div class="logo-title-group">
                        <img class="brand-logo" src="images/xmzelin-logo.png" alt="厦门泽林" onerror="this.onerror=null; this.src='https://via.placeholder.com/200x100?text=Zelin+Bio';">
                        <span class="company-name">厦门泽林生物科技有限公司</span>
                    </div>
                    <div class="doc-meta-header no-print">
                        <label>合同编号 <input type="text" id="contractNo" value="ZL-DL-2025-001"></label>
                        <label>签订日期 <input type="date" id="contractDate" value="2025-03-03"></label>
                        <label>签订地点 <input type="text" id="contractPlace" value="厦门市"></label>
                    </div>
                </div>
                <div class="title-header">
                    <h1 id="contractTitle">委托代理区域经销合同</h1>
                </div>
            </div>
        </div>

        <!-- 角色切换：泽林为委托方 / 代理方 -->
        <div class="role-switch no-print" id="roleToggle">
            <input type="radio" name="zelinRole" id="rolePrincipal" value="principal" checked>
            <label for="rolePrincipal">🏢 泽林为委托方</label>
            <input type="radio" name="zelinRole" id="roleAgent" value="agent">
            <label for="roleAgent">🤝 泽林为代理方</label>
        </div>

        <!-- 双方信息卡片：委托方(甲方) 与 代理方(乙方) -->
        <div class="company-row">
            <div class="company-card" id="principalCard">
                <h3 id="principalTitle">委托方（甲方）</h3>
                <div id="principalContent"></div>
            </div>
            <div class="company-card" id="agentCard">
                <h3 id="agentTitle">代理方（乙方）</h3>
                <div id="agentContent"></div>
            </div>
        </div>

        <!-- 产品/区域明细表格 (经销专用) -->
        <div class="items-section">
            <h3>📋 经销产品与目标</h3>
            <table id="itemsTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>产品名称</th>
                        <th>规格/CAS</th>
                        <th>代理区域</th>
                        <th>目标销售额(元)</th>
                        <th>佣金比例(%)</th>
                        <th>佣金金额(元)</th>
                        <th class="no-print">操作</th>
                    </tr>
                </thead>
                <tbody id="itemsBody"></tbody>
            </table>
            <button class="btn-light no-print" id="addRowBtn" style="margin-top:1rem;">➕ 增加一行</button>
        </div>

        <!-- 总佣金金额 -->
        <div class="total-row" id="grandTotalSpan">¥ 0.00</div>

        <!-- 合同条款 (可编辑) -->
        <div class="clause-box">
            <textarea id="contractClauses" rows="7">一、代理区域及产品：乙方在指定区域代理销售甲方产品，具体区域及产品以本合同明细为准。
二、代理期限：自____年__月__日起至____年__月__日止。期满前30日协商续约。
三、销售目标：乙方承诺年度销售额不低于人民币____万元，具体分解见上表。
四、佣金结算：按上表约定比例，于每季度结束后15日内结算。
五、市场管理：乙方不得跨区销售，不得低价倾销，维护甲方价格体系。
六、违约责任：任何一方违约，应赔偿对方损失，并支付违约金。
七、争议解决：协商不成提交厦门仲裁委员会仲裁。
八、本合同一式两份，双方各执一份，盖章生效。</textarea>
        </div>

        <!-- 签名区 + 水印 -->
        <div class="signature-footer">
            <div class="logo-watermark-footer">
                <img src="images/xmzelin-logo.png" alt="厦门泽林水印" onerror="this.onerror=null; this.src='https://via.placeholder.com/200x80?text=Zelin';">
            </div>
            <div class="signature-block">
                <div class="stamp-box">
                    <img src="images/stamp.png" alt="公司印章" onerror="this.onerror=null; this.src='https://via.placeholder.com/130x130?text=Seal';">
                    <p style="font-size:0.8rem; margin-top:0.2rem;">厦门泽林生物科技<br>合同专用章</p>
                </div>
                <div class="signature-area">
                    <p style="font-weight: 600; margin-bottom: 0.4rem;">授权代表签名：</p>
                    <canvas id="signatureCanvas" width="320" height="130" style="width: 100%; height: auto; border: 1px solid #a5d6a7; border-radius: 16px; background: #fff; touch-action: none;"></canvas>
                    <div class="signature-controls">
                        <button type="button" id="clearSignatureBtn">清除</button>
                        <span style="margin-left: auto;">签字日期：</span>
                        <input type="date" id="signatureDate" value="2025-03-03">
                    </div>
                </div>
            </div>
        </div>

        <!-- 其他合同链接 (指向原料合同和代工合同) -->
        <div class="other-contracts-links no-print">
            <a href="index.html" target="_blank" rel="noopener"><i class="fa-solid fa-file-contract"></i> 生技原料买卖合同</a>
            <a href="toll-manufacturing-agreement.html" target="_blank" rel="noopener"><i class="fa-solid fa-industry"></i> 澤林生技委託代工製造合同</a>
        </div>

        <!-- 操作按钮 -->
        <div class="action-buttons no-print">
            <button class="btn" id="printPDFBtn">🖨️ 打印 / 生成PDF</button>
            <button class="btn btn-light" id="exportJsonBtn">📥 导出 JSON 备份</button>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 厦门泽林固定信息 (同前) ----------
            const ZELIN_INFO = {
                name: '厦门泽林生物科技有限公司',
                address: '中国(福建)自由贸易试验区厦门片区嵩屿中路809号航运大厦1102室之260',
                contactPerson: '李易昌',
                phone: '0592-6881234',
                taxId: '91350200MAERUOWJXD',
                bankName: '中国工商银行股份有限公司厦门海沧支行',
                bankAccount: '4100026009200404571',
                accountName: '厦门泽林生物科技有限公司'
            };

            // 角色 radio
            const rolePrincipal = document.getElementById('rolePrincipal');
            const roleAgent = document.getElementById('roleAgent');
            const principalTitle = document.getElementById('principalTitle');
            const agentTitle = document.getElementById('agentTitle');
            const principalContent = document.getElementById('principalContent');
            const agentContent = document.getElementById('agentContent');
            const contractTitle = document.getElementById('contractTitle');

            const itemsBody = document.getElementById('itemsBody');
            const addRowBtn = document.getElementById('addRowBtn');
            const grandTotalSpan = document.getElementById('grandTotalSpan');

            // 渲染公司卡片 (根据泽林角色)
            function renderCompanyCards() {
                if (rolePrincipal.checked) {
                    principalTitle.innerText = '委托方（甲方）· 厦门泽林';
                    principalContent.innerHTML = buildZelinPrincipalHTML();   // 泽林为委托方
                    agentTitle.innerText = '代理方（乙方）';
                    agentContent.innerHTML = buildAgentEditableHTML();
                    contractTitle.innerText = '委托代理区域经销合同 (委托)';
                } else {
                    principalTitle.innerText = '委托方（甲方）';
                    principalContent.innerHTML = buildPrincipalEditableHTML();
                    agentTitle.innerText = '代理方（乙方）· 厦门泽林';
                    agentContent.innerHTML = buildZelinAgentHTML();           // 泽林为代理方
                    contractTitle.innerText = '委托代理区域经销合同 (代理)';
                }
            }

            // 泽林作为委托方 (甲方) 卡片 (含银行信息)
            function buildZelinPrincipalHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="${ZELIN_INFO.name}" placeholder="公司全称"></p>
                    <p><strong>地址</strong> <input type="text" value="${ZELIN_INFO.address}" placeholder="地址"></p>
                    <p><strong>联系人</strong> <input type="text" value="${ZELIN_INFO.contactPerson}" placeholder="联系人"></p>
                    <p><strong>电话</strong> <input type="text" value="${ZELIN_INFO.phone}" placeholder="电话"></p>
                    <p><strong>统一社会信用代码</strong> <input type="text" value="${ZELIN_INFO.taxId}" placeholder="税号"></p>
                    <div class="bank-info">
                        <p><strong>开户行</strong> ${ZELIN_INFO.bankName}</p>
                        <p><strong>账号</strong> ${ZELIN_INFO.bankAccount}</p>
                        <p><strong>账户名</strong> ${ZELIN_INFO.accountName}</p>
                    </div>
                `;
            }

            // 泽林作为代理方 (乙方) 卡片 (通常无需银行信息，但保留基本)
            function buildZelinAgentHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="${ZELIN_INFO.name}" placeholder="公司全称"></p>
                    <p><strong>地址</strong> <input type="text" value="${ZELIN_INFO.address}" placeholder="地址"></p>
                    <p><strong>联系人</strong> <input type="text" value="${ZELIN_INFO.contactPerson}" placeholder="联系人"></p>
                    <p><strong>电话</strong> <input type="text" value="${ZELIN_INFO.phone}" placeholder="电话"></p>
                    <p><strong>统一社会信用代码</strong> <input type="text" value="${ZELIN_INFO.taxId}" placeholder="税号"></p>
                `;
            }

            // 委托方可编辑 (非泽林)
            function buildPrincipalEditableHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="江苏某生物科技" placeholder="委托方全称"></p>
                    <p><strong>地址</strong> <input type="text" value="南京市江宁区" placeholder="地址"></p>
                    <p><strong>联系人</strong> <input type="text" value="张总" placeholder="联系人"></p>
                    <p><strong>电话</strong> <input type="text" value="025-88888888" placeholder="电话"></p>
                    <p><strong>统一社会信用代码</strong> <input type="text" value="91320100MA1TEST123" placeholder="税号"></p>
                    <p><strong>开户行</strong> <input type="text" value="工行南京分行" placeholder="开户行"></p>
                    <p><strong>账号</strong> <input type="text" value="6228480402564890888" placeholder="银行账号"></p>
                `;
            }

            // 代理方可编辑 (非泽林)
            function buildAgentEditableHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="上海华康贸易" placeholder="代理方全称"></p>
                    <p><strong>地址</strong> <input type="text" value="上海市浦东新区" placeholder="地址"></p>
                    <p><strong>联系人</strong> <input type="text" value="李经理" placeholder="联系人"></p>
                    <p><strong>电话</strong> <input type="text" value="021-12345678" placeholder="电话"></p>
                    <p><strong>统一社会信用代码</strong> <input type="text" value="91310115MA1TEST456" placeholder="税号"></p>
                    <p><strong>开户行</strong> <input type="text" value="农行上海分行" placeholder="开户行"></p>
                    <p><strong>账号</strong> <input type="text" value="6228480402564890999" placeholder="银行账号"></p>
                `;
            }

            // 创建一行 (适应新表头)
            function createRow(seq, product = '', spec = '', region = '', target = 0, commissionRate = 0) {
                return `
                    <tr>
                        <td style="text-align:center;">${seq}</td>
                        <td><input type="text" class="item-product" value="${product}" placeholder="产品名称"></td>
                        <td><input type="text" class="item-spec" value="${spec}" placeholder="规格/CAS"></td>
                        <td><input type="text" class="item-region" value="${region}" placeholder="代理区域"></td>
                        <td><input type="number" class="item-target" value="${target}" min="0" step="0.01" placeholder="目标销售额"></td>
                        <td><input type="number" class="item-rate" value="${commissionRate}" min="0" max="100" step="0.1" placeholder="佣金%"></td>
                        <td><span class="item-commission">0.00</span></td>
                        <td class="no-print"><button class="delete-btn">✖</button></td>
                    </tr>
                `;
            }

            // 刷新总计 (佣金总和)
            function refreshRowsAndTotal() {
                const rows = itemsBody.querySelectorAll('tr');
                let grandTotal = 0;
                rows.forEach((row, idx) => {
                    row.cells[0].innerText = idx + 1;
                    const target = parseFloat(row.querySelector('.item-target')?.value) || 0;
                    const rate = parseFloat(row.querySelector('.item-rate')?.value) || 0;
                    const commission = target * rate / 100;
                    row.querySelector('.item-commission').innerText = commission.toFixed(2);
                    grandTotal += commission;
                });
                grandTotalSpan.innerText = '¥ ' + grandTotal.toFixed(2);
            }

            // 为行绑定事件
            function attachRowEvents(row) {
                row.querySelector('.item-target')?.addEventListener('input', refreshRowsAndTotal);
                row.querySelector('.item-rate')?.addEventListener('input', refreshRowsAndTotal);
                row.querySelector('.delete-btn')?.addEventListener('click', function() {
                    if (itemsBody.children.length <= 1) { alert('至少保留一行'); return; }
                    row.remove();
                    refreshRowsAndTotal();
                });
            }

            // 增加新行
            function addNewRow() {
                const newSeq = (itemsBody.children.length || 0) + 1;
                const temp = document.createElement('tbody');
                temp.innerHTML = createRow(newSeq, '', '', '', 0, 0);
                const newRow = temp.firstElementChild;
                itemsBody.appendChild(newRow);
                attachRowEvents(newRow);
                refreshRowsAndTotal();
            }

            // 初始化表格 (示例数据)
            function initTable() {
                itemsBody.innerHTML = '';
                let temp = document.createElement('tbody');
                temp.innerHTML = createRow(1, 'L-赖氨酸', '饲料级', '华东区', 500000, 5);
                itemsBody.appendChild(temp.firstElementChild);
                temp.innerHTML = createRow(2, '维生素C', 'USP级', '华南区', 300000, 6);
                itemsBody.appendChild(temp.firstElementChild);
                Array.from(itemsBody.children).forEach(row => attachRowEvents(row));
                refreshRowsAndTotal();
            }

            // 导出JSON (略作调整，但保留功能)
            function collectFormData() {
                const contractNo = document.getElementById('contractNo').value;
                const contractDate = document.getElementById('contractDate').value;
                const contractPlace = document.getElementById('contractPlace').value;
                const role = rolePrincipal.checked ? '泽林为委托方' : '泽林为代理方';
                const clauses = document.getElementById('contractClauses').value;

                const principalInputs = principalContent.querySelectorAll('input');
                const principal = {};
                principalInputs.forEach(input => {
                    const label = input.previousElementSibling?.innerText || '';
                    if (label.includes('公司名称')) principal.name = input.value;
                    else if (label.includes('地址')) principal.address = input.value;
                    else if (label.includes('联系人')) principal.contact = input.value;
                    else if (label.includes('电话')) principal.phone = input.value;
                    else if (label.includes('统一社会信用代码')) principal.taxId = input.value;
                    else if (label.includes('开户行')) principal.bank = input.value;
                    else if (label.includes('账号')) principal.account = input.value;
                });

                const agentInputs = agentContent.querySelectorAll('input');
                const agent = {};
                agentInputs.forEach(input => {
                    const label = input.previousElementSibling?.innerText || '';
                    if (label.includes('公司名称')) agent.name = input.value;
                    else if (label.includes('地址')) agent.address = input.value;
                    else if (label.includes('联系人')) agent.contact = input.value;
                    else if (label.includes('电话')) agent.phone = input.value;
                    else if (label.includes('统一社会信用代码')) agent.taxId = input.value;
                    else if (label.includes('开户行')) agent.bank = input.value;
                    else if (label.includes('账号')) agent.account = input.value;
                });

                const items = [];
                const rows = itemsBody.querySelectorAll('tr');
                rows.forEach(row => {
                    items.push({
                        product: row.querySelector('.item-product')?.value || '',
                        spec: row.querySelector('.item-spec')?.value || '',
                        region: row.querySelector('.item-region')?.value || '',
                        target: parseFloat(row.querySelector('.item-target')?.value) || 0,
                        rate: parseFloat(row.querySelector('.item-rate')?.value) || 0,
                        commission: parseFloat(row.querySelector('.item-commission')?.innerText) || 0
                    });
                });

                const totalCommission = parseFloat(grandTotalSpan.innerText.replace('¥ ', '')) || 0;

                return {
                    contractNo, contractDate, contractPlace, role, principal, agent, items, totalCommission, clauses,
                    exportedAt: new Date().toISOString()
                };
            }

            function exportJson() {
                const data = collectFormData();
                const contractNo = data.contractNo.replace(/[^a-zA-Z0-9\-_]/g, '_') || 'contract';
                const filename = `${contractNo}.json`;
                const jsonStr = JSON.stringify(data, null, 2);
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            // 事件绑定
            rolePrincipal.addEventListener('change', renderCompanyCards);
            roleAgent.addEventListener('change', renderCompanyCards);
            addRowBtn.addEventListener('click', addNewRow);
            document.getElementById('printPDFBtn').addEventListener('click', () => window.print());
            document.getElementById('exportJsonBtn').addEventListener('click', exportJson);

            renderCompanyCards();
            initTable();

            // 电子签名画布 (同原版)
            const canvas = document.getElementById('signatureCanvas');
            if (canvas) {
                let drawing = false;
                const ctx = canvas.getContext('2d');
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#000';

                function getCoords(e) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    let clientX, clientY;
                    if (e.touches) {
                        clientX = e.touches[0].clientX;
                        clientY = e.touches[0].clientY;
                        e.preventDefault();
                    } else {
                        clientX = e.clientX;
                        clientY = e.clientY;
                    }
                    return {
                        x: (clientX - rect.left) * scaleX,
                        y: (clientY - rect.top) * scaleY
                    };
                }

                function startDrawing(e) {
                    drawing = true;
                    ctx.beginPath();
                    const coords = getCoords(e);
                    ctx.moveTo(coords.x, coords.y);
                }

                function draw(e) {
                    if (!drawing) return;
                    e.preventDefault();
                    const coords = getCoords(e);
                    ctx.lineTo(coords.x, coords.y);
                    ctx.stroke();
                }

                function stopDrawing() {
                    drawing = false;
                    ctx.closePath();
                }

                canvas.addEventListener('mousedown', startDrawing);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', stopDrawing);
                canvas.addEventListener('mouseleave', stopDrawing);

                canvas.addEventListener('touchstart', startDrawing, { passive: false });
                canvas.addEventListener('touchmove', draw, { passive: false });
                canvas.addEventListener('touchend', stopDrawing);
                canvas.addEventListener('touchcancel', stopDrawing);

                document.getElementById('clearSignatureBtn').addEventListener('click', function() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                });
            }
        })();
    </script>
</body>
</html>
