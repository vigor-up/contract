<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>泽林生技 · 委托代理区域经销合同 (双签名精装版)</title>
    <!-- 引入Google Font & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ========== 全局重置与字体 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Noto Sans TC', 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 0.5rem 0.5rem;
        }

        .contract-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            box-shadow: 0 20px 40px -12px rgba(0, 55, 100, 0.25), 0 0 0 1px rgba(46, 125, 50, 0.15);
            padding: 1rem 1.2rem 0.8rem;
            transition: all 0.3s;
        }

        /* ========== 页眉区域 ========== */
        .header {
            margin-bottom: 1rem;
            padding: 0.6rem 0.8rem;
            border-radius: 16px 16px 0 0;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-bottom: 3px solid #2E7D32;
            box-shadow: 0 8px 18px -10px #1B5E20;
        }

        .header-content {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 0.2rem;
        }

        .brand-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem 0.8rem;
        }

        .logo-title-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .brand-logo {
            height: 90px;
            width: auto;
            max-width: 140px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(46,125,50,0.3));
            border-radius: 14px;
            background: white;
            padding: 0.2rem;
            border: 1px solid #2E7D32;
        }

        .company-name {
            font-weight: 900;
            font-size: 1.6rem;
            color: #1B5E20;
            line-height: 1.2;
            white-space: nowrap;
            text-shadow: 2px 2px 6px rgba(46,125,50,0.15);
            background: linear-gradient(145deg, #1B5E20, #2E7D32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .doc-meta-header {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            background: #e8f5e9;
            padding: 0.3rem 1rem;
            border-radius: 40px;
        }
        .doc-meta-header label {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            font-size: 0.85rem;
            color: #1B5E20;
            font-weight: 500;
        }
        .doc-meta-header input {
            border: 1px solid #a5d6a7;
            border-radius: 40px;
            padding: 0.2rem 0.8rem;
            width: 120px;
            background: white;
            font-size: 0.85rem;
        }
        .doc-meta-header input:focus {
            border-color: #2E7D32;
            outline: none;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.2);
        }

        .title-header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(145deg, #1B5E20, #2E7D32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
            margin-bottom: 0;
        }

        /* 角色切换 */
        .role-switch {
            background: #ffffff;
            border-radius: 60px;
            display: inline-flex;
            padding: 0.2rem;
            margin: 0 0 1.2rem 0.2rem;
            gap: 0.2rem;
            border: 1px solid #c8e6c9;
        }
        .role-switch label {
            padding: 0.4rem 1.5rem;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            color: #1B5E20;
            transition: 0.2s;
        }
        .role-switch input[type="radio"] { display: none; }
        .role-switch input:checked + label {
            background: #2E7D32;
            color: white;
            box-shadow: 0 4px 10px #1B5E20;
        }

        /* 公司卡片 */
        .company-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }
        .company-card {
            flex: 1 1 280px;
            background: #fafdfa;
            border-radius: 18px;
            padding: 1rem 1rem;
            border: 1px solid #c8e6c9;
            box-shadow: 0 8px 16px -12px rgba(0,60,0,0.2);
        }
        .company-card h3 {
            color: #1B5E20;
            font-size: 1.1rem;
            border-left: 5px solid #FFB300;
            padding-left: 0.6rem;
            margin-bottom: 0.8rem;
            background: linear-gradient(to right, #ffffff, #e8f5e9);
            border-radius: 0 12px 12px 0;
            line-height: 1.6;
        }
        .company-card p {
            margin: 0.4rem 0;
            display: flex;
            align-items: baseline;
            font-size: 0.9rem;
        }
        .company-card p strong {
            width: 100px;
            color: #1B5E20;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .company-card input {
            border: 1px solid #a5d6a7;
            border-radius: 30px;
            padding: 0.3rem 0.8rem;
            width: 100%;
            background: white;
            font-size: 0.9rem;
        }
        .company-card input:focus {
            border-color: #2E7D32;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.1);
            outline: none;
        }
        .bank-info {
            background: #e8f5e9;
            border-radius: 14px;
            padding: 0.6rem 1rem;
            margin-top: 0.8rem;
            font-size: 0.9rem;
            border-left: 4px solid #FFB300;
        }

        /* 表格区域 */
        .items-section {
            margin: 1.2rem 0 1rem;
            overflow-x: auto;
        }
        .items-section h3 {
            color: #1B5E20;
            font-size: 1.4rem;
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 16px -14px #1B5E20;
            min-width: 900px;
        }
        th {
            background: #c8e6c9;
            color: #1B5E20;
            font-weight: 700;
            padding: 0.6rem 0.2rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        td {
            padding: 0.4rem 0.2rem;
            border-bottom: 1px solid #e0f2e0;
            vertical-align: middle;
        }
        td input {
            width: 100%;
            border: 1px solid #c8e6c9;
            border-radius: 30px;
            padding: 0.3rem 0.5rem;
            font-size: 0.9rem;
            background: #f9fff9;
        }
        td input:focus {
            border-color: #2E7D32;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.1);
        }
        .delete-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #b71c1c;
            padding: 0 0.2rem;
        }
        .delete-btn:hover { color: #d32f2f; transform: scale(1.1); }

        .total-row {
            text-align: right;
            margin: 0.8rem 0 1.2rem;
            font-size: 1.6rem;
            font-weight: 800;
            color: #1B5E20;
            background: linear-gradient(to right, #f1f8e9, #ffffff);
            padding: 0.3rem 1.5rem;
            border-radius: 50px;
            display: inline-block;
            float: right;
            box-shadow: 0 4px 10px rgba(0,80,0,0.1);
            border: 1px solid #c8e6c9;
        }

        .clause-box {
            clear: both;
            margin: 1rem 0 1rem;
        }
        .clause-box textarea {
            width: 100%;
            border: 1px solid #c8e6c9;
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
            font-size: 1rem;
            line-height: 1.45;
            background: #fefefe;
            resize: vertical;
            box-shadow: inset 0 2px 6px rgba(0,30,0,0.02);
            /* min-height removed to allow rows to control height */
        }

        /* 页脚签名区 (双印章 + 双签名) */
        .signature-footer {
            position: relative;
            margin: 1rem 0 0.5rem;
            padding: 1rem 1rem 0.8rem;
            border-top: 2px dashed #a5d6a7;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            overflow: hidden;
            page-break-inside: avoid;
        }

        .logo-watermark-footer {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
        }
        .logo-watermark-footer img {
            height: 110px;
            width: auto;
            object-fit: contain;
            margin-right: 0.5rem;
            margin-bottom: 0.3rem;
        }

        .signature-block {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .stamps-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            gap: 1rem;
        }

        .stamp-box {
            text-align: center;
            flex: 0 1 auto;
            position: relative;
        }
        .stamp-box img {
            width: 90px;
            height: auto;
            border-radius: 50%;
            background: #fff;
            padding: 0.2rem;
            box-shadow: 0 6px 12px -6px rgba(0,0,0,0.2), 0 0 0 1px #FFB300 inset;
        }
        .stamp-placeholder {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #eeeeee;
            border: 2px dashed #2E7D32;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1B5E20;
            font-weight: 600;
            font-size: 0.75rem;
            text-align: center;
            padding: 0.2rem;
            margin: 0 auto;
            cursor: pointer;
            transition: background 0.2s;
        }
        .stamp-placeholder:hover {
            background: #d4e6d4;
        }
        /* 隐藏文件输入 */
        .stamp-file-input {
            display: none;
        }
        /* 上传后显示的印章图片 */
        .stamp-uploaded-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #FFB300;
            box-shadow: 0 6px 12px -6px rgba(0,0,0,0.2);
            display: none;
        }

        /* 双签名行 */
        .signatures-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }
        .signature-area {
            flex: 1 1 260px;
            background: #fafdfa;
            border-radius: 18px;
            padding: 0.6rem 1rem;
            border: 1px solid #c8e6c9;
            box-shadow: 0 4px 10px -6px #1B5E20;
            min-width: 220px;
        }
        .signature-area p {
            font-weight: 600;
            margin-bottom: 0.3rem;
            font-size: 0.95rem;
            color: #1B5E20;
        }
        .signature-area canvas {
            border: 1px solid #a5d6a7;
            border-radius: 14px;
            background: #fff;
            touch-action: none;
            width: 100%;
            height: auto;
            max-width: 240px;
            display: block;
            margin: 0 auto;
        }
        .signature-controls {
            margin-top: 0.4rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .signature-controls button {
            background: #e8f5e9;
            border: none;
            color: #1B5E20;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #a5d6a7;
            font-size: 0.85rem;
        }
        .signature-controls button:hover { background: #c8e6c9; }
        .signature-controls input[type="date"] {
            border: 1px solid #a5d6a7;
            border-radius: 40px;
            padding: 0.2rem 0.6rem;
            background: white;
            font-size: 0.85rem;
            flex: 1;
            min-width: 120px;
        }

        /* 其他合同链接 */
        .other-contracts-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 12px 0 8px;
        }
        .other-contracts-links a {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: white;
            color: #1B5E20;
            text-decoration: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            border: 2px solid #2E7D32;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(46,125,50,0.15);
        }
        .other-contracts-links a:hover {
            background: #2E7D32;
            color: white;
            border-color: #FFB300;
        }
        .other-contracts-links i {
            font-size: 0.9rem;
            color: #FFB300;
        }

        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1rem 0 0;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            background: #2E7D32;
            color: white;
            font-size: 1rem;
            padding: 0.6rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 16px -8px #1B5E20;
            transition: 0.2s;
        }
        .btn-light {
            background: #f5f5f5;
            color: #1B5E20;
            box-shadow: 0 4px 10px #c8e6c9;
        }
        .btn:hover { background: #1B5E20; transform: translateY(-2px); }

        /* 打印样式 */
        @media print {
            body { background: white; padding: 0.15in; }
            .contract-container { box-shadow: none; border: 1px solid #aaa; padding: 0.15in; border-radius: 0; background: white; }
            .no-print, .btn, #addRowBtn, .delete-btn, .action-buttons, .role-switch, .other-contracts-links,
            .signature-controls button { display: none !important; }
            td:last-child, th:last-child { display: none; }
            input, select, textarea { border: none !important; background: transparent !important; border-bottom: 1px solid #333 !important; }
            th { background: #eaeaea !important; }
            .company-name { -webkit-text-fill-color: #1B5E20; color: #1B5E20; background: none; }
            .stamp-box img, .stamp-placeholder { max-width: 80px; }
            .stamp-placeholder { border: 1px solid #000; background: #f9f9f9; }
            .stamp-uploaded-img { max-width: 80px; border: 1px solid #000; }
            .signature-area canvas { border: 1px solid #000; }
            .signature-area input[type="date"] { border: none; border-bottom: 1px solid #333; background: transparent; }
            .clause-box textarea { height: auto; overflow: visible; border: 1px solid #333 !important; }
        }

        /* 移动端优化 */
        @media (max-width: 700px) {
            .brand-logo { height: 70px; }
            .company-name { font-size: 1.3rem; white-space: normal; }
            .title-header h1 { font-size: 1.3rem; }
            .doc-meta-header input { width: 90px; }
            .role-switch label { padding: 0.3rem 1rem; font-size: 0.85rem; }
            .total-row { font-size: 1.4rem; }
            .stamp-box img, .stamp-placeholder, .stamp-uploaded-img { width: 70px; height: 70px; }
            .signature-area { flex: 1 1 100%; }
            .signature-area canvas { max-width: 200px; }
        }
    </style>
</head>
<body>
    <div class="contract-container">
        <!-- 页眉 -->
        <div class="header">
            <div class="header-content">
                <div class="brand-row">
                    <div class="logo-title-group">
                        <img class="brand-logo" src="images/xmzelin-logo.png" alt="厦门泽林" onerror="this.onerror=null; this.src='https://via.placeholder.com/140x90?text=Zelin+Bio';">
                        <span class="company-name">厦门泽林生物科技有限公司</span>
                    </div>
                    <div class="doc-meta-header no-print">
                        <label>合同编号 <input type="text" id="contractNo" value="ZL-DL-2025-001"></label>
                        <label>签订日期 <input type="date" id="contractDate" value="2025-03-03"></label>
                        <label>签订地点 <input type="text" id="contractPlace" value="厦门市"></label>
                    </div>
                </div>
                <div class="title-header">
                    <h1 id="contractTitle">委托代理区域经销合同</h1>
                </div>
            </div>
        </div>

        <!-- 角色切换 -->
        <div class="role-switch no-print" id="roleToggle">
            <input type="radio" name="zelinRole" id="rolePrincipal" value="principal" checked>
            <label for="rolePrincipal">🏢 泽林为委托方</label>
            <input type="radio" name="zelinRole" id="roleAgent" value="agent">
            <label for="roleAgent">🤝 泽林为代理方</label>
        </div>

        <!-- 双方信息卡片 -->
        <div class="company-row">
            <div class="company-card" id="principalCard">
                <h3 id="principalTitle">委托方（甲方）</h3>
                <div id="principalContent"></div>
            </div>
            <div class="company-card" id="agentCard">
                <h3 id="agentTitle">代理方（乙方）</h3>
                <div id="agentContent"></div>
            </div>
        </div>

        <!-- 经销产品表格 -->
        <div class="items-section">
            <h3>📋 经销产品与目标</h3>
            <table id="itemsTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>产品名称</th>
                        <th>规格/CAS</th>
                        <th>代理区域</th>
                        <th>目标销售额(元)</th>
                        <th>佣金比例(%)</th>
                        <th>佣金金额(元)</th>
                        <th class="no-print">操作</th>
                    </tr>
                </thead>
                <tbody id="itemsBody"></tbody>
            </table>
            <button class="btn-light no-print" id="addRowBtn" style="margin-top:0.5rem;">➕ 增加一行</button>
        </div>

        <!-- 总佣金金额 -->
        <div class="total-row" id="grandTotalSpan">¥ 0.00</div>

        <!-- 合同条款 (rows=25 确保无滚动条) -->
        <div class="clause-box">
            <textarea id="contractClauses" rows="25">
一、代理区域及产品
乙方在指定区域代理销售甲方产品，具体产品名称、规格、代理区域及销售目标以本合同明细表为准。未经甲方书面同意，乙方不得变更销售区域或产品。

二、代理期限
代理期限自______年__月__日起至______年__月__日止。期满前30日，双方可协商续约事宜；逾期未续约的，本合同自动终止。

三、销售目标与佣金
1. 乙方承诺年度销售额不低于人民币______万元，具体分解见上表。
2. 佣金按上表约定比例计算，于每季度结束后15日内结算。佣金金额以甲方实际收到客户货款为计算基础，乙方需提供合法佣金发票。
3. 若乙方超额完成年度目标，甲方可给予额外奖励，具体另行约定。

四、市场管理
1. 乙方不得跨区域销售，不得以低于甲方指导价的价格倾销，不得在公开网络平台销售，维护甲方价格体系。
2. 未经甲方书面授权，乙方不得使用甲方商标、商号进行除销售以外的任何活动，不得擅自改变产品包装。

五、订单与交付
1. 乙方应提前 5 个工作日向甲方下达书面订单，并支付相应货款；甲方在收到货款后 10 个工作日内发货。
2. 运输方式及运费由双方在订单中确认。货物风险自交付承运人时转移。

六、质量与售后
1. 产品质量按甲方企业标准执行，乙方在收到货物后 3 日内进行验收，如有质量问题应立即书面通知甲方。
2. 因乙方保管不善导致的产品质量问题，甲方不承担责任。产品质保期为交货后12个月。

七、违约责任
1. 任何一方违约，应赔偿对方因此遭受的全部损失。
2. 乙方若连续两个季度未完成销售目标的80%，甲方有权解除合同，并要求乙方支付违约金。
3. 任何一方擅自解除合同，应承担合同年度目标总额20%的违约金。

八、争议解决与其他
1. 因本合同引起的任何争议，双方应友好协商；协商不成时，提交厦门仲裁委员会按照申请仲裁时该会现行有效的仲裁规则进行仲裁。
2. 本合同自双方签字盖章之日起生效，一式两份，双方各执一份，具有同等法律效力。
3. 未尽事宜可签订补充协议，补充协议与本合同具有同等效力。

                    principalContent.innerHTML = buildPrincipalEditableHTML();
                    agentTitle.innerText = '代理方（乙方）· 厦门泽林';
                    agentContent.innerHTML = buildZelinAgentHTML();
                    contractTitle.innerText = '委托代理区域经销合同 (代理)';
                }

            function buildZelinPrincipalHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="${ZELIN_INFO.name}"></p>
                    <p><strong>地址</strong> <input type="text" value="${ZELIN_INFO.address}"></p>

                    <p><strong>联系人</strong> <input type="text" value="${ZELIN_INFO.contactPerson}"></p>
                    <p><strong>电话</strong> <input type="text" value="${ZELIN_INFO.phone}"></p>
                    <p><strong>统一社会信用代码</strong> <input type="text" value="${ZELIN_INFO.taxId}"></p>
                `;
            }

            function buildPrincipalEditableHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="江苏某生物科技"></p>
                    <p><strong>地址</strong> <input type="text" value="南京市江宁区"></p>
                    <p><strong>联系人</strong> <input type="text" value="张总"></p>
                    <p><strong>电话</strong> <input type="text" value="025-88888888"></p>
                    <p><strong>统一社会信用代码</strong> <input type="text" value="91320100MA1TEST123"></p>
                    <p><strong>开户行</strong> <input type="text" value="工行南京分行"></p>
                    <p><strong>账号</strong> <input type="text" value="6228480402564890888"></p>
                `;

            function buildAgentEditableHTML() {
                return `
                    <p><strong>公司名称</strong> <input type="text" value="上海华康贸易"></p>

                    <p><strong>开户行</strong> <input type="text" value="农行上海分行"></p>
                    <p><strong>账号</strong> <input type="text" value="6228480402564890999"></p>

            // 创建一行 (经销表格)
            function createRow(seq, product = '', spec = '', region = '', target = 0, rate = 0) {
                return `
                    <tr>
                        <td style="text-align:center;">${seq}</td>
                        <td><input type="text" class="item-product" value="${product}" placeholder="产品名称"></td>
                        <td><input type="text" class="item-spec" value="${spec}" placeholder="规格/CAS"></td>
                        <td><input type="text" class="item-region" value="${region}" placeholder="代理区域"></td>
                        <td><input type="number" class="item-target" value="${target}" min="0" step="0.01" placeholder="目标销售额"></td>
                        <td><input type="number" class="item-rate" value="${rate}" min="0" max="100" step="0.1" placeholder="佣金%"></td>
                        <td><span class="item-commission">0.00</span></td>
                        <td class="no-print"><button class="delete-btn">✖</button></td>
                    </tr>
                `;
            }

            // 刷新总计 (佣金总和)
            function refreshRowsAndTotal() {
                const rows = itemsBody.querySelectorAll('tr');
                let grandTotal = 0;
                rows.forEach((row, idx) => {
                    row.cells[0].innerText = idx + 1;
                    const target = parseFloat(row.querySelector('.item-target')?.value) || 0;
                    const rate = parseFloat(row.querySelector('.item-rate')?.value) || 0;
                    const commission = target * rate / 100;
                    row.querySelector('.item-commission').innerText = commission.toFixed(2);
                    grandTotal += commission;
                });
                grandTotalSpan.innerText = '¥ ' + grandTotal.toFixed(2);
            }

            function attachRowEvents(row) {
                row.querySelector('.item-target')?.addEventListener('input', refreshRowsAndTotal);
                row.querySelector('.item-rate')?.addEventListener('input', refreshRowsAndTotal);
                row.querySelector('.delete-btn')?.addEventListener('click', function() {
                    if (itemsBody.children.length <= 1) { alert('至少保留一行'); return; }
                    row.remove();
                    refreshRowsAndTotal();
                });
            }

            function addNewRow() {
                const newSeq = (itemsBody.children.length || 0) + 1;
                const temp = document.createElement('tbody');
                temp.innerHTML = createRow(newSeq, '', '', '', 0, 0);
                const newRow = temp.firstElementChild;
                itemsBody.appendChild(newRow);
                attachRowEvents(newRow);
                refreshRowsAndTotal();
            }

            function initTable() {
                itemsBody.innerHTML = '';
                let temp = document.createElement('tbody');
                temp.innerHTML = createRow(1, 'L-赖氨酸', '饲料级', '华东区', 500000, 5);
                itemsBody.appendChild(temp.firstElementChild);
                temp.innerHTML = createRow(2, '维生素C', 'USP级', '华南区', 300000, 6);
                itemsBody.appendChild(temp.firstElementChild);
                Array.from(itemsBody.children).forEach(row => attachRowEvents(row));
                refreshRowsAndTotal();
            }

            function collectFormData() {
                const contractNo = document.getElementById('contractNo').value;
                const contractDate = document.getElementById('contractDate').value;
                const contractPlace = document.getElementById('contractPlace').value;
                const role = rolePrincipal.checked ? '泽林为委托方' : '泽林为代理方';
                const clauses = document.getElementById('contractClauses').value;

                const principalInputs = principalContent.querySelectorAll('input');
                const principal = {};
                principalInputs.forEach(input => {
                    const label = input.previousElementSibling?.innerText || '';
                    if (label.includes('公司名称')) principal.name = input.value;
                    else if (label.includes('地址')) principal.address = input.value;
                    else if (label.includes('联系人')) principal.contact = input.value;
                    else if (label.includes('电话')) principal.phone = input.value;
                    else if (label.includes('统一社会信用代码')) principal.taxId = input.value;
                    else if (label.includes('开户行')) principal.bank = input.value;
                    else if (label.includes('账号')) principal.account = input.value;
                });

                const agentInputs = agentContent.querySelectorAll('input');
                const agent = {};
                agentInputs.forEach(input => {
                    const label = input.previousElementSibling?.innerText || '';
                    if (label.includes('公司名称')) agent.name = input.value;
                    else if (label.includes('地址')) agent.address = input.value;
                    else if (label.includes('联系人')) agent.contact = input.value;
                    else if (label.includes('电话')) agent.phone = input.value;
                    else if (label.includes('统一社会信用代码')) agent.taxId = input.value;
                    else if (label.includes('开户行')) agent.bank = input.value;
                    else if (label.includes('账号')) agent.account = input.value;
                });

                const items = [];
                const rows = itemsBody.querySelectorAll('tr');
                rows.forEach(row => {
                    items.push({
                        product: row.querySelector('.item-product')?.value || '',
                        spec: row.querySelector('.item-spec')?.value || '',
                        region: row.querySelector('.item-region')?.value || '',
                        target: parseFloat(row.querySelector('.item-target')?.value) || 0,
                        rate: parseFloat(row.querySelector('.item-rate')?.value) || 0,
                        commission: parseFloat(row.querySelector('.item-commission')?.innerText) || 0
                    });
                });

                const totalCommission = parseFloat(grandTotalSpan.innerText.replace('¥ ', '')) || 0;

                return {
                    contractNo, contractDate, contractPlace, role, principal, agent, items, totalCommission, clauses,
                    exportedAt: new Date().toISOString()
                };
            }

            function exportJson() {
                const data = collectFormData();
                const contractNo = data.contractNo.replace(/[^a-zA-Z0-9\-_]/g, '_') || 'contract';
                const filename = `${contractNo}.json`;
                const jsonStr = JSON.stringify(data, null, 2);
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            rolePrincipal.addEventListener('change', renderCompanyCards);
            roleAgent.addEventListener('change', renderCompanyCards);
            addRowBtn.addEventListener('click', addNewRow);
            document.getElementById('printPDFBtn').addEventListener('click', () => window.print());
            document.getElementById('exportJsonBtn').addEventListener('click', exportJson);

            renderCompanyCards();
            initTable();

            // 签名画布初始化函数
            function initSignatureCanvas(canvasId, clearBtnSelector) {
                const canvas = document.getElementById(canvasId);
                if (!canvas) return;
                let drawing = false;
                const ctx = canvas.getContext('2d');
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#000';

                function getCoords(e) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    let clientX, clientY;
                    if (e.touches) {
                        clientX = e.touches[0].clientX;
                        clientY = e.touches[0].clientY;
                        e.preventDefault();
                    } else {
                        clientX = e.clientX;
                        clientY = e.clientY;
                    }
                    return {
                        x: (clientX - rect.left) * scaleX,
                        y: (clientY - rect.top) * scaleY
                    };
                }

                function startDrawing(e) {
                    drawing = true;
                    ctx.beginPath();
                    const coords = getCoords(e);
                    ctx.moveTo(coords.x, coords.y);
                }

                function draw(e) {
                    if (!drawing) return;
                    e.preventDefault();
                    const coords = getCoords(e);
                    ctx.lineTo(coords.x, coords.y);
                    ctx.stroke();
                }

                function stopDrawing() {
                    drawing = false;
                    ctx.closePath();
                }

                canvas.addEventListener('mousedown', startDrawing);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', stopDrawing);
                canvas.addEventListener('mouseleave', stopDrawing);

                canvas.addEventListener('touchstart', startDrawing, { passive: false });
                canvas.addEventListener('touchmove', draw, { passive: false });
                canvas.addEventListener('touchend', stopDrawing);
                canvas.addEventListener('touchcancel', stopDrawing);

                const clearBtn = typeof clearBtnSelector === 'string' ? document.querySelector(clearBtnSelector) : clearBtnSelector;
                if (clearBtn) {
                    clearBtn.addEventListener('click', function() {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    });
                }
            }

            initSignatureCanvas('signatureCanvas1', '#signature-area1 .clear-signature');
            initSignatureCanvas('signatureCanvas2', '#signature-area2 .clear-signature');

            // ---------- 对方合同章上传功能 ----------
            const stampUpload = document.getElementById('stampUpload');
            const stampPlaceholder = document.getElementById('stampPlaceholder');
            const stampUploadedImg = document.getElementById('stampUploadedImg');

            // 点击占位符触发文件选择
            stampPlaceholder.addEventListener('click', function() {
                stampUpload.click();
            });

            // 文件选择后处理
            stampUpload.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        stampUploadedImg.src = ev.target.result;
                        stampUploadedImg.style.display = 'block';
                        stampPlaceholder.style.display = 'none'; // 隐藏占位符
                    };
                    reader.readAsDataURL(file);
                }
            });

            // 如果用户想重新上传，可以再次点击图片（因为图片没有点击事件，需要把点击事件绑在容器上？）
            // 为了简化，我们让整个stamp-box都可点击触发上传，但要注意不要干扰图片显示。
            // 将点击事件绑定到stamp-box上，但需要排除点击图片本身触发重新上传（可能用户想保存图片）。
            // 更合理：点击占位符或图片都触发上传（重新选择），但图片被替换后点击图片也触发上传，这样用户可以更换。
            // 我们统一将点击事件绑定到stamp-box内的可视区域（占位符或图片）。
            const opponentStampBox = document.getElementById('opponentStampBox');
            opponentStampBox.addEventListener('click', function(e) {
                // 如果点击的是图片或占位符，都触发上传
                stampUpload.click();
            });
            // 但这样点击图片也会触发，用户如果想保存图片可能误操作。为了更好的体验，我们保持原样：只点击占位符触发上传，图片不可点击。
            // 上面已经绑定了占位符的点击，现在如果上传后占位符隐藏，则无法再次上传。我们需要让图片也可点击触发上传。
            // 因此给图片也添加点击事件
            stampUploadedImg.addEventListener('click', function() {
                stampUpload.click();
            });
        })();
    </script>
