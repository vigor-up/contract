<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>泽林生技 · 委托代理区域经销合同 (证据包版)</title>
    <!-- 引入Google Font & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- 引入 JSZip 和 CryptoJS 用于打包和哈希 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        /* ========== 全局重置与字体 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Noto Sans TC', 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 0.5rem 0.5rem;
        }

        .contract-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            box-shadow: 0 20px 40px -12px rgba(0, 55, 100, 0.25), 0 0 0 1px rgba(46, 125, 50, 0.15);
            padding: 1rem 1.2rem 0.8rem;
            transition: all 0.3s;
        }

        /* ========== 页眉区域 ========== */
        .header {
            margin-bottom: 1rem;
            padding: 0.6rem 0.8rem;
            border-radius: 16px 16px 0 0;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-bottom: 3px solid #2E7D32;
            box-shadow: 0 8px 18px -10px #1B5E20;
        }

        .header-content {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 0.2rem;
        }

        .brand-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem 0.8rem;
        }

        .logo-title-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .brand-logo {
            height: 90px;
            width: auto;
            max-width: 140px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(46,125,50,0.3));
            border-radius: 14px;
            background: white;
            padding: 0.2rem;
            border: 1px solid #2E7D32;
        }

        .company-name {
            font-weight: 900;
            font-size: 1.6rem;
            color: #1B5E20;
            line-height: 1.2;
            white-space: nowrap;
            text-shadow: 2px 2px 6px rgba(46,125,50,0.15);
            background: linear-gradient(145deg, #1B5E20, #2E7D32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .doc-meta-header {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            background: #e8f5e9;
            padding: 0.3rem 1rem;
            border-radius: 40px;
        }
        .doc-meta-header label {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            font-size: 0.85rem;
            color: #1B5E20;
            font-weight: 500;
        }
        .doc-meta-header input {
            border: 1px solid #a5d6a7;
            border-radius: 40px;
            padding: 0.2rem 0.8rem;
            width: 120px;
            background: white;
            font-size: 0.85rem;
        }
        .doc-meta-header input:focus {
            border-color: #2E7D32;
            outline: none;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.2);
        }

        .title-header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(145deg, #1B5E20, #2E7D32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
            margin-bottom: 0;
        }

        /* 角色切换 */
        .role-switch {
            background: #ffffff;
            border-radius: 60px;
            display: inline-flex;
            padding: 0.2rem;
            margin: 0 0 1.2rem 0.2rem;
            gap: 0.2rem;
            border: 1px solid #c8e6c9;
        }
        .role-switch label {
            padding: 0.4rem 1.5rem;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            color: #1B5E20;
            transition: 0.2s;
        }
        .role-switch input[type="radio"] { display: none; }
        .role-switch input:checked + label {
            background: #2E7D32;
            color: white;
            box-shadow: 0 4px 10px #1B5E20;
        }

        /* 公司卡片 */
        .company-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }
        .company-card {
            flex: 1 1 280px;
            background: #fafdfa;
            border-radius: 18px;
            padding: 1rem 1rem;
            border: 1px solid #c8e6c9;
            box-shadow: 0 8px 16px -12px rgba(0,60,0,0.2);
            page-break-inside: avoid;
        }
        .company-card h3 {
            color: #1B5E20;
            font-size: 1.1rem;
            border-left: 5px solid #FFB300;
            padding-left: 0.6rem;
            margin-bottom: 0.8rem;
            background: linear-gradient(to right, #ffffff, #e8f5e9);
            border-radius: 0 12px 12px 0;
            line-height: 1.6;
        }
        .company-card p {
            margin: 0.4rem 0;
            display: flex;
            align-items: baseline;
            font-size: 0.9rem;
        }
        .company-card p strong {
            width: 100px;
            color: #1B5E20;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .company-card input {
            border: 1px solid #a5d6a7;
            border-radius: 30px;
            padding: 0.3rem 0.8rem;
            width: 100%;
            background: white;
            font-size: 0.9rem;
        }
        .company-card input:focus {
            border-color: #2E7D32;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.1);
            outline: none;
        }
        .bank-info {
            background: #e8f5e9;
            border-radius: 14px;
            padding: 0.6rem 1rem;
            margin-top: 0.8rem;
            font-size: 0.9rem;
            border-left: 4px solid #FFB300;
        }

        /* 表格区域 */
        .items-section {
            margin: 1.2rem 0 1rem;
            overflow-x: auto;
        }
        .items-section h3 {
            color: #1B5E20;
            font-size: 1.4rem;
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 16px -14px #1B5E20;
            min-width: 900px;
            page-break-inside: avoid;
        }
        th {
            background: #c8e6c9;
            color: #1B5E20;
            font-weight: 700;
            padding: 0.6rem 0.2rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        td {
            padding: 0.4rem 0.2rem;
            border-bottom: 1px solid #e0f2e0;
            vertical-align: middle;
        }
        td input {
            width: 100%;
            border: 1px solid #c8e6c9;
            border-radius: 30px;
            padding: 0.3rem 0.5rem;
            font-size: 0.9rem;
            background: #f9fff9;
        }
        td input:focus {
            border-color: #2E7D32;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.1);
        }
        .delete-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #b71c1c;
            padding: 0 0.2rem;
        }
        .delete-btn:hover { color: #d32f2f; transform: scale(1.1); }

        .total-row {
            text-align: right;
            margin: 0.8rem 0 1.2rem;
            font-size: 1.6rem;
            font-weight: 800;
            color: #1B5E20;
            background: linear-gradient(to right, #f1f8e9, #ffffff);
            padding: 0.3rem 1.5rem;
            border-radius: 50px;
            display: inline-block;
            float: right;
            box-shadow: 0 4px 10px rgba(0,80,0,0.1);
            border: 1px solid #c8e6c9;
            page-break-inside: avoid;
        }

        .clause-box {
            clear: both;
            margin: 1rem 0 1rem;
        }
        .clause-box textarea {
            width: 100%;
            border: 1px solid #c8e6c9;
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
            font-size: 1rem;
            line-height: 1.45;
            background: #fefefe;
            resize: vertical;
            box-shadow: inset 0 2px 6px rgba(0,30,0,0.02);
        }

        /* 页脚签名区 (双印章 + 双签名上传) */
        .signature-footer {
            position: relative;
            margin: 1rem 0 0.5rem;
            padding: 1rem 1rem 0.8rem;
            border-top: 2px dashed #a5d6a7;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            overflow: hidden;
            page-break-inside: avoid;
        }

        .logo-watermark-footer {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
        }
        .logo-watermark-footer img {
            height: 110px;
            width: auto;
            object-fit: contain;
            margin-right: 0.5rem;
            margin-bottom: 0.3rem;
        }

        .signature-block {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .stamps-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            gap: 1rem;
        }

        .stamp-box {
            text-align: center;
            flex: 0 1 auto;
            position: relative;
        }
        .stamp-box img {
            width: 90px;
            height: auto;
            border-radius: 50%;
            background: #fff;
            padding: 0.2rem;
            box-shadow: 0 6px 12px -6px rgba(0,0,0,0.2), 0 0 0 1px #FFB300 inset;
        }
        .stamp-placeholder {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #eeeeee;
            border: 2px dashed #2E7D32;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1B5E20;
            font-weight: 600;
            font-size: 0.75rem;
            text-align: center;
            padding: 0.2rem;
            margin: 0 auto;
            cursor: pointer;
            transition: background 0.2s;
        }
        .stamp-placeholder:hover {
            background: #d4e6d4;
        }
        .stamp-file-input {
            display: none;
        }
        .stamp-uploaded-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #FFB300;
            box-shadow: 0 6px 12px -6px rgba(0,0,0,0.2);
            display: none;
            cursor: pointer;
        }

        /* 签名区域 (上传图片) */
        .signatures-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }
        .signature-area {
            flex: 1 1 260px;
            background: #fafdfa;
            border-radius: 18px;
            padding: 0.6rem 1rem;
            border: 1px solid #c8e6c9;
            box-shadow: 0 4px 10px -6px #1B5E20;
            min-width: 220px;
            page-break-inside: avoid;
        }
        .signature-area p {
            font-weight: 600;
            margin-bottom: 0.3rem;
            font-size: 0.95rem;
            color: #1B5E20;
        }
        .signature-area .signature-upload-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        .signature-area .signature-preview {
            width: 100%;
            max-width: 200px;
            min-height: 80px;
            border: 1px dashed #a5d6a7;
            border-radius: 12px;
            background: #f9fff9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .signature-area .signature-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .signature-area .signature-placeholder {
            color: #1B5E20;
            font-size: 0.8rem;
            text-align: center;
            padding: 1rem;
        }
        .signature-area .signature-upload-btn {
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            color: #1B5E20;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .signature-area .signature-upload-btn:hover {
            background: #c8e6c9;
        }
        .signature-controls {
            margin-top: 0.4rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .signature-controls button {
            background: #e8f5e9;
            border: none;
            color: #1B5E20;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #a5d6a7;
            font-size: 0.85rem;
        }
        .signature-controls button:hover { background: #c8e6c9; }
        .signature-controls input[type="date"] {
            border: 1px solid #a5d6a7;
            border-radius: 40px;
            padding: 0.2rem 0.6rem;
            background: white;
            font-size: 0.85rem;
            flex: 1;
            min-width: 120px;
            width: auto;
        }

        /* 证据包相关样式 */
        .email-section {
            margin: 1rem 0 0.5rem;
            padding: 0.8rem 1rem;
            background: #f0f8f0;
            border-radius: 16px;
            border: 1px solid #c8e6c9;
        }
        .email-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 0.8rem;
            align-items: center;
        }
        .email-row label {
            font-weight: 600;
            color: #1B5E20;
            min-width: 80px;
        }
        .email-row input {
            flex: 1;
            min-width: 200px;
            border: 1px solid #a5d6a7;
            border-radius: 30px;
            padding: 0.3rem 1rem;
            background: white;
            font-size: 0.9rem;
        }
        .hash-display {
            background: #e8f5e9;
            border-radius: 12px;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            word-break: break-all;
            border: 1px solid #a5d6a7;
            margin-top: 0.5rem;
        }
        .evidence-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        /* 其他合同链接 */
        .other-contracts-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 12px 0 8px;
        }
        .other-contracts-links a {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: white;
            color: #1B5E20;
            text-decoration: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            border: 2px solid #2E7D32;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(46,125,50,0.15);
        }
        .other-contracts-links a:hover {
            background: #2E7D32;
            color: white;
            border-color: #FFB300;
        }
        .other-contracts-links i {
            font-size: 0.9rem;
            color: #FFB300;
        }

        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1rem 0 0;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            background: #2E7D32;
            color: white;
            font-size: 1rem;
            padding: 0.6rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 16px -8px #1B5E20;
            transition: 0.2s;
        }
        .btn-light {
            background: #f5f5f5;
            color: #1B5E20;
            box-shadow: 0 4px 10px #c8e6c9;
        }
        .btn:hover { background: #1B5E20; transform: translateY(-2px); }
        .btn-evidence {
            background: #FFB300;
            color: #1B5E20;
        }
        .btn-evidence:hover {
            background: #ffa000;
        }

        /* ========== 打印样式强化 ========== */
        @media print {
            body {
                background: white;
                padding: 0.2in;
            }
            .contract-container {
                box-shadow: none;
                border: 1px solid #aaa;
                padding: 0.2in;
                border-radius: 0;
                background: white;
                max-width: 100%;
            }
            /* 隐藏非打印元素 */
            .no-print,
            .btn,
            #addRowBtn,
            .delete-btn,
            .action-buttons,
            .role-switch,
            .other-contracts-links,
            .signature-upload-btn,
            .signature-controls button,
            .email-section,
            .evidence-buttons {
                display: none !important;
            }
            td:last-child,
            th:last-child {
                display: none;
            }
            /* 输入框、选择框只保留文字边框 */
            input,
            select,
            textarea {
                border: none !important;
                background: transparent !important;
                border-bottom: 1px solid #333 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            th {
                background: #eaeaea !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .company-card,
            .bank-info {
                border: 1px solid #aaa;
                background: #f9f9f9 !important;
            }
            .brand-logo {
                filter: grayscale(0.2);
                opacity: 1;
            }
            .company-name {
                -webkit-text-fill-color: #1B5E20;
                color: #1B5E20;
                background: none;
            }
            /* 强制条款区域展开，无滚动条 */
            .clause-box textarea {
                height: auto !important;
                max-height: none !important;
                min-height: 0 !important;
                overflow: visible !important;
                resize: none !important;
                border: 1px solid #333 !important;
                background: transparent;
                white-space: pre-wrap;
                box-shadow: none;
                padding: 0.2rem;
                font-size: 0.9rem !important;
                line-height: 1.2 !important;
            }
            /* 防止签名区跨页 */
            .signature-footer,
            .stamp-box,
            .signature-area {
                page-break-inside: avoid;
            }
            .stamp-box img,
            .stamp-placeholder,
            .stamp-uploaded-img {
                max-width: 80px;
            }
            .stamp-placeholder {
                border: 1px solid #000;
                background: #f9f9f9;
            }
            .stamp-uploaded-img {
                border: 1px solid #000;
            }
            .signature-area .signature-preview {
                border: 1px solid #000;
            }
            .signature-area input[type="date"] {
                border: none;
                border-bottom: 1px solid #333;
                background: transparent;
            }
            /* 表格打印时保留边框 */
            table {
                border-collapse: collapse;
                width: 100%;
            }
            th, td {
                border: 1px solid #000;
            }
        }

        /* 移动端优化 */
        @media (max-width: 700px) {
            .brand-logo { height: 70px; }
            .company-name { font-size: 1.3rem; white-space: normal; }
            .title-header h1 { font-size: 1.3rem; }
            .doc-meta-header input { width: 90px; }
            .role-switch label { padding: 0.3rem 1rem; font-size: 0.85rem; }
            .total-row { font-size: 1.4rem; }
            .stamp-box img, .stamp-placeholder, .stamp-uploaded-img { width: 70px; height: 70px; }
            .signature-area { flex: 1 1 100%; }
            .signature-area .signature-preview { max-width: 180px; }
            .signature-controls input[type="date"] { min-width: 100px; }
        }
    </style>
</head>
<body>
    <div class="contract-container">
        <!-- 页眉 -->
        <div class="header">
            <div class="header-content">
                <div class="brand-row">
                    <div class="logo-title-group">
                        <img class="brand-logo" src="images/xmzelin-logo.png" alt="厦门泽林" onerror="this.onerror=null; this.src='https://via.placeholder.com/140x90?text=Zelin+Bio';">
                        <span class="company-name">厦门泽林生物科技有限公司</span>
                    </div>
                    <div class="doc-meta-header no-print">
                        <label>合同编号 <input type="text" id="contractNo" value="ZL-DL-2025-001"></label>
                        <label>签订日期 <input type="date" id="contractDate" value="2025-03-03"></label>
                        <label>签订地点 <input type="text" id="contractPlace" value="厦门市"></label>
                    </div>
                </div>
                <div class="title-header">
                    <h1 id="contractTitle">委托代理区域经销合同</h1>
                </div>
            </div>
        </div>

        <!-- 角色切换 -->
        <div class="role-switch no-print" id="roleToggle">
            <input type="radio" name="zelinRole" id="rolePrincipal" value="principal" checked>
            <label for="rolePrincipal">🏢 泽林为委托方</label>
            <input type="radio" name="zelinRole" id="roleAgent" value="agent">

            const rolePrincipal = document.getElementById('rolePrincipal');
            const roleAgent = document.getElementById('roleAgent');

            const agentTitle = document.getElementById('agentTitle');

            // 创建一行 (经销表格)
            function createRow(seq, product = '', spec = '', region = '', target = 0, rate = 0) {
                return `
                    <tr>
                        <td style="text-align:center;">${seq}</td>
                        <td><input type="text" class="item-product" value="${product}" placeholder="产品名称"></td>
                        <td><input type="text" class="item-spec" value="${spec}" placeholder="规格/CAS"></td>
                        <td><input type="text" class="item-region" value="${region}" placeholder="代理区域"></td>
                        <td><input type="number" class="item-target" value="${target}" min="0" step="0.01" placeholder="目标销售额"></td>
                        <td><input type="number" class="item-rate" value="${rate}" min="0" max="100" step="0.1" placeholder="佣金%"></td>
                        <td><span class="item-commission">0.00</span></td>
                        <td class="no-print"><button class="delete-btn">✖</button></td>
                    </tr>
                `;
            }

            // 刷新总计 (佣金总和)
            function refreshRowsAndTotal() {
                const rows = itemsBody.querySelectorAll('tr');
                let grandTotal = 0;
                rows.forEach((row, idx) => {
                    row.cells[0].innerText = idx + 1;
                    const target = parseFloat(row.querySelector('.item-target')?.value) || 0;
                    const rate = parseFloat(row.querySelector('.item-rate')?.value) || 0;
                    const commission = target * rate / 100;
                    row.querySelector('.item-commission').innerText = commission.toFixed(2);
                    grandTotal += commission;
                });
                grandTotalSpan.innerText = '¥ ' + grandTotal.toFixed(2);
            }

            function attachRowEvents(row) {
                row.querySelector('.item-target')?.addEventListener('input', refreshRowsAndTotal);
                row.querySelector('.item-rate')?.addEventListener('input', refreshRowsAndTotal);
                row.querySelector('.delete-btn')?.addEventListener('click', function() {
                    if (itemsBody.children.length <= 1) { alert('至少保留一行'); return; }
                    row.remove();
                    refreshRowsAndTotal();
                });
            }

            function addNewRow() {
                const newSeq = (itemsBody.children.length || 0) + 1;
                const temp = document.createElement('tbody');
                temp.innerHTML = createRow(newSeq, '', '', '', 0, 0);
                const newRow = temp.firstElementChild;
                itemsBody.appendChild(newRow);
                attachRowEvents(newRow);
                refreshRowsAndTotal();
            }

            function initTable() {
                itemsBody.innerHTML = '';
                let temp = document.createElement('tbody');
                temp.innerHTML = createRow(1, 'L-赖氨酸', '饲料级', '华东区', 500000, 5);
                itemsBody.appendChild(temp.firstElementChild);
                temp.innerHTML = createRow(2, '维生素C', 'USP级', '华南区', 300000, 6);
                itemsBody.appendChild(temp.firstElementChild);
                Array.from(itemsBody.children).forEach(row => attachRowEvents(row));
                refreshRowsAndTotal();
            }

            function collectFormData() {
                const contractNo = document.getElementById('contractNo').value;
                const contractDate = document.getElementById('contractDate').value;
                const contractPlace = document.getElementById('contractPlace').value;
                const role = rolePrincipal.checked ? '泽林为委托方' : '泽林为代理方';
                const clauses = document.getElementById('contractClauses').value;

                const principalInputs = principalContent.querySelectorAll('input');
                const principal = {};
                principalInputs.forEach(input => {
                    const label = input.previousElementSibling?.innerText || '';
                    if (label.includes('公司名称')) principal.name = input.value;
                    else if (label.includes('地址')) principal.address = input.value;
                    else if (label.includes('联系人')) principal.contact = input.value;
                    else if (label.includes('电话')) principal.phone = input.value;
                    else if (label.includes('统一社会信用代码')) principal.taxId = input.value;
                    else if (label.includes('开户行')) principal.bank = input.value;
                    else if (label.includes('账号')) principal.account = input.value;
                });

                const agentInputs = agentContent.querySelectorAll('input');
                const agent = {};
                agentInputs.forEach(input => {
                    const label = input.previousElementSibling?.innerText || '';
                    if (label.includes('公司名称')) agent.name = input.value;
                    else if (label.includes('地址')) agent.address = input.value;
                    else if (label.includes('联系人')) agent.contact = input.value;
                    else if (label.includes('电话')) agent.phone = input.value;
                    else if (label.includes('统一社会信用代码')) agent.taxId = input.value;
                    else if (label.includes('开户行')) agent.bank = input.value;
                    else if (label.includes('账号')) agent.account = input.value;
                });

                const items = [];
                const rows = itemsBody.querySelectorAll('tr');
                rows.forEach(row => {
                    items.push({
                        product: row.querySelector('.item-product')?.value || '',
                        spec: row.querySelector('.item-spec')?.value || '',
                        region: row.querySelector('.item-region')?.value || '',
                        target: parseFloat(row.querySelector('.item-target')?.value) || 0,
                        rate: parseFloat(row.querySelector('.item-rate')?.value) || 0,
                        commission: parseFloat(row.querySelector('.item-commission')?.innerText) || 0
                    });
                });

                const totalCommission = parseFloat(grandTotalSpan.innerText.replace('¥ ', '')) || 0;

                return {
                    contractNo, contractDate, contractPlace, role, principal, agent, items, totalCommission, clauses,
                    exportedAt: new Date().toISOString()
                };
            }

            function exportJson() {
                const data = collectFormData();
                const contractNo = data.contractNo.replace(/[^a-zA-Z0-9\-_]/g, '_') || 'contract';
                const filename = `${contractNo}.json`;
                const jsonStr = JSON.stringify(data, null, 2);
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            stampPlaceholder.addEventListener('click', () => stampUpload.click());

                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        stampUploadedImg.src = ev.target.result;
                        stampUploadedImg.style.display = 'block';
                        stampPlaceholder.style.display = 'none';
                    };
                    reader.readAsDataURL(file);
                }
            });
            stampUploadedImg.addEventListener('click', () => stampUpload.click());

            // ---------- 签名上传功能 ----------
            function initSignatureUpload(sigId, previewId, clearBtnId, uploadBtnId) {
                const fileInput = document.getElementById(sigId);
                const previewDiv = document.getElementById(previewId);
                const clearBtn = document.getElementById(clearBtnId);
                const uploadBtn = document.getElementById(uploadBtnId);

                uploadBtn.addEventListener('click', () => fileInput.click());

                fileInput.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            previewDiv.innerHTML = `<img src="${ev.target.result}" style="max-width:100%; max-height:100%;">`;
                        };
                        reader.readAsDataURL(file);
                    }
                });

                clearBtn.addEventListener('click', function() {
                    previewDiv.innerHTML = '<div class="signature-placeholder">未上传签名</div>';
                    fileInput.value = '';
                });
            }

            initSignatureUpload('signatureUpload1', 'signaturePreview1', 'clearSignature1', 'signatureUploadBtn1');
            initSignatureUpload('signatureUpload2', 'signaturePreview2', 'clearSignature2', 'signatureUploadBtn2');

            // ---------- 证据包生成与邮件发送 ----------
            const generateBtn = document.getElementById('generateEvidenceBtn');
            const sendBtn = document.getElementById('sendEmailBtn');
            const hashDisplay = document.getElementById('hashDisplay');
            let currentHash = '';

            function dataURLtoBlob(dataurl) {
                const arr = dataurl.split(',');
                const mime = arr[0].match(/:(.*?);/)[1];
                const bstr = atob(arr[1]);
                let n = bstr.length;
                const u8arr = new Uint8Array(n);
                while (n--) {
                    u8arr[n] = bstr.charCodeAt(n);
                }
                return new Blob([u8arr], { type: mime });
            }

            generateBtn.addEventListener('click', async function() {
                try {
                    const contractData = collectFormData();

                    const sig1Preview = document.querySelector('#signaturePreview1 img');
                    const sig2Preview = document.querySelector('#signaturePreview2 img');
                    const stampImg = document.getElementById('stampUploadedImg');

                    let sig1Blob = null, sig2Blob = null, stampBlob = null;
                    if (sig1Preview) sig1Blob = dataURLtoBlob(sig1Preview.src);
                    if (sig2Preview) sig2Blob = dataURLtoBlob(sig2Preview.src);
                    if (stampImg && stampImg.style.display !== 'none') stampBlob = dataURLtoBlob(stampImg.src);

                    const zip = new JSZip();
                    zip.file('contract.json', JSON.stringify(contractData, null, 2));
                    if (sig1Blob) zip.file('signature_A.png', sig1Blob);
                    if (sig2Blob) zip.file('signature_B.png', sig2Blob);
                    if (stampBlob) zip.file('stamp_opponent.png', stampBlob);
                    zip.file('signature_timestamp.txt', new Date().toISOString());

                    const zipBlob = await zip.generateAsync({ type: 'blob' });

                    const buffer = await zipBlob.arrayBuffer();
                    const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
                    const hashArray = Array.from(new Uint8Array(hashBuffer));
                    const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                    currentHash = hashHex;
                    hashDisplay.innerText = '证据包哈希值 (SHA-256): ' + hashHex;

                    const url = URL.createObjectURL(zipBlob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `contract_evidence_${contractData.contractNo}.zip`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } catch (error) {
                    alert('生成证据包失败：' + error.message);
                }
            });

            sendBtn.addEventListener('click', function() {
                const emailA = document.getElementById('emailPartyA').value.trim();
                const emailB = document.getElementById('emailPartyB').value.trim();
                if (!emailA || !emailB) {
                    alert('请输入双方邮箱地址');
                    return;
                }
                if (!currentHash) {
                    alert('请先生成证据包');
                    return;
                }
                const subject = '合同证据包 - ' + document.getElementById('contractNo').value;
                const body = `尊敬的双方，\n\n请查收附件中的合同证据包。\n证据包哈希值 (SHA-256): ${currentHash}\n\n您可以使用该哈希值验证文件的完整性。\n\n本邮件由系统自动生成，请勿回复。`;
                const mailtoLink = `mailto:${emailA},${emailB}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                window.location.href = mailtoLink;
            });
        })();
    </script>
</body>
</html>
